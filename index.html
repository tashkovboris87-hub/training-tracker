<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Scripting Training Tracker · Ipsos Bulgaria</title>
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800;900&display=swap" rel="stylesheet">
<script>
window.FORM_DATA  = null;              // replaced on backup
// Gist sync credentials are stored in localStorage per device (never in this file).
// Editors can configure them via the "🔧 Sync setup" button after unlocking editor mode.
window.GIST_TOKEN = (() => { try { return localStorage.getItem('tt3_gist_token'); } catch(e){ return null; } })();
window.GIST_ID    = (() => { try { return localStorage.getItem('tt3_gist_id'); } catch(e){ return null; } })();
window.GIST_FILE  = (() => { try { return localStorage.getItem('tt3_gist_file') || 'training-tracker.json'; } catch(e){ return 'training-tracker.json'; } })();
</script>
<style>
:root {
  --navy:      #192166;
  --teal:      #00C4D0;
  --teal-deep: #009EBD;
  --amber:     #d97706;
  --green:     #3d9e4a;
  --red:       #e4003a;
  --bg:        #edf1f8;
  --bg2:       #f5f7fc;
  --surface:   #ffffff;
  --border:    rgba(25,33,102,0.09);
  --border-m:  rgba(25,33,102,0.15);
  --muted:     #7a85a8;
  --muted2:    #9aaac8;
  --navy-tint: rgba(25,33,102,0.05);
  --teal-tint: rgba(0,196,208,0.08);
  --amber-tint:rgba(217,119,6,0.09);
  --red-tint:  rgba(228,0,58,0.07);
  --green-tint:rgba(61,158,74,0.09);
  --r:    8px;
  --r-sm: 5px;
  --max:  1160px;
  --grad: linear-gradient(135deg,#192166 0%,#009EBD 55%,#00C4D0 100%);
  --font: 'DM Sans', system-ui, sans-serif;
  --mono: 'DM Mono', monospace;
}

/* ── RATING COLOURS ── */
.rc-exceptional   { background:rgba(61,158,74,.13);  color:#1a5e24; border-color:rgba(61,158,74,.35)!important; }
.rc-no_concern    { background:rgba(0,196,208,.11);  color:#006070; border-color:rgba(0,196,208,.35)!important; }
.rc-attention     { background:rgba(217,119,6,.12);  color:#7a4700; border-color:rgba(217,119,6,.35)!important; }
.rc-cause_concern { background:rgba(228,0,58,.10);   color:#9e001a; border-color:rgba(228,0,58,.35)!important; }
.rc-not_applicable{ background:rgba(154,170,200,.13);color:#4e5f7e; border-color:rgba(154,170,200,.35)!important; }
.rc-paid_leave,.rc-sick_leave,.rc-holidays
                  { background:rgba(59,130,246,.10); color:#1a44c2; border-color:rgba(59,130,246,.35)!important; }
.sc-good  { color:var(--green); }
.sc-ok    { color:var(--teal-deep); }
.sc-watch { color:var(--amber); }
.sc-bad   { color:var(--red); }
.sc-none  { color:var(--muted); }

*,*::before,*::after { box-sizing:border-box; margin:0; padding:0; }
button:focus { outline:none; }
button:focus-visible { outline:2px solid var(--teal); outline-offset:2px; }

body {
  font-family: var(--font);
  font-size: 14px;
  line-height: 1.5;
  background: var(--bg);
  color: var(--navy);
  min-height: 100vh;
}

/* ── HEADER ── */
.hdr {
  background: var(--navy);
  padding: 0 28px;
  height: 54px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  border-bottom: 1px solid rgba(255,255,255,0.07);
  position: sticky;
  top: 0;
  z-index: 300;
}
.hdr-left { display:flex; align-items:center; gap:16px; }
.hdr-logo {
  width: 28px; height: 28px;
  border-radius: 6px;
  background: var(--teal);
  display: flex; align-items: center; justify-content: center;
  flex-shrink: 0;
}
.hdr-logo svg { display:block; }
.hdr-title {
  font-family: var(--font);
  font-size: 14px;
  font-weight: 600;
  color: #fff;
  letter-spacing: -0.01em;
  line-height: 1;
}
.hdr-title em { font-style:normal; font-weight:400; color:rgba(255,255,255,0.55); }
.hdr-sub { display:none; }
.hdr-right { display:flex; align-items:center; gap:8px; }
.as {
  display: flex; align-items: center; gap: 5px;
  font-size: 11px; font-weight: 500;
  color: rgba(255,255,255,0.35);
  margin-right: 4px;
}
.as-dot {
  width: 5px; height: 5px;
  border-radius: 50%;
  background: rgba(255,255,255,0.25);
  transition: background .3s;
}
.as-dot.saved  { background: #5fffd5; box-shadow:0 0 5px rgba(95,255,213,.5); }
.as-dot.saving { background: #fcd34d; animation:blink .5s infinite alternate; }
@keyframes blink { from{opacity:.4} to{opacity:1} }

/* ── BUTTONS ── */
.btn {
  display: inline-flex; align-items: center; gap: 5px;
  padding: 0 13px; height: 32px;
  border-radius: var(--r-sm); border: none; cursor: pointer;
  font-family: var(--font); font-size: 12px; font-weight: 600;
  transition: all .15s; white-space: nowrap; letter-spacing:0;
}
.btn-ghost {
  background: rgba(255,255,255,0.09);
  color: rgba(255,255,255,0.75);
  border: 1px solid rgba(255,255,255,0.15);
}
.btn-ghost:hover { background:rgba(255,255,255,0.16); color:#fff; border-color:rgba(255,255,255,0.28); }
.btn-white { background:#fff; color:var(--navy); box-shadow:0 1px 6px rgba(25,33,102,.14); }
.btn-white:hover { background:#f0f4fb; }
.btn-navy { background:var(--navy); color:#fff; }
.btn-navy:hover { background:#131a55; }
.btn-teal { background:var(--teal); color:#fff; }
.btn-teal:hover { background:var(--teal-deep); }
.btn-sm { padding:0 10px; height:28px; font-size:11px; }
.btn-danger { background:var(--red-tint); color:var(--red); border:1px solid rgba(228,0,58,.18); }
.btn-danger:hover { background:rgba(228,0,58,.18); }
.btn-archive { background:var(--amber-tint); color:var(--amber); border:1px solid rgba(217,119,6,.22); }
.btn-archive:hover { background:rgba(217,119,6,.18); border-color:var(--amber); }
.btn-ghost-dark { background:var(--navy-tint); color:var(--navy); border:1px solid var(--border-m); }
.btn-ghost-dark:hover { background:rgba(25,33,102,.1); }
.btn-restore { background:var(--green-tint); color:var(--green); border:1px solid rgba(61,158,74,.25); }
.btn-restore:hover { background:rgba(61,158,74,.18); border-color:var(--green); }

/* ── LOCK PILL (header) ── */
.lock-pill {
  display: inline-flex; align-items: center; gap: 7px;
  padding: 0 12px; height: 32px;
  border-radius: var(--r-sm); cursor: pointer;
  font-family: var(--font); font-size: 12px; font-weight: 600;
  border: 1px solid rgba(255,255,255,0.18);
  background: rgba(255,255,255,0.08);
  color: rgba(255,255,255,0.7);
  transition: all .15s; white-space: nowrap;
}
.lock-pill:hover { background:rgba(255,255,255,0.15); color:#fff; border-color:rgba(255,255,255,.35); }
.lock-pill.unlocked { background:rgba(0,196,208,.18); border-color:rgba(0,196,208,.45); color:var(--teal); }
.lock-pill.unlocked:hover { background:rgba(0,196,208,.28); }
.lock-pill .lock-icon { font-size:12px; line-height:1; }
.lock-pill .lock-status-dot {
  width: 5px; height: 5px; border-radius: 50%;
  background: #ff8a8a; box-shadow: 0 0 5px rgba(255,138,138,.5);
}
.lock-pill.unlocked .lock-status-dot { background:#5fffd5; box-shadow:0 0 5px rgba(95,255,213,.6); }

/* ── TRAINEE BAR ── */
.trainee-bar-outer {
  background: var(--surface);
  border-bottom: 1px solid var(--border);
  position: sticky; top: 54px; z-index: 200;
}
.trainee-bar {
  max-width: var(--max); margin: 0 auto;
  padding: 0 28px;
  display: flex; align-items: stretch; gap: 0;
  overflow-x: auto; scrollbar-width: none;
  height: 46px;
}
.trainee-bar::-webkit-scrollbar { display:none; }

.trainee-pill {
  display: flex; align-items: center; gap: 7px;
  padding: 0 14px;
  border: none; background: transparent; cursor: pointer;
  font-family: var(--font); font-size: 13px; font-weight: 500;
  color: var(--muted); white-space: nowrap;
  border-bottom: 2px solid transparent;
  transition: all .15s;
}
.trainee-pill:hover { color: var(--navy); }
.trainee-pill:focus { outline: none; }
.trainee-pill:focus-visible { outline: 2px solid var(--teal); outline-offset: -2px; }
.trainee-pill.active {
  color: var(--navy);
  font-weight: 600;
  border-bottom-color: var(--navy);
  background: transparent;
  box-shadow: none;
}
.pill-name { max-width:140px; overflow:hidden; text-overflow:ellipsis; }
.pill-score {
  font-family: var(--mono);
  font-size: 10px; font-weight: 500;
  padding: 1px 6px; border-radius: 3px;
  background: var(--navy-tint); color: var(--muted);
}
.trainee-pill.active .pill-score {
  background: var(--navy); color: #fff;
}
.pill-remove {
  width: 14px; height: 14px; border-radius: 3px;
  background: none; border: none; color: var(--muted2);
  font-size: 10px; cursor: pointer;
  display: flex; align-items: center; justify-content: center;
  opacity: 0; transition: all .12s;
  font-family: var(--font);
}
.trainee-pill:hover .pill-remove { opacity:1; }
.pill-remove:hover { background:rgba(228,0,58,.1); color:var(--red); }

.add-pill {
  display: flex; align-items: center; gap: 5px;
  padding: 0 14px;
  border: none; background: transparent; cursor: pointer;
  font-family: var(--font); font-size: 12px; font-weight: 500;
  color: var(--muted2); white-space: nowrap;
  transition: color .15s;
  border-left: 1px solid var(--border);
  margin-left: auto; flex-shrink: 0;
}
.add-pill:hover { color:var(--teal-deep); }
.add-pill:focus { outline:none; }
.add-pill:focus-visible { outline:2px solid var(--teal); }

.trainee-count {
  display: flex; align-items: center;
  margin-left: 0; flex-shrink: 0;
  font-size: 11px; font-weight: 500;
  text-transform: uppercase; letter-spacing:.06em;
  color: var(--muted2);
  padding: 0 14px;
  border-left: 1px solid var(--border);
}

/* ── SETUP CARD ── */
.setup-outer { max-width:var(--max); margin:0 auto; padding:14px 28px 0; }
.setup-card {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--r);
  padding: 14px 18px;
}
.setup-grid { display:grid; grid-template-columns:1fr 1fr 1fr 1fr; gap:10px; }
.setup-actions {
  display: flex; justify-content: flex-end; align-items: center;
  margin-top: 12px; padding-top: 12px;
  border-top: 1px solid var(--border); gap: 8px;
}
.setup-actions-empty { display:none; }

.field-lbl {
  display: block;
  font-size: 10px; font-weight: 600;
  text-transform: uppercase; letter-spacing: .09em;
  color: var(--muted); margin-bottom: 5px;
}
.setup-input {
  width: 100%; padding: 7px 10px;
  border: 1px solid var(--border-m); border-radius: var(--r-sm);
  font-family: var(--font); font-size: 13px; font-weight: 500;
  color: var(--navy); background: var(--bg2);
  transition: border-color .15s;
}
.setup-input:focus { outline:none; border-color:var(--teal); }
.setup-input::placeholder { color:var(--muted2); font-weight:400; }

/* ── WEEK TAB BAR ── */
.week-bar-outer {
  background: var(--surface);
  border-bottom: 1px solid var(--border);
  position: sticky; top: 100px; z-index: 150;
}
/* When trainee-bar is hidden (Hub/Archive tabs), week-bar sticks directly under header */
body.no-trainee-bar .week-bar-outer { top: 54px; }
body.modal-open .week-bar-outer,
body.modal-open .trainee-bar-outer { visibility:hidden; }

.week-bar {
  max-width: var(--max); margin: 0 auto;
  padding: 0 28px;
  display: flex; gap: 0;
  overflow-x: auto; scrollbar-width: none;
  height: 42px; align-items: stretch;
}
.week-bar::-webkit-scrollbar { display:none; }

.week-btn {
  display: flex; align-items: center; gap: 5px;
  padding: 0 12px;
  border: none; background: transparent;
  font-family: var(--font); font-size: 12.5px; font-weight: 500;
  color: var(--muted); cursor: pointer; white-space: nowrap;
  border-bottom: 2px solid transparent;
  transition: all .15s;
}
.week-btn:hover { color: var(--navy); }
.week-btn.active { color: var(--teal-deep); font-weight: 600; border-bottom-color: var(--teal); }

.w-dot { width:6px; height:6px; border-radius:50%; background:var(--border-m); transition:background .3s; }
.w-dot.filled  { background:var(--teal); }
.w-dot.partial { background:var(--amber); }
.w-dot.concern { background:var(--red); }

/* ── MAIN ── */
.main { max-width:var(--max); margin:0 auto; padding:20px 28px 60px; }
.panel { display:none; }
.panel.active { display:block; }

/* ── WEEK HEADER ── */
.week-hd {
  display: flex; align-items: flex-end; justify-content: space-between;
  margin-bottom: 16px; padding-bottom: 14px;
  border-bottom: 1px solid var(--border);
}
.week-phase-lbl {
  font-size: 10px; font-weight: 600;
  text-transform: uppercase; letter-spacing: .1em;
  color: var(--teal-deep); margin-bottom: 4px;
}
.week-title {
  font-family: var(--font);
  font-size: 20px; font-weight: 600;
  color: var(--navy); letter-spacing: -.02em;
}
.week-title em { font-style:normal; font-weight:500; color:var(--teal-deep); }
.week-score-box { text-align:right; }
.week-score-lbl {
  font-size: 10px; font-weight: 600;
  text-transform: uppercase; letter-spacing: .09em;
  color: var(--muted); margin-bottom: 2px;
}
.week-score-num {
  font-family: var(--mono);
  font-size: 32px; font-weight: 400; line-height: 1;
}

/* ── CRITERIA HEADER ── */
.col-hd {
  font-size: 10px; font-weight: 600;
  text-transform: uppercase; letter-spacing: .06em;
  color: var(--muted); text-align: center;
}
.col-hd.left { text-align:left; }

/* ── DAY CARD ── */
.day-card {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--r-sm);
  padding: 10px 14px; margin-bottom: 6px;
  transition: box-shadow .15s;
}
.day-card:hover { box-shadow:0 2px 10px rgba(25,33,102,.07); }
.day-row { display:grid; gap:6px; align-items:center; }
.day-lbl {
  display: flex; align-items: center; gap: 6px;
  font-size: 11px; font-weight: 600;
  text-transform: uppercase; letter-spacing: .06em;
  color: var(--navy);
}
.day-num-badge {
  width: 20px; height: 20px; border-radius: 4px;
  background: var(--navy); color: #fff;
  display: flex; align-items: center; justify-content: center;
  font-size: 10px; font-weight: 700; flex-shrink: 0;
}

/* ── DROPDOWNS ── */
.sel-wrap { position:relative; }
.rating-sel {
  width: 100%; padding: 6px 22px 6px 9px;
  border: 1px solid var(--border-m); border-radius: var(--r-sm);
  font-family: var(--font); font-size: 11.5px; font-weight: 500;
  color: var(--navy); background: var(--bg2);
  cursor: pointer; appearance: none; -webkit-appearance: none; transition: all .15s;
}
.rating-sel:focus { outline:none; border-color:var(--teal); }
.sel-wrap::after { content:'▾'; position:absolute; right:7px; top:50%; transform:translateY(-50%); font-size:9px; color:var(--muted); pointer-events:none; }

.rdrop { position:relative; }
.rdrop-btn {
  width: 100%; padding: 6px 26px 6px 9px; min-height: 30px;
  border: 1px solid var(--border-m); border-radius: var(--r-sm);
  background: var(--bg2); cursor: pointer; transition: all .15s;
  font-family: var(--font); font-size: 11.5px; font-weight: 500; color: var(--navy);
  display: flex; align-items: center; gap: 6px; text-align: left; line-height: 1.2;
}
.rdrop-btn:hover { border-color:var(--teal); }
.rdrop-btn:focus { outline:none; border-color:var(--teal); box-shadow:0 0 0 2px var(--teal-tint); }
.rdrop-btn.open { border-color:var(--teal); box-shadow:0 0 0 2px var(--teal-tint); }
.rdrop-dot { width:8px; height:8px; border-radius:50%; flex-shrink:0; background:var(--muted2); }
.rdrop-lbl { flex:1; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
.rdrop-caret { position:absolute; right:8px; top:50%; transform:translateY(-50%); font-size:9px; color:var(--muted); pointer-events:none; transition:transform .15s; }
.rdrop-btn.open .rdrop-caret { transform:translateY(-50%) rotate(180deg); }
.rdrop-menu {
  position: absolute; top: calc(100% + 3px); left: 0;
  min-width: max(100%, 220px); z-index: 90;
  background: var(--surface); border: 1px solid var(--border);
  border-radius: var(--r-sm);
  box-shadow: 0 8px 28px rgba(25,33,102,.18), 0 0 0 1px rgba(25,33,102,.04);
  overflow: hidden; padding: 3px;
  animation: rdrop-pop .12s ease-out;
}
@keyframes rdrop-pop { from{opacity:0;transform:translateY(-4px)} to{opacity:1;transform:translateY(0)} }
.rdrop-opt {
  display: flex; align-items: center; gap: 8px;
  width: 100%; padding: 7px 9px; border: none; background: transparent;
  font-family: var(--font); font-size: 12.5px; font-weight: 500; color: var(--navy);
  cursor: pointer; text-align: left; border-radius: 4px; transition: background .1s;
}
.rdrop-opt:hover { background:var(--navy-tint); }
.rdrop-opt.selected { background:var(--teal-tint); color:var(--teal-deep); }
.rdrop-opt-dot { width:9px; height:9px; border-radius:50%; flex-shrink:0; }
.rdrop-opt-lbl { flex:1; }
.rdrop-opt-check { font-size:11px; color:var(--teal-deep); opacity:0; }
.rdrop-opt.selected .rdrop-opt-check { opacity:1; }
.rdrop-divider { height:1px; background:var(--border); margin:3px 6px; }

/* ── TEST INPUT ── */
.test-wrap { position:relative; }
.test-input {
  width: 100%; padding: 6px 20px 6px 9px;
  border: 1px solid var(--border-m); border-radius: var(--r-sm);
  font-family: var(--mono); font-size: 13px; font-weight: 400; color: var(--navy);
  background: var(--bg2); transition: all .15s;
}
.test-input:focus { outline:none; border-color:var(--teal); }
.test-input::-webkit-inner-spin-button { display:none; }
.test-wrap::after { content:'%'; position:absolute; right:7px; top:50%; transform:translateY(-50%); font-size:10px; font-weight:500; color:var(--muted); pointer-events:none; }

/* ── WEEKLY TEST CARD ── */
.weekly-test-card {
  display: flex; align-items: center; justify-content: space-between; gap: 16px;
  background: var(--bg2); border: 1px solid var(--border);
  border-radius: var(--r); padding: 14px 18px; margin-bottom: 12px;
}
.wt-left { display:flex; align-items:center; gap:12px; }
.wt-icon {
  width: 36px; height: 36px; border-radius: var(--r-sm);
  background: var(--surface); border: 1px solid var(--border);
  display: flex; align-items: center; justify-content: center;
  font-size: 16px; flex-shrink: 0;
}
.wt-lbl { font-family:var(--font); font-size:13px; font-weight:600; color:var(--navy); margin-bottom:2px; }
.wt-meta { font-size:11px; font-weight:400; color:var(--muted); }
.wt-right { display:flex; align-items:baseline; gap:3px; flex-shrink:0; }
.wt-input {
  width: 80px; padding: 8px 10px;
  border: 1px solid var(--border-m); border-radius: var(--r-sm);
  background: var(--surface);
  font-family: var(--mono); font-size: 18px; font-weight: 400; color: var(--navy);
  text-align: center; transition: all .15s;
}
.wt-input:focus { outline:none; border-color:var(--teal); box-shadow:0 0 0 2px var(--teal-tint); }
.wt-input::-webkit-inner-spin-button { display:none; }
.wt-pct { font-family:var(--font); font-size:16px; font-weight:500; color:var(--muted); }
body.readonly .wt-input { background:var(--bg2); color:var(--muted); cursor:not-allowed; }

/* ── NOTE ── */
.note-btn {
  background: none; border: none; cursor: pointer;
  font-family: var(--font); font-size: 11px; font-weight: 500;
  color: var(--muted2);
  display: flex; align-items: center; gap: 4px;
  transition: color .15s; white-space: nowrap;
}
.note-btn:hover { color:var(--teal-deep); }
.note-wrap { display:none; margin-top:8px; padding-top:8px; border-top:1px solid var(--border); }
.note-wrap.open { display:block; }
.note-ta {
  width: 100%; padding: 7px 11px;
  border: 1px solid var(--border-m); border-radius: var(--r-sm);
  font-family: var(--font); font-size: 13px; color: var(--navy);
  background: var(--bg2); resize: vertical; min-height: 52px;
  transition: border-color .15s;
}
.note-ta:focus { outline:none; border-color:var(--teal); }

/* ── DIVIDER ── */
.divider { display:flex; align-items:center; gap:12px; margin:16px 0 12px; }
.divider::before,.divider::after { content:''; flex:1; height:1px; background:var(--border); }
.divider span {
  font-family: var(--font); font-size: 10px; font-weight: 600;
  color: var(--teal-deep); text-transform: uppercase; letter-spacing: .07em; white-space: nowrap;
}

/* ── COMMENT CARDS ── */
.comm-card {
  background: var(--surface); border: 1px solid var(--border);
  border-radius: var(--r); padding: 14px 18px; margin-bottom: 10px;
}
.comm-card.tl-card { border-left: 3px solid var(--navy); background: rgba(25,33,102,.02); }
.comm-hd { display:flex; align-items:center; gap:8px; margin-bottom:10px; }
.comm-icon {
  width: 26px; height: 26px; border-radius: var(--r-sm);
  display: flex; align-items: center; justify-content: center;
  font-size: 12px; flex-shrink: 0;
}
.ci-t { background:var(--teal-tint); } .ci-tl { background:var(--navy-tint); }
.comm-meta-lbl { font-size: 10px; font-weight: 600; text-transform: uppercase; letter-spacing: .09em; color: var(--muted); margin-bottom: 1px; }
.comm-meta-title { font-family: var(--font); font-size: 13px; font-weight: 600; color: var(--navy); }
.comm-ta {
  width: 100%; padding: 9px 12px;
  border: 1px solid var(--border-m); border-radius: var(--r-sm);
  font-family: var(--font); font-size: 13px; color: var(--navy);
  background: var(--bg2); resize: vertical; min-height: 68px;
  transition: border-color .15s;
}
.comm-ta:focus { outline:none; border-color:var(--teal); }
.tl-ta { border-color:rgba(25,33,102,.15); background:rgba(255,255,255,.8); }
.tl-ta:focus { border-color:var(--navy); }

/* ── LEGEND ── */
.legend {
  background: var(--bg2); border: 1px solid var(--border);
  border-radius: var(--r-sm); padding: 8px 14px;
  margin-bottom: 14px; display: flex; gap: 16px; flex-wrap: wrap; align-items: center;
}
.legend-lbl { font-size: 10px; font-weight: 600; text-transform: uppercase; letter-spacing: .08em; color: var(--muted); }
.legend-item { display:flex; align-items:center; gap:5px; font-size: 12px; font-weight: 500; }
.ldot { width:8px; height:8px; border-radius:2px; }

/* ── OVERVIEW ── */
.ov-intro { margin-bottom:18px; }
.ov-trainee-grid { display:grid; grid-template-columns:repeat(auto-fill, minmax(240px,1fr)); gap:12px; margin-bottom:24px; }
.ov-trainee-card {
  background: var(--surface); border: 1px solid var(--border);
  border-radius: var(--r); padding: 14px 16px;
  cursor: pointer; transition: all .15s;
}
.ov-trainee-card:hover { box-shadow:0 3px 14px rgba(25,33,102,.1); transform:translateY(-1px); }
.ov-tc-name { font-family: var(--font); font-size: 15px; font-weight: 600; color: var(--navy); margin-bottom: 3px; }
.ov-tc-meta { font-size: 11px; color: var(--muted); margin-bottom: 10px; }
.ov-tc-scores { display:grid; grid-template-columns:repeat(3,1fr); gap:6px; }
.ov-tc-score-cell { text-align:center; }
.ov-tc-score-val { font-family:var(--mono); font-size:20px; font-weight:400; line-height:1; }
.ov-tc-score-lbl { font-size: 9px; font-weight: 600; text-transform: uppercase; letter-spacing: .07em; color: var(--muted); margin-top: 3px; }
.ov-detail-title { font-family: var(--font); font-size: 17px; font-weight: 600; color: var(--navy); letter-spacing: -.01em; margin-bottom: 12px; }
.ov-detail-title em { font-style: italic; font-weight: 400; color: var(--teal-deep); }
.ov-table-wrap { background: var(--surface); border: 1px solid var(--border); border-radius: var(--r); overflow: hidden; }
.ov-table { width:100%; border-collapse:collapse; font-size:13px; }
.ov-table th {
  background: var(--bg2); padding: 10px 14px;
  text-align: left; font-size: 10px; font-weight: 600;
  text-transform: uppercase; letter-spacing: .07em; color: var(--navy);
  border-bottom: 1px solid var(--border);
}
.ov-table td { padding: 9px 14px; border-bottom: 1px solid var(--border); vertical-align: middle; }
.ov-table tr:last-child td { border-bottom:none; }
.ov-table tr:hover td { background:var(--navy-tint); }
.ov-pill { display:inline-block; padding:2px 8px; border-radius:3px; font-size:11px; font-weight:600; }
.op-good  { background:var(--green-tint); color:var(--green); }
.op-ok    { background:var(--teal-tint);  color:var(--teal-deep); }
.op-watch { background:var(--amber-tint); color:var(--amber); }
.op-bad   { background:var(--red-tint);   color:var(--red); }
.op-none  { background:var(--navy-tint);  color:var(--muted); }

/* ── EMPTY STATE ── */
.empty-state { text-align:center; padding:60px 24px; }
.empty-icon { font-size:40px; margin-bottom:14px; }
.empty-title { font-family:var(--font); font-size:20px; font-weight:600; color:var(--navy); margin-bottom:6px; }
.empty-sub { color:var(--muted); font-size:14px; margin-bottom:22px; }

/* ── FOOTER ── */
.footer {
  margin-top: 40px; padding: 20px 28px;
  text-align: center; color: var(--muted); font-size: 12px;
  border-top: 1px solid var(--border);
  background: var(--surface);
}
.footer-name {
  font-family: var(--font); font-size: 13px; font-weight: 600;
  color: var(--navy); display: inline-block; margin-bottom: 3px;
}

/* ── ARCHIVE ── */
.arch-lock {
  max-width: 400px; margin: 60px auto; padding: 28px;
  background: var(--surface); border: 1px solid var(--border);
  border-radius: var(--r);
}
.arch-lock-icon { font-size:36px; margin-bottom:14px; text-align:center; }
.arch-lock-title { font-size: 18px; font-weight: 600; color: var(--navy); margin-bottom: 5px; text-align:center; }
.arch-lock-sub { font-size: 13px; color: var(--muted); margin-bottom: 20px; text-align:center; }
.arch-lock-row { display:flex; gap:8px; }
.arch-pwd-input {
  flex: 1; padding: 8px 12px;
  border: 1px solid var(--border-m); border-radius: var(--r-sm);
  font-family: var(--font); font-size: 13px; font-weight: 500; color: var(--navy);
  background: var(--bg2); transition: border-color .15s;
}
.arch-pwd-input:focus { outline:none; border-color:var(--teal); }
.arch-pwd-err { margin-top:8px; font-size:12px; font-weight:600; color:var(--red); min-height:16px; }

.arch-hd { display:flex; align-items:flex-start; justify-content:space-between; margin-bottom:16px; padding-bottom:12px; border-bottom:1px solid var(--border); }
.arch-count { font-size: 11px; font-weight: 600; text-transform: uppercase; letter-spacing: .07em; color: var(--muted); margin-top: 5px; }

.arch-grid { display:grid; grid-template-columns:repeat(auto-fill,minmax(220px,1fr)); gap:10px; }
.arch-card {
  background: var(--surface); border: 1px solid var(--border);
  border-radius: var(--r-sm); padding: 12px 14px;
  border-left: 2px solid var(--teal);
  cursor: pointer; transition: all .15s;
  display: flex; flex-direction: column; gap: 5px;
}
.arch-card:hover { box-shadow:0 3px 14px rgba(25,33,102,.1); transform:translateY(-1px); border-left-color:var(--teal-deep); }
.arch-card-top { display:flex; justify-content:space-between; align-items:flex-start; gap:8px; }
.arch-card-name { font-size: 13px; font-weight: 600; color: var(--navy); flex: 1; line-height: 1.3; }
.arch-card-score {
  font-family: var(--mono); font-size: 16px; font-weight: 400; line-height: 1;
  padding: 2px 8px; border-radius: 4px; background: var(--bg2); flex-shrink: 0;
}
.arch-card-score-empty {
  font-size: 13px; font-weight: 500; color: var(--muted2); padding: 2px 8px;
  border-radius: 4px; background: var(--bg2); flex-shrink: 0;
}
.arch-card-meta { font-size: 11px; color: var(--muted); line-height: 1.5; }
.arch-card-actions { display:flex; gap:5px; margin-top:5px; padding-top:8px; border-top:1px solid var(--border); }
.arch-card-actions .btn { flex:1; justify-content:center; }

.arch-group { margin-bottom:22px; }
.arch-group-hd {
  display: flex; align-items: baseline; justify-content: space-between;
  margin-bottom: 8px; padding: 5px 10px;
  background: var(--bg2); border-radius: var(--r-sm);
  border: 1px solid var(--border);
}
.arch-group-date { font-family: var(--font); font-size: 12px; font-weight: 600; color: var(--navy); }
.arch-group-count { font-size: 10px; font-weight: 600; text-transform: uppercase; letter-spacing: .07em; color: var(--muted); }

.arch-lock-btn {
  background: var(--navy-tint); border: 1px solid var(--border);
  border-radius: var(--r-sm); padding: 0 10px; height: 28px;
  font-family: var(--font); font-size: 11px; font-weight: 600;
  color: var(--muted); cursor: pointer;
}
.arch-lock-btn:hover { background:rgba(25,33,102,.12); color:var(--navy); }

/* ── READ-ONLY ── */
body.readonly .setup-input,
body.readonly .test-input,
body.readonly .note-ta,
body.readonly .week-ta { background:var(--bg2); color:var(--muted); cursor:not-allowed; }
body.readonly .rdrop-btn { opacity:.65; cursor:not-allowed; background:var(--bg2); }
body.readonly .add-pill,
body.readonly .pill-remove,
body.readonly .btn-archive,
body.readonly .btn-restore,
body.readonly .note-btn { opacity:.4; cursor:not-allowed; }
body.readonly .arch-card { cursor:pointer; }
body.readonly .editor-only { display:none !important; }

/* ── TOAST ── */
.toast-host {
  position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%);
  z-index: 10000; display: flex; flex-direction: column; gap: 6px; align-items: center;
  pointer-events: none;
}
.toast {
  background: var(--navy); color: #fff;
  padding: 9px 16px; border-radius: var(--r-sm);
  font-family: var(--font); font-size: 12px; font-weight: 500;
  box-shadow: 0 8px 24px rgba(25,33,102,.35);
  display: flex; align-items: center; gap: 8px;
  animation: toast-in .2s ease-out, toast-out .2s ease-in 2.6s forwards;
  pointer-events: auto;
}
.toast.toast-info { background:var(--navy); }
.toast.toast-warn { background:var(--amber); }
.toast.toast-ok   { background:var(--green); }
@keyframes toast-in  { from{opacity:0;transform:translateY(8px)} to{opacity:1;transform:translateY(0)} }
@keyframes toast-out { to{opacity:0;transform:translateY(-6px)} }

/* ── HUB ───────────────────────────────────────────── */
.hub-hd {
  display:flex; justify-content:space-between; align-items:flex-start; gap:12px;
  padding:0 0 14px; margin-bottom:14px; border-bottom:1px solid var(--border);
}
.hub-subtabs {
  display:flex; gap:4px; margin-bottom:18px;
  background:var(--bg2); padding:4px; border-radius:10px; width:fit-content;
}
.hub-stab {
  display:flex; align-items:center; gap:7px;
  padding:8px 16px; border:none; background:transparent; cursor:pointer;
  font-family:var(--font); font-size:13px; font-weight:500;
  color:var(--muted); border-radius:7px; transition:all .15s;
}
.hub-stab:hover { color:var(--navy); }
.hub-stab.active { background:var(--surface); color:var(--navy); box-shadow:0 1px 4px rgba(25,33,102,.08); }
.hub-stab.active svg { color:var(--teal-deep); }

.hub-empty {
  padding:30px 20px; text-align:center;
  color:var(--muted); font-size:13px; font-style:italic;
  background:var(--bg2); border:1px dashed var(--border-m); border-radius:var(--r-sm);
  margin-bottom:14px;
}

/* Calendar toolbar */
.cal-toolbar { display:flex; align-items:center; gap:10px; margin-bottom:14px; }
.cal-nav-btn {
  width:32px; height:32px; border-radius:8px; border:1px solid var(--border-m);
  background:var(--surface); cursor:pointer;
  display:flex; align-items:center; justify-content:center;
  color:var(--navy); transition:all .15s;
}
.cal-nav-btn:hover { background:var(--navy-tint); border-color:var(--navy); }
.cal-month-lbl {
  font-family:var(--font); font-size:18px; font-weight:600;
  color:var(--navy); min-width:200px; text-align:center; text-transform:capitalize;
}
.cal-today-btn {
  padding:6px 14px; border-radius:7px; border:1px solid var(--border-m);
  background:var(--surface); cursor:pointer;
  font-family:var(--font); font-size:12px; font-weight:500; color:var(--muted);
  transition:all .15s;
}
.cal-today-btn:hover { background:var(--navy-tint); color:var(--navy); border-color:var(--navy); }

/* Calendar grid */
.cal-grid-wrap { background:var(--surface); border:1px solid var(--border); border-radius:var(--r); overflow:hidden; box-shadow:0 1px 6px rgba(25,33,102,.05); }
.cal-grid {
  display:grid; grid-template-columns:repeat(7, 1fr); gap:0;
  background:var(--border);
}
.cal-dayname {
  background:var(--navy-tint); padding:9px 6px; text-align:center;
  font-size:10px; font-weight:600; text-transform:uppercase; letter-spacing:.08em; color:var(--muted);
}
.cal-cell {
  background:var(--surface); min-height:96px; padding:6px 0; /* zero horizontal padding to allow events to span full width */
  cursor:pointer; transition:background .12s; position:relative;
}
.cal-cell-num,
.cal-cell-events { padding-left:7px; padding-right:7px; }
.cal-cell:hover { background:rgba(0,196,208,.05); }
.cal-cell.oom { background:#fafbfd; }
.cal-cell.oom .cal-cell-num { color:var(--muted2); }
/* Weekend background (only for in-month cells; oom takes priority) */
.cal-cell.weekend:not(.oom) { background:#f3f4f7; }
/* Holiday background (overrides weekend if both apply) */
.cal-cell.holiday:not(.oom) { background:#fde8eb; }
.cal-cell.weekend.holiday:not(.oom) { background:#fde8eb; }
.cal-cell.today { background:rgba(0,196,208,.07); }
/* Today + holiday: keep today indicator priority */
.cal-cell.today.holiday:not(.oom) { background:linear-gradient(135deg, rgba(0,196,208,.07), #fde8eb); }

.cal-cell-holiday {
  font-size:9.5px; font-weight:600; color:#b14048;
  padding:0 9px; margin-bottom:3px; line-height:1.2;
  white-space:nowrap; overflow:hidden; text-overflow:ellipsis;
}
/* Today indicator: small teal dot before number, no circle around */
.cal-cell.today .cal-cell-num {
  color:var(--teal-deep); font-weight:700;
  position:relative;
}
.cal-cell.today .cal-cell-num::before {
  content:''; position:absolute; left:-2px; top:50%; transform:translateY(-50%);
  width:4px; height:4px; border-radius:50%; background:var(--teal);
}
.cal-cell-num { font-family:var(--font); font-size:12px; font-weight:600; color:var(--navy); margin-bottom:4px; display:inline-block; line-height:1; padding-left:9px; }
.cal-cell-events { display:flex; flex-direction:column; gap:2px; padding-left:0; padding-right:0; }
.cal-evt {
  padding:3px 6px;
  font-size:10.5px; font-weight:500; color:var(--navy); cursor:pointer;
  white-space:nowrap; overflow:hidden; text-overflow:ellipsis;
  display:flex; align-items:center; gap:5px;
  transition:filter .12s;
  border-radius:0;
  /* Extend slightly past cell edges so segments visually meet across day borders */
  margin-right:-1px;
  position:relative;
}
.cal-evt.seg-left { border-top-left-radius:4px; border-bottom-left-radius:4px; margin-left:4px; }
.cal-evt.seg-right { border-top-right-radius:4px; border-bottom-right-radius:4px; margin-right:4px; }
.cal-evt:hover { filter:brightness(.95); }
.cal-evt-time { font-weight:600; opacity:.8; flex-shrink:0; font-size:9.5px; }
.cal-evt-name { overflow:hidden; text-overflow:ellipsis; }
.cal-evt-more { font-size:10px; font-weight:500; color:var(--teal-deep); padding:2px 6px; cursor:pointer; }
.cal-evt-more:hover { text-decoration:underline; }

/* Event list under calendar */
.cal-list-hd {
  margin:24px 0 10px; font-size:11px; font-weight:600; text-transform:uppercase;
  letter-spacing:.08em; color:var(--muted);
}
.cal-list { display:flex; flex-direction:column; gap:9px; }
.hub-evt-row {
  display:flex; align-items:stretch; gap:0;
  background:var(--surface); border:1px solid var(--border); border-radius:var(--r-sm);
  cursor:pointer; transition:all .15s; overflow:hidden;
  box-shadow:0 1px 4px rgba(25,33,102,.04);
}
.hub-evt-row:hover { box-shadow:0 4px 14px rgba(25,33,102,.1); transform:translateY(-1px); }
.hub-evt-date {
  padding:11px 14px; background:var(--bg2);
  display:flex; flex-direction:column; align-items:center; justify-content:center;
  border-right:1px solid var(--border); min-width:64px;
}
.hub-evt-day { font-family:var(--font); font-size:22px; font-weight:600; color:var(--navy); line-height:1; }
.hub-evt-mo { font-size:10px; font-weight:500; text-transform:uppercase; letter-spacing:.06em; color:var(--muted); margin-top:2px; }
.hub-evt-bar { width:4px; flex-shrink:0; }
.hub-evt-body { padding:11px 14px; flex:1; min-width:0; }
.hub-evt-title { font-family:var(--font); font-size:14px; font-weight:600; margin-bottom:4px; }
.hub-evt-platform { font-weight:600; }
.hub-evt-meta { display:flex; gap:14px; flex-wrap:wrap; font-size:11.5px; color:var(--muted); font-weight:600; }
.hub-evt-meta span { display:inline-flex; align-items:center; gap:5px; }

/* Event modal */
.evt-grid { display:grid; grid-template-columns:1fr 1fr; gap:12px; }
.evt-trainees-list {
  display:flex; flex-direction:column; gap:6px;
  max-height:280px; overflow-y:auto;
  background:var(--bg2); padding:10px; border-radius:var(--r-sm); border:1px solid var(--border);
}
.evt-trainee-row {
  display:flex; align-items:stretch; gap:6px;
}
.evt-trainee-row .setup-input { flex:1; }
.evt-trainee-rm {
  width:34px; flex-shrink:0;
  border:1px solid var(--border-m); background:var(--surface);
  border-radius:var(--r-sm); cursor:pointer;
  display:flex; align-items:center; justify-content:center;
  color:var(--muted); transition:all .15s;
}
.evt-trainee-rm:hover { background:var(--red-tint); color:var(--red); border-color:var(--red); }
/* Legacy checkbox grid kept for material tag selection */
.evt-trainees {
  display:grid; grid-template-columns:repeat(auto-fill, minmax(180px,1fr)); gap:6px;
  max-height:200px; overflow-y:auto;
  background:var(--bg2); padding:10px; border-radius:var(--r-sm); border:1px solid var(--border);
}
.evt-trainee-chk {
  display:flex; align-items:center; gap:7px; padding:5px 8px; cursor:pointer;
  font-size:12.5px; font-weight:500; color:var(--navy); border-radius:6px;
  transition:background .12s;
}
.evt-trainee-chk:hover { background:rgba(25,33,102,.06); }
.evt-trainee-chk input { cursor:pointer; }
.evt-trainee-chk em { color:var(--muted2); font-size:10px; font-weight:600; font-style:normal; }

/* Materials */
.mat-toolbar { display:flex; align-items:center; gap:10px; margin-bottom:14px; flex-wrap:wrap; }
.mat-filter { width:auto; min-width:140px; padding:7px 10px; font-size:12px; }
.mat-list { display:flex; flex-direction:column; gap:10px; }
.mat-card {
  display:flex; align-items:flex-start; gap:14px;
  background:var(--surface); border:1px solid var(--border); border-radius:var(--r-sm);
  padding:14px 16px; box-shadow:0 1px 4px rgba(25,33,102,.04);
  transition:all .15s;
}
.mat-card:hover { box-shadow:0 4px 14px rgba(25,33,102,.1); }
.mat-icon {
  width:42px; height:42px; flex-shrink:0;
  background:var(--navy-tint); border-radius:9px;
  display:flex; align-items:center; justify-content:center; color:var(--navy);
}
.mat-body { flex:1; min-width:0; }
.mat-row1 { display:flex; align-items:flex-start; justify-content:space-between; gap:10px; }
.mat-title {
  font-family:var(--font); font-size:14px; font-weight:600;
  color:var(--navy); text-decoration:none; line-height:1.4;
}
.mat-title:hover { color:var(--teal-deep); text-decoration:underline; }
.mat-actions { display:flex; gap:4px; flex-shrink:0; }
.mat-act {
  width:28px; height:28px; border-radius:6px; border:none; background:transparent;
  cursor:pointer; color:var(--muted); transition:all .12s;
  display:flex; align-items:center; justify-content:center;
}
.mat-act:hover { background:var(--navy-tint); color:var(--navy); }
.mat-act-danger:hover { background:var(--red-tint); color:var(--red); }
.mat-meta { font-size:11px; font-weight:600; color:var(--muted); margin-top:2px; }
.mat-meta .mat-type { color:var(--teal-deep); font-weight:600; text-transform:uppercase; letter-spacing:.05em; font-size:10px; }
.mat-desc { font-size:12.5px; color:var(--navy); line-height:1.5; margin-top:6px; }
.mat-tags { display:flex; gap:5px; flex-wrap:wrap; margin-top:6px; }
.mat-tag {
  padding:2px 8px; border-radius:10px;
  background:var(--teal-tint); color:var(--teal-deep);
  font-size:10px; font-weight:600; text-transform:uppercase; letter-spacing:.05em;
}

@media(max-width:700px) {
  .cal-cell { min-height:60px; padding:4px; }
  .cal-cell-num { font-size:11px; }
  .cal-evt-name { display:none; }
  .cal-evt { padding:2px 4px; font-size:9px; }
  .evt-grid { grid-template-columns:1fr; }
}


/* ── MODAL ── */
.mdl-back {
  position: fixed; inset: 0; z-index: 9999;
  background: rgba(15,20,60,.6); backdrop-filter: blur(3px);
  display: flex; align-items: center; justify-content: center;
  padding: 80px 20px 20px;
  animation: mdl-fade .15s ease-out;
}
@keyframes mdl-fade { from{opacity:0} to{opacity:1} }

const RATINGS = [

  {v:'exceptional',   l:'Exceptional ★'},
  {v:'no_concern',    l:'No Concern ✓'},
  {v:'attention',     l:'Attention ⚠'},

  {v:'paid_leave',    l:'Paid Leave'},

];
const SCORE = {exceptional:95,no_concern:75,attention:55,cause_concern:35,not_applicable:75,paid_leave:60,sick_leave:60,holidays:60};

/* ───── HOLIDAYS (Bulgarian) ───── */
// КТ чл. 154 — Bulgarian official public holidays.
// Computus (Meeus / Orthodox Easter algorithm) + fixed-date holidays.
function _orthodoxEaster(year) {
  // Returns {month, day} of Orthodox Easter Sunday (Gregorian calendar).
  const a = year % 4;
  const b = year % 7;
  const c = year % 19;
  const d = (19*c + 15) % 30;
  const e = (2*a + 4*b - d + 34) % 7;
  const julianMonth = Math.floor((d + e + 114) / 31); // 3=March, 4=April
  const julianDay = ((d + e + 114) % 31) + 1;
  // Convert Julian to Gregorian (add 13 days for 1900-2099)
  const j = new Date(Date.UTC(year, julianMonth - 1, julianDay));
  j.setUTCDate(j.getUTCDate() + 13);
  return { month: j.getUTCMonth() + 1, day: j.getUTCDate() };
}

function _bgFixedHolidays(year) {
  // Returns ISO date strings for fixed holidays
  const list = [
    [1, 1,   "Нова година"],
    [3, 3,   "Освобождение на България"],
    [5, 1,   "Ден на труда"],
    [5, 6,   "Гергьовден"],
    [5, 24,  "Св. св. Кирил и Методий"],
    [9, 6,   "Съединение"],
    [9, 22,  "Независимост"],
    [12, 24, "Бъдни вечер"],
    [12, 25, "Рождество Христово"],
    [12, 26, "Рождество Христово"],
  ];
  return list.map(([m, d, name]) => ({
    iso: `${year}-${String(m).padStart(2,'0')}-${String(d).padStart(2,'0')}`,
    name
  }));
}

function _bgEasterHolidays(year) {
  const easter = _orthodoxEaster(year);
  const easterSun = new Date(Date.UTC(year, easter.month - 1, easter.day));
  const goodFri = new Date(easterSun); goodFri.setUTCDate(easterSun.getUTCDate() - 2);
  const easterMon = new Date(easterSun); easterMon.setUTCDate(easterSun.getUTCDate() + 1);
  const fmt = d => `${d.getUTCFullYear()}-${String(d.getUTCMonth()+1).padStart(2,'0')}-${String(d.getUTCDate()).padStart(2,'0')}`;
  return [
    { iso: fmt(goodFri),   name: "Велики Петък" },
    { iso: fmt(easterSun), name: "Великден" },
    { iso: fmt(easterMon), name: "Велики Понеделник" },
  ];
}

// Cache (year → Map of iso → {name, observed?})
const _holidayCache = {};
function bgHolidaysForYear(year) {
  if (_holidayCache[year]) return _holidayCache[year];
  const all = [..._bgFixedHolidays(year), ..._bgEasterHolidays(year)];
  // Build map of "real" holidays
  const map = new Map();
  all.forEach(h => map.set(h.iso, { name: h.name, observed: false }));
  // Apply КТ чл. 154 ал. 2 — if a holiday falls on Sat/Sun, the next working day is also off.
  // Rule: roll forward through weekend(s) AND already-marked holidays until a free workday.
  const isoToD = iso => new Date(iso + 'T00:00:00');
  const fmt = d => `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
  const wknd = iso => { const dow = isoToD(iso).getDay(); return dow === 0 || dow === 6; };
  // Iterate over real holidays sorted; observed days append
  const observedAdds = [];
  [...map.entries()].sort(([a],[b]) => a.localeCompare(b)).forEach(([iso, info]) => {
    if (!wknd(iso)) return;
    // Find next working day that is neither weekend nor an existing holiday/observed
    const d = isoToD(iso);
    let safety = 0;
    while (safety < 14) {
      d.setDate(d.getDate() + 1);
      const candidate = fmt(d);
      if (!wknd(candidate) && !map.has(candidate) && !observedAdds.some(o => o.iso === candidate)) {
        observedAdds.push({ iso: candidate, name: info.name + ' (observed)', observed: true });
        break;
      }
      safety++;
    }
  });
  observedAdds.forEach(o => map.set(o.iso, { name: o.name, observed: true }));
  _holidayCache[year] = map;
  return map;
}

function bgHolidayInfo(iso) {
  if (!iso) return null;
  const year = parseInt(iso.slice(0, 4), 10);
  if (isNaN(year)) return null;
  const map = bgHolidaysForYear(year);
  return map.get(iso) || null;
}

function bgIsDayOff(iso) {
  // Day off = weekend OR holiday (real) OR observed holiday rollover
  if (!iso) return false;
  const d = new Date(iso + 'T00:00:00');
  const dow = d.getDay();
  if (dow === 0 || dow === 6) return true;
  return !!bgHolidayInfo(iso);
}

 докъто ги изчистим. Има някаква несигурност при него, не мога да разбера от къде идва това.", "tlComment": ""}, "w3": {"days": [{"note": "", "punctuality": "no_concern", "technical_knowledge": "attention", "behavior": "no_concern", "participation": "no_concern", "test": ""}, {"note": "", "punctuality": "no_concern", "technical_knowledge": "no_concern", "behavior": "no_concern", "participation": "no_concern", "test": ""}, {"note": "", "punctuality": "no_concern", "technical_knowledge": "attention", "behavior": "no_concern", "participation": "no_concern", "test": ""}, {"note": "", "punctuality": "no_concern", "technical_knowledge": "attention", "behavior": "no_concern", "participation": "no_concern", "test": ""}, {"note": "", "punctuality": "no_concern", "technical_knowledge": "attention", "behavior": "no_concern", "participation": "no_concern", "test": ""}], "weeklyComment": "като става много и по сложен материала се затруднява, мисля че много от нещата ще трябва да се повторят по няколко пъти с него. Иначе има разбиране за нещата , просто обема му идва много вече. ПОвторете нещата ако трябва и наблягайте на тестването повечеко.", "tlComment": ""}, "w4": {"days": [{"note": "", "punctuality": "", "technical_knowledge": "", "behavior": "", "participation": "", "test": ""}, {"note": "", "punctuality": "", "technical_knowledge": "", "behavior": "", "participation": "", "test": ""}, {"note": "", "punctuality": "", "technical_knowledge": "", "behavior": "", "participation": "", "test": ""}, {"note": "", "punctuality": "", "technical_knowledge": "", "behavior": "", "participation": "", "test": ""}, {"note": "", "punctuality": "", "technical_knowledge": "", "behavior": "", "participation": "", "test": ""}], "weeklyComment": "", "tlComment": ""}, "w5": {"days": [{"note": "", "language_proficiency": "no_concern", "engagement": "exceptional", "technical_knowledge": "attention", "productivity": "exceptional", "behavior": "no_concern"}, {"note": "", "language_proficiency": "no_c   {id:'arc012',name:'Simeon Velinov',date:'2024-09-24',trainer:'Miroslav Monev',mentor:'Vesela Kambitova',archived:true,archivedAt:'2024-09-24',weeks:{"w1": {"days": [{"note": "", "punctuality": "not_applicable", "technical_knowledge": "not_applicable", "behavior": "not_applicable", "participation": "not_applicable", "test": "83"}, {"note": "", "punctuality": "no_concern", "technical_knowledge": "no_concern", "behavior": "no_concern", "participation": "no_concern", "test": ""}, {"note": "", "punctuality": "no_concern", "technical_knowledge": "no_concern", "behavior": "no_concern", "participation": "no_concern", "test": ""}, {"note": "", "punctuality": "no_concern", "technical_knowledge": "no_concern", "behavior": "no_concern", "participation": "no_concern", "test": ""}, {"note": "", "punctuality": "no_concern", "technical_knowledge": "no_concern", "behavior": "no_concern", "participation": "no_concern", "test": ""}], "weeklyComment": "За сега нямам много наблюдения върху Симеон, изглежда да разбира какво се иска и как трябва да стане и следи логически нещата, което е добре. Внимава но мисля че повечко следене на документацията няма да му дойде зле, особено когато стане много информацията.", "tlComment": ""}, "w2": {"days": [{"note": "", "punctuality": "no_concern", "technical_knowledge": "no_concern", "behavior": "no_concern", "participation": "no_concern", "test": ""}, {"note": "", "punctuality": "no_concern", "technical_knowledge": "no_concern", "behavior": "no_concern", "participation": "no_concern", "test": ""}, {"note": "", "punctuality": "no_concern", "technical_knowledge": "no_concern", "behavior": "no_concern", "participation": "no_concern", "test": ""}, {"note": "", "punctuality": "no_concern", "technical_knowledge": "no_concern", "behavior": "no_concern", "participation": "no_concern", "test": ""}, {"note": "", "punctuality": "no_concern", "technical_knowledge": "no_concern", "behavior": "no_concern", "participation": "no_concern", "test": ""}], "weeklyComment": "Наблюденията ми от първата седмица със Симо са, че се справя с материала без проблеми. От двамата, за момента, той се справя една идея по-добре и по-бързо.\nНе се срамува да предлага решения на задачите, да споделя мнението си. Винаги се опитва да намери отговор на нещата, вместо да каже не знам или не мога.\nЕдинственото нещо, което мога да изтъкна като проблем е, че в някои моменти избързва. Вместо да провери нещата си на спокойствие, предпочита да прати задачите по-бързо. Това е причината понякога да допуска малки грешки.", "tlComment": ""}, "w3": {"days": [{"note": "", "punctuality": "no_concern", "technical_knowledge": "no_concern", "behavior": "no_concern", "participation": "no_concern", "test": ""}, {"note": "", "punctuality": "no_concern", "technical_knowledge": "no_concern", "behavior": "no_concern", "participation": "no_concern", "test": ""}, {"note": "", "punctuality": "no_concern", "technical_knowledge": "no_concern", "behavior": "no_concern", "participation": "no_concern", "test": ""}, {"note": "", "punctuality": "no_concern", "technical_knowledge": "no_concern", "behavior": "no_concern", "participation": "no_concern", "test": ""}, {"note": "", "punctuality": "no_concern", "technical_knowledge": "no_concern", "behavior": "no_concern", "participation": "no_concern", "test": ""}], "weeklyComment": "Затвърждава мнението от миналата седмица. Няма проблеми със задачите, справя се с всичко без проблем.\nТрябва да го похваля, защото винаги се опитва да се справи със задачите сам, дори и да става въпрос за нещо, с което не се е сблъсквал до момента, вместо веднага да ме пита за решение.\nРаботи доста бързо, но продължава в някои моменти да избързва, което и самият той го отчита като проблем.", "tlComment": ""}, "w4": {"days": [{"note": "", "punctuality": "no_concern", "technical_knowledge": "no_concern", "behavior": "no_concern", "participation": "no_concern", "test": ""}, {"note": "", "punctuality": "no_concern", "technical_knowledge": "no_concern", "behavior": "no_concern", "participation": "no_concern", "test": ""}, {"note": "", "punctuality": "no_concern", "technical_knowledge": "attention", "behavior": "no_concern", "participation": "no_concern", "test": ""}, {"note": "", "punctuality": "no_concern", "technical_knowledge": "no_concern", "behavior": "no_concern", "participation": "no_concern", "test": ""}, {"note": "", "punctuality": "not_applicable", "technical_knowledge": "not_applicable", "behavior": "not_applicable", "participation": "not_applicable", "test": ""}], "weeklyComment": "Тази седмица главно работихме по реални проекти, където Симо срещна проблеми с разбирането на отделни инструкции по въпросниците (което е нормално имайки предвид, че някои неща виждаме за първи път).\nИзвън това той продължава да се справя отлично - задава адекватни въпроси и вкарва мисъл за проверките, които пише. Взима предвид нещата, на които обръщаме внимание.\nНямам съмнения, че с още практика ще стане много добър QA.", "tlComment": ""}, "w5": {"days": [{"note": "", "language_proficiency": "not_applicable", "engagement": "not_applicable", "technical_knowledge": "not_applicable", "productivity": "not_applicable", "behavior": "not_applicable"}, {"note": "", "language_proficiency": "no_concern", "engagement": "no_concern", "technical_knowledge": "no_concern", "productivity": "no_concern", "behavior": "no_concern"}, {"note": "", "language_proficiency": "no_concern", "engagement": "no_concern", "technical_knowledge": "no_concern", "productivity": "no_concern", "behavior": "no_concern"}, {"note": "", "language_proficiency": "no_concern", "engagement": "no_concern", "technical_knowledge": "no_concern", "productivity": "no_concern", "behavior": "no_concern"}, {"note": "", "language_proficiency": "no_concern", "engagement": "no_concern", "technical_knowledge": "no_concern", "productivity": "no_concern", "behavior": "no_concern"}], "weeklyComment": "Първите ми впечатления от Симеон са, че той е мотивиран, работата му харесва и прави зададените тестови проекти с интерес. Има добър поглед върху логическата част, следи материалите внимателно и се опитва да разпише валидацията по възможно най-добрия начин, като си помага с документацията и доста въпроси към мен.", "tlComment": ""}, "w6": {"days": [{"note": "", "language_proficiency": "no_concern", "engagement": "no_concern", "technical_knowledge": "no_concern", "productivity": "no_concern", "behavior": "no_concern"}, {"note": "", "language_proficiency": "no_concern", "engagement": "no_concern", "technical_knowledge": "no_concern", "productivity": "no_concern", "behavior": "no_concern"}, {"note": "", "language_proficiency": "no_concern", "engagement": "no_concern", "technical_knowledge": "no_concern", "productivity": "no_concern", "behavior": "no_concern"}, {"note": "", "language_proficiency": "no_concern", "engagement": "no_concern", "technical_knowledge": "no_concern", "productivity": "no_concern", "behavior": "no_concern"}, {"note": "", "language_proficiency": "no_concern", "engagement": "no_concern", "technical_knowledge": "no_concern", "productivity": "no_concern", "behavior": "no_concern"}], "weeklyComment": "Симеон се справя добре. Задава въпроси винаги когато има нужда, любопитен е и сам търси решения за казусите си. Има добър подход към логичекста част на валидациите и добре се ориентира в работата си.", "tlComment": ""}, "w7": {"days": [{"note": "", "language_proficiency": "", "engagement": "", "technical_knowledge": "", "productivity": "", "behavior": ""}, {"note": "", "language_proficiency": "", "engagement": "", "technical_knowledge": "", "productivity": "", "behavior": ""}, {"note": "", "language_proficiency": "", "engagement": "", "technical_knowledge": "", "productivity": "", "behavior": ""}, {"note": "", "language_proficiency": "", "engagement": "", "technical_knowledge": "", "productivity": "", "behavior": ""}, {"note": "", "language_proficiency": "", "engagement": "", "technical_knowledge": "", "productivity": "", "behavior": ""}], "weeklyComment": "", "tlComment": ""}, "w8": {"days": [{"note": "", "language_proficiency": "", "engagement": "", "technical_knowledge": "", "productivity": "", "behavior": ""}, {"note": "", "language_proficiency": "", "engagement": "", "technical_knowledge": "", "productivity": "", "behavior": ""}, {"note": "", "language_proficiency": "", "engagement": "", "technical_knowledge": "", "productivity": "", "behavior": ""}, {"note": "", "language_proficiency": "", "engagement": "", "technical_knowledge": "", "productivity": "", "behavior": ""}, {"note": "", "language_proficiency": "", "engagement": "", "technical_knowledge": "", "productivity": "", "behavior": ""}], "weeklyComment": "", "tlComment": ""}}},
  {id:'arc013',name:'Silviya Gelusheva',date:'2024-09-24',trainer:'Miroslav Monev',mentor:'Angel Pankovski',archived:true,archivedAt:'2024-09-24',weeks:{"w1": {"days": [{"note": "", "punctuality": "not_applicable", "technical_knowledge": "not_applicable", "behavior": "not_applicable", "participation": "not_applicable", "test": "45"}, {"note": "", "punctuality": "no_concern", "technical_knowledge": "no_concern", "behavior": "no_concern", "participation": "no_concern", "test": ""}, {"note": "", "punctuality": "no_concern", "technical_knowledge": "attention", "behavior": "attention", "participation": "no_concern", "test": ""}, {"note": "", "punctuality": "no_concern", "technical_knowledge": "attention", "behavior": "attention", "participation": "no_concern", "test": ""}, {"note": "", "punctuality": "no_concern", "technical_knowledge": "attention", "behavior": "cause_concern", "participation": "no_concern", "test": ""}], "weeklyComment": "Имаме затруднения с нея, доста е притеснена и понякога разсеяна тея дни, има нещо което я товари може би в личен план и това се отразява на цялостния тренинг. Казва че спи по малко и се опитва да навакса нещата ама това по скоро прече. Помолих я, когато си почине и поуспокои, да прегледа материала и да ми кажев поненелник какво не е достатъчно ясно и да го повторим, Опитах се да я успокоя че имаме достатъчно време и никой не я гони за резултати, да видим дали това ще помогне.", "tlComment": ""}, "w2": {"days": [{"note": "", "punctuality": "no_concern", "technical_knowledge": "no_concern", "behavior": "no_concern", "participation": "no_concern", "test": ""}, {"note": "", "punctuality": "no_concern", "technical_knowledge": "no_concern", "behavior": "no_concern", "participation": "no_concern", "test": ""}, {"note": "", "punctuality": "no_concern", "technical_knowledge": "no_concern", "behavior": "no_concern", "participation": "no_concern", "test": ""}, {"note": "", "punctuality": "no_concern", "technical_knowledge": "no_concern", "behavior": "no_concern", "participation": "no_concern", "test": ""}, {"note": "", "punctuality": "no_concern", "technical_knowledge": "no_concern", "behavior": "no_concern", "participation": "no_concern", "test": ""}], "weeklyComment": "Силвето започна по-плахо/притеснително, но с течение на трейнинга се отпусна. За момента не виждам сериозни проблеми със задачите, които им давам - ако има въпроси не се страхува да пита.\nВъпреки че се справя една идея не толкова добре колкото Симо, в някои случаи дава решения на задачите, които са по-добри от неговите.\nВсе още не се е отпуснала напълно (когато прави грешки се извинява по няколко пъти, което не мисля че нужно, понеже е нормално да допускат грешки на този етап), но надявам се до края на трейнинга нещата да са много по-добре.", "tlComment": ""}, "w3": {"days": [{"note": "", "punctuality": "no_concern", "technical_knowledge": "no_concern", "behavior": "no_concern", "participation": "no_concern", "test": ""}, {"note": "", "punctuality": "no_concern", "technical_knowledge": "no_concern", "behavior": "no_concern", "participation": "no_concern", "test": ""}, {"note": "", "punctuality": "no_concern", "technical_knowledge": "no_concern", "behavior": "no_concern", "participation": "no_concern", "test": ""}, {"note": "", "punctuality": "no_concern", "technical_knowledge": "no_concern", "behavior": "no_concern", "participation": "no_concern", "test": ""}, {"note": "", "punctuality": "no_concern", "technical_knowledge": "no_concern", "behavior": "no_concern", "participation": "no_concern", "test": ""}], "weeklyComment": "Вижда се подобрение спрямо миналата седмица. Личи си, че се справя с материала по-лесно.\nВъпреки че остава една идея по-бавна от Симо, трябва да я поздравя, за това че страшно много се старае. Дава по няколко решения на задачите и търси мнение кое е най-доброто. Понякога остава след работа да навакса. Винаги всичко при нея е много добре и прилежно структурирано/написано.\nПродължава в същия дух от миналата седмица, но и надгради добрите впечатления.", "tlComment": ""}, "w4": {"days": [{"note": "", "punctuality": "no_concern", "technical_knowledge": "no_concern", "behavior": "no_concern", "participation": "no_concern", "test": ""}, {"note": "", "punctuality": "no_concern", "technical_knowledge": "no_concern", "behavior": "no_concern", "participation": "no_concern", "test": ""}, {"note": "", "punctuality": "no_concern", "technical_knowledge": "attention", "behavior": "exceptional", "participation": "no_concern", "test": ""}, {"note": "", "punctuality": "no_concern", "technical_knowledge": "attention", "behavior": "no_concern", "participation": "no_concern", "test": ""}, {"note": "", "punctuality": "not_applicable", "technical_knowledge": "not_applicable", "behavior": "not_applicable", "participation": "not_applicable", "test": ""}], "weeklyComment": "При Силвето нещата стоят по подобен начин както при Симо, но тя среща повече затруднения с разбирането на инструкции по въпросниците. Основните неща разписва лесно, но има проблеми при използването на по-сложни филтри и проверката на маркери.\nВъпреки трудностите, тя продължава много да се старае - задава въпроси, интересува се как трябва да се пишат проверките, остава допълнително за да настигне Симо.\nС още практика съм сигурен, че нещата ще станат много по-добре.", "tlComment": ""}, "w5": {"days": [{"note": "", "language_proficiency": "not_applicable", "engagement": "not_applicable", "technical_knowledge": "not_applicable", "productivity": "not_applicable", "behavior": "not_applicable"}, {"note": "", "language_proficiency": "not_applicable", "engagement": "not_applicable", "technical_knowledge": "not_applicable", "productivity": "not_applicable", "behavior": "not_applicable"}, {"note": "", "language_proficiency": "no_concern", "engagement": "no_concern", "technical_knowledge": "no_concern", "productivity": "no_concern", "behavior": "no_concern"}, {"note": "", "language_proficiency": "no_concern", "engagement": "no_concern", "technical_knowledge": "no_concern", "productivity": "no_concern", "behavior": "no_concern"}, {"note": "", "language_proficiency": "no_concern", "engagement": "no_concern", "technical_knowledge": "no_concern", "productivity": "no_concern", "behavior": "no_concern"}], "weeklyComment": "Силвето е усвоила всичко основно от гледна точка на Dimensions синтаксиса. Справя се сравнително бързо при проекти с complexity от 1 до 3. Прави всички нужни проверки, рядко се случва да е пропуснала да провери нещо и мисля, че с практиката ще минимизира максимално пропуските. Изпитва затруднение при проверка на променливи, които се използват за лийст фул алокация. Мисля, че ще изчисти този проблем след като през ръцете и преминат повечко проекти.", "tlComment": ""}, "w6": {"days": [{"note": "", "language_proficiency": "no_concern", "engagement": "no_concern", "technical_knowledge": "no_concern", "productivity": "no_concern", "behavior": "no_concern"}, {"note": "", "language_proficiency": "no_concern", "engagement": "no_concern", "technical_knowledge": "no_concern", "productivity": "no_concern", "behavior": "no_concern"}, {"note": "", "language_proficiency": "no_concern", "engagement": "no_concern", "technical_knowledge": "attention", "productivity": "no_concern", "behavior": "no_concern"}, {"note": "", "language_proficiency": "not_applicable", "engagement": "not_applicable", "technical_knowledge": "not_applicable", "productivity": "not_applicable", "behavior": "not_applicable"}, {"note": "", "language_proficiency": "not_applicable", "engagement": "not_applicable", "technical_knowledge": "not_applicable", "productivity": "not_applicable", "behavior": "not_applicable"}], "weeklyComment": "Хвана инерцията на проектите и започна да ги завършва по-бързо. Също така има и по-малко въпроси свързани с интрукциите във въпросника. Запознах я с идеята на тракерите. Прегледала е файла, който Вал е направила за етапите, развититето и стъпките, които се изискват от QA в един проект, но не задълбочено.", "tlComment": ""}, "w7": {"days": [{"note": "", "language_proficiency": "no_concern", "engagement": "no_concern", "technical_knowledge": "attention", "productivity": "no_concern", "behavior": "no_concern"}, {"note": "", "language_proficiency": "no_concern", "engagement": "no_concern", "technical_knowledge": "attention", "productivity": "no_concern", "behavior": "no_concern"}, {"note": "", "language_proficiency": "no_concern", "engagement": "no_concern", "technical_knowledge": "attention", "productivity": "no_concern", "behavior": "no_concern"}, {"note": "", "language_proficiency": "", "engagement": "", "technical_knowledge": "", "productivity": "", "behavior": ""}, {"note": "", "language_proficiency": "", "engagement": "", "technical_knowledge": "", "productivity": "", "behavior": ""}], "weeklyComment": "Започнахме работа по реални проекти и запознаване със стъпките на NWB. За начало хванахме по-лесни тракери с никакви или минимални промени по тях. Направихме фърст чек и експортнахме данни. Виждам, че си записва стъпките и след като приключим със работата по проект, иска да обобщим нещата, които сме правили - тя описва стъпките и действията, аз и потвърждавам дали правилно е запомнила и разбрала. Все още действа наизуст, но в един момент ще започне да прави нещата с разбиране. Отнема и малко повече време да разбере идеята на всяка стъпка на NWB, което забавя с една идея процеса на работа, но не мисля, че това е фатално. Разсейва се, когато и се натрупат няколко нови неща", "tlComment": ""}, "w8": {"days": [{"note": "", "language_proficiency": "", "engagement": "", "technical_knowledge": "", "productivity": "", "behavior": ""}, {"note": "", "language_proficiency": "", "engagement": "", "technical_knowledge": "", "productivity": "", "behavior": ""}, {"note": "", "language_proficiency": "", "engagement": "", "technical_knowledge": "", "productivity": "", "behavior": ""}, {"note": "", "language_proficiency": "", "engagement": "", "technical_knowledge": "", "productivity": "", "behavior": ""}, {"note": "", "language_proficiency": "", "engagement": "", "technical_knowledge": "", "productivity": "", "behavior": ""}], "weeklyComment": "", "tlComment": ""}}},

, "technical_knowledge": "no_concern", "productivity": "no_concern", "behavior": "no_concern"}], "weeklyComment": "Първия ден получи нов проект - продуктов тест с ротационен план. Говорихме си за ротирани и деротирани данни. Забелязах, че е малко объркана, според мен, разбира нещата, които и обяснявам, но се притеснява. Трудно и е да естимира дати за дъми данни, тест линк. Трябва да се проведе среща с нея за писане на мейли. Третия ден и показах как се сетват BCs, Audio recordings и iScreenOut, обясних и за какво и как се използват. Изпрати тест линк на време - цялоатно се справя добе, има няколко малки технически пропуска, които и показах и след върат фийдбек си оправи всички грешки. След предаден тестови проект сама попита какво да прави - търси си задачи. Четвърдия ден минахме през DummyData, DMQuery, NWB и Multicountry проекти. Забелязва пропуски във въпросниците и връща адекватни коментари. В четвъртък получи и нов тестови проект (multicountry с 2 държави + sec module). Последния ден от тази седмица говорихме за тракери и пазене на дейта лейаут (получи лайв проект).", "tlComment": ""}, "w6": {"days": [{"note": "", "language_proficiency": "no_concern", "engagement": "no_concern", "technical_knowledge": "no_concern", "productivity": "no_concern", "behavior": "no_concern"}, {"note": "", "language_proficiency": "no_concern", "engagement": "no_concern", "technical_knowledge": "no_concern", "productivity": "no_concern", "behavior": "no_concern"}, {"note": "", "language_proficiency": "no_concern", "engagement": "no_concern", "technical_knowledge": "no_concern", "productivity": "no_concern", "behavior": "no_concern"}, {"note": "", "language_proficiency": "no_concern", "engagement": "no_concern", "technical_knowledge": "no_concern", "productivity": "no_concern", "behavior": "no_concern"}, {"note": "", "language_proficiency": "no_concern", "engagement": "no_concern", "technical_knowledge": "no_concern", "productivity": "no_concern", "behavior": "no_concern"}], "weeklyComment": "Забелязвам, че и е трудно да прецени колко време ще и е нужно, за да свърши дадена работа. Забелязва нередности във въпросника и праща адекватни коментари на РЕ, флагва всичко, което не е окей по материалите. Спазва си таймингите за дъми данни и тест линк. Показах и как да дебъгва, когато пуска дъми данни, но със сигурност ще трябва да се поработи над това. Проактивна е, когато остане без задачи, си търси занимание свързано с работата. Справила се е добре с работата по тракер проекта, запазила е лейаута. Повечето мейли си ги пише сама и се налага да преправям много малко. Това, което ме притеснява е, че въпреки записите, задава въпроси, без да се сети да ги погледне, но ще го изговоря с нея. Ще изговоря и да опитва първо да помисли за решение сама и след това да търси отговор от мен.", "tlComment": ""}, "w7": {"days": [{"note": "", "language_proficiency": "no_concern", "engagement": "no_concern", "technical_knowledge": "no_concern", "productivity": "no_concern", "behavior": "no_concern"}, {"note": "", "language_proficiency": "no_concern", "engagement": "no_concern", "technical_knowledge": "no_concern", "productivity": "no_concern", "behavior": "no_concern"}, {"note": "", "language_proficiency": "no_concern", "engagement": "no_concern", "technical_knowledge": "no_concern", "productivity": "no_concern", "behavior": "no_concern"}, {"note": "", "language_proficiency": "not_applicable", "engagement": "not_applicable", "technical_knowledge": "not_applicable", "productivity": "not_applicable", "behavior": "not_applicable"}, {"note": "", "language_proficiency": "not_applicable", "engagement": "not_applicable", "technical_knowledge": "not_applicable", "productivity": "not_applicable", "behavior": "not_applicable"}], "weeklyComment": "Вече работи активно по проекти. Минахме през експортване и импортване на преводи. Споменах и какви казуси могат да излязат с MRT-тата. Успява да се справя и без моя помощ.", "tlComment": ""}, "w8": {"days": [{"note": "", "language_profic function emptyState() {
  const t = newTrainee();
  return {
    trainees:[t], activeId:t.id, activeWeek:'w1', archived: DEFAULT_ARCHIVED,
    hub: { events: [], materials: [], hubTab: 'cal', calCursor: '' }
  };
}

let S = window.FORM_DATA
  || (() => { try { return JSON.parse(localStorage.getItem('tt3_state')||'null'); } catch(e){ return null; } })()
  || emptyState();

// Migration: per-day test → week-level test (only w1 keeps a test now)
function migrateTests(t) {
  if (!t.weeks) return;
  WD.forEach(def => {
    const wd = t.weeks[def.id];
    if (!wd) return;
    if (def.test) {
      // w1 — promote first non-empty per-day test to week-level if not already set
      if (wd.test === undefined || wd.test === null) {
        const found = (wd.days||[]).map(d => d.test).find(v => v !== '' && v != null);
        wd.test = found || '';
      }
    } else {
      // w2..w8 — strip any leftover week-level test
      if ('test' in wd) delete wd.test;
    }
    // strip per-day test from every week (no longer used anywhere)
    (wd.days||[]).forEach(d => { if ('test' in d) delete d.test; });
  });
}

// Apply all migrations to a state object. Used at init and after every Gist pull.
function applyMigrations(state) {
  if (!state || !state.trainees) return state;
  if (!state.activeId && state.trainees.length) state.activeId = state.trainees[0].id;
  if (!state.activeWeek || state.activeWeek === 'w0') state.activeWeek = 'w1';
  if (!state.archived) state.archived = DEFAULT_ARCHIVED;
  // Drop legacy onboarding (w0) data
  state.trainees.forEach(t => { if (t.weeks && t.weeks.w0) delete t.weeks.w0; });
  state.archived.forEach(t => { if (t.weeks && t.weeks.w0) delete t.weeks.w0; });
  // Test field migration
  state.trainees.forEach(migrateTests);
  state.archived.forEach(migrateTests);
  // Ensure all weeks exist
  state.trainees.forEach(t => { WD.forEach(def => { if (!t.weeks[def.id]) t.weeks[def.id] = emptyWeeks()[def.id]; }); });
  // Hub: events + materials live alongside trainees (independent feature)
  if (!state.hub) state.hub = { events: [], materials: [], hubTab: 'cal', calCursor: '' };
  if (!Array.isArray(state.hub.events))    state.hub.events = [];
  if (!Array.isArray(state.hub.materials)) state.hub.materials = [];
  if (!state.hub.hubTab) state.hub.hubTab = 'cal';
  return state;
}

// Initial load — keep localStorage as offline fallback only
if (!S.trainees) { S = emptyState(); }
applyMigrations(S);

function active() { return S.trainees.find(t => t.id === S.activeId) || S.trainees[0]; }

/* ══════════════════════════════════════════════════════
   SCORE HELPERS
══════════════════════════════════════════════════════ */
function weekAvg(t, wid) {
  const def = WD.find(d=>d.id===wid);
  const wd  = t.weeks[wid];
  let sum=0, n=0;
  wd.days.forEach(d => {
    def.crit.forEach(c => { if (d[c] && SCORE[d[c]]!==undefined) { sum+=SCORE[d[c]]; n++; } });
  });
  if (def.test && wd.test !== '' && wd.test != null) {
    const v = parseFloat(wd.test);
    if (!isNaN(v)) { sum+=v; n++; }
  }
  return n>0 ? sum/n : null;
}
function phaseAvg(t, phase) {
  const avgs = WD.filter(d=>d.phase===phase).map(d=>weekAvg(t,d.id)).filter(v=>v!==null);
  return avgs.length ? avgs.reduce((a,b)=>a+b,0)/avgs.length : null;
}
function overallAvg(t) {
  const avgs = WD.map(d=>weekAvg(t,d.id)).filter(v=>v!==null);
  return avgs.length ? avgs.reduce((a,b)=>a+b,0)/avgs.length : null;
}
function sc(v)  { if(v===null)return'none'; const r=Math.round(v); if(r>=95)return'good'; if(r>=75)return'ok'; if(r>=55)return'watch'; return'bad'; }
function slbl(v){ if(v===null)return'—'; if(v>=95)return'Exceptional'; if(v>=75)return'No Concern'; if(v>=55)return'Attention'; return'Cause for Concern'; }
function testCls(v) { const p=parseFloat(v); if(isNaN(p))return''; if(p>=95)return'rc-exceptional'; if(p>=75)return'rc-no_concern'; if(p>=50)return'rc-attention'; return'rc-cause_concern'; }

    <button type="button" class="rdrop-btn rc-${val||'x'}" id="${id}-btn"
      onclick="toggleRdrop(event, '${id}', '${tid}', '${wid}', ${di}, '${crit}')">
      <span class="rdrop-dot" style="background:${RATING_COLOR[val||'']}"></span>
      <span class="rdrop-lbl">${ratingLbl(val)}</span>
    </button>
    <span class="rdrop-caret">▾</span>
  </div>`;
}

let _openRdrop = null;
function closeRdrop() {
  if (!_openRdrop) return;
  const wrap = document.getElementById(_openRdrop);
  if (wrap) {
    wrap.querySelector('.rdrop-menu')?.remove();
    wrap.querySelector('.rdrop-btn')?.classList.remove('open');
  }
  _openRdrop = null;
  document.removeEventListener('click', onDocClickRdrop, true);
}

function onDocClickRdrop(e) {
  if (!_openRdrop) return;
  const wrap = document.getElementById(_openRdrop);
  if (wrap && !wrap.contains(e.target)) closeRdrop();
}

function toggleRdrop(e, id, tid, wid, di, crit) {
  e.stopPropagation();
  if (!editUnlocked) { return promptEditUnlock(); }
  if (_openRdrop === id) { closeRdrop(); return; }
  closeRdrop();
  const wrap = document.getElementById(id);
  if (!wrap) return;
  const t = S.trainees.find(x => x.id === tid);
  const cur = t ? t.weeks[wid].days[di][crit] : '';
  const opts = RATINGS.map((r, idx) => {
    if (!r.v) return ''; // skip the empty placeholder
    const isLeave = r.v === 'paid_leave' || r.v === 'sick_leave' || r.v === 'holidays';
    const prevWasLeave = idx > 1 && (RATINGS[idx-1].v === 'paid_leave' || RATINGS[idx-1].v === 'sick_leave' || RATINGS[idx-1].v === 'holidays');
    const sep = (r.v === 'not_applicable' || (isLeave && !prevWasLeave)) ? '<div class="rdrop-divider"></div>' : '';
    return `${sep}<button type="button" class="rdrop-opt${cur===r.v?' selected':''}"
      onclick="pickRating('${id}','${tid}','${wid}',${di},'${crit}','${r.v}')">
      <span class="rdrop-opt-dot" style="background:${RATING_COLOR[r.v]}"></span>
      <span class="rdrop-opt-lbl">${r.l}</span>
      <span class="rdrop-opt-check">✓</span>
    </button>`;
  }).join('');
  // Add a "Clear" option at the top if a value is currently set
  const clearOpt = cur ? `<button type="button" class="rdrop-opt"
    onclick="pickRating('${id}','${tid}','${wid}',${di},'${crit}','')">
    <span class="rdrop-opt-dot" style="background:var(--muted2);opacity:.5"></span>
    <span class="rdrop-opt-lbl" style="color:var(--muted)">Clear selection</span>
    <span class="rdrop-opt-check"></span>
  </button><div class="rdrop-divider"></div>` : '';
  const menu = document.createElement('div');
  menu.className = 'rdrop-menu';
  menu.innerHTML = clearOpt + opts;
  wrap.appendChild(menu);
  wrap.querySelector('.rdrop-btn').classList.add('open');
  _openRdrop = id;
  setTimeout(() => document.addEventListener('click', onDocClickRdrop, true), 0);
}

function pickRating(id, tid, wid, di, crit, val) {
  if (!editUnlocked) { closeRdrop(); return promptEditUnlock(); }
  const t = S.trainees.find(x => x.id === tid);
  if (!t) return;
  t.weeks[wid].days[di][crit] = val;
  // Update the button display
  const wrap = document.getElementById(id);
  if (wrap) {
    const btn = wrap.querySelector('.rdrop-btn');
    btn.className = `rdrop-btn rc-${val||'x'}`;
    btn.querySelector('.rdrop-dot').style.background = RATING_COLOR[val||''];
    btn.querySelector('.rdrop-lbl').textContent = ratingLbl(val);
  }
  closeRdrop();
  dirty(); refreshScore(tid, wid); refreshDot(t, wid);
}
