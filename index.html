/* ───── CALENDAR ───── */
function hubCursorDate() {
  // Cursor is the first day of currently visible month, ISO yyyy-mm-01
  if (!S.hub.calCursor) {
    const now = new Date();
    S.hub.calCursor = `${now.getFullYear()}-${String(now.getMonth()+1).padStart(2,'0')}-01`;
  }
  return new Date(S.hub.calCursor + 'T00:00:00');
}

function hubMoveMonth(delta) {
  const cur = hubCursorDate();
  cur.setMonth(cur.getMonth() + delta);
  S.hub.calCursor = `${cur.getFullYear()}-${String(cur.getMonth()+1).padStart(2,'0')}-01`;
  renderHubCalendar();
  dirty();
}

function hubMonthLabel(d) {
  return d.toLocaleDateString('en-US', { month: 'long', year: 'numeric' });
}

function renderHubCalendar() {
  const host = document.getElementById('hub-content');
  if (!host) return;
  const cur = hubCursorDate();
  const year = cur.getFullYear();
  const month = cur.getMonth();
  // First Monday on or before the 1st of the month
  const first = new Date(year, month, 1);
  const dow = (first.getDay() + 6) % 7; // Mon=0..Sun=6
  const gridStart = new Date(year, month, 1 - dow);

  // Build 6 rows of 7 days = 42 cells
  const today = new Date(); today.setHours(0,0,0,0);
  const cells = [];
  for (let i = 0; i < 42; i++) {
    const d = new Date(gridStart); d.setDate(gridStart.getDate() + i);
    cells.push(d);
  }

  // Index events by date — events spanning multiple days appear on every weekday in [date, endDate]
  // Segment info: which is the LEFT-edge (week-start or event-start), RIGHT-edge (week-end or event-end)
  const eventsByDay = {}; // iso -> [{ ev, isStart, isEnd, isLeftEdge, isRightEdge }]
  const addDays = (iso, n) => {
    const d = new Date(iso + 'T00:00:00');
    d.setDate(d.getDate() + n);
    return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
  };
  const isoToDate = iso => new Date(iso + 'T00:00:00');
  const isWeekend = iso => { const d = isoToDate(iso).getDay(); return d === 0 || d === 6; };
  const dayOfWeek = iso => (isoToDate(iso).getDay() + 6) % 7; // Mon=0..Sun=6

  S.hub.events.forEach(ev => {
    const start = ev.date;
    const end = ev.endDate || ev.date;
    if (!start) return;
    // Build the list of days this event covers — skip weekends and Bulgarian public holidays
    // (including observed-day rollovers) for multi-day events
    const isMultiDay = end > start;
    let cur = start;
    let safety = 0;
    const days = [];
    while (cur <= end && safety < 365) {
      // For multi-day events, exclude days off (weekends + holidays)
      // For single-day events, render exactly on the chosen day even if weekend/holiday
      if (!isMultiDay || !bgIsDayOff(cur)) {
        days.push(cur);
      }
      cur = addDays(cur, 1);
      safety++;
    }
    days.forEach((iso, i) => {
      const isStart = (i === 0);
      const isEnd = (i === days.length - 1);
      // Segment edges: left edge if first occurrence in this week (Mon, or first day of event)
      const dow = dayOfWeek(iso);
      const prevIso = i > 0 ? days[i-1] : null;
      // Continuous if previous day in days[] is exactly yesterday AND we're not at start of week
      const prevWasYesterday = prevIso && (addDays(prevIso, 1) === iso);
      const isLeftEdge = !prevWasYesterday || dow === 0;
      const nextIso = i < days.length-1 ? days[i+1] : null;
      const nextIsTomorrow = nextIso && (addDays(iso, 1) === nextIso);
      const isRightEdge = !nextIsTomorrow || dow === 6;
      (eventsByDay[iso] = eventsByDay[iso] || []).push({
        ev, isStart, isEnd, isLeftEdge, isRightEdge, isMultiDay
      });
    });
  });

  const dayNames = ['Mon','Tue','Wed','Thu','Fri','Sat','Sun'];
  const dayHdr = dayNames.map(d => `<div class="cal-dayname">${d}</div>`).join('');

  const cellsHTML = cells.map(d => {
    const iso = `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
    const inMonth = d.getMonth() === month;
    const isToday = d.getTime() === today.getTime();
    const dow = d.getDay();
    const isWknd = (dow === 0 || dow === 6);
    const hol = bgHolidayInfo(iso);
    const cellClasses = [
      'cal-cell',
      inMonth ? '' : 'oom',
      isToday ? 'today' : '',
      isWknd ? 'weekend' : '',
      hol ? 'holiday' : '',
    ].filter(Boolean).join(' ');
    const holTitle = hol ? ` title="${escapeAttr(hol.name)}"` : '';
    const evts = eventsByDay[iso] || [];
    const evtsHTML = evts.slice(0, 3).map(ent => {
      const ev = ent.ev;
      const plat = HUB_PLATFORM_BY_V[ev.platform] || { color:'#6b779e', short:'?', l:'?' };
      const trainerShort = ev.trainer ? ' · ' + ev.trainer.split(' ')[0] : '';
      // Only show label on the left-edge cell of each segment (so label doesn't repeat per day)
      const showLabel = ent.isLeftEdge;
      const segCls = (ent.isLeftEdge ? ' seg-left' : '') + (ent.isRightEdge ? ' seg-right' : '');
      return `<div class="cal-evt${segCls}" style="background:${plat.color}1a;${ent.isLeftEdge ? `border-left:3px solid ${plat.color};` : ''}" onclick="event.stopPropagation();editEvent('${ev.id}')" title="${escapeAttr(plat.l + (ev.trainer ? ' · ' + ev.trainer : ''))}">
        <span class="cal-evt-name">${showLabel ? escapeHtml(plat.short || '—') + escapeHtml(trainerShort) : '&nbsp;'}</span>
      </div>`;
    }).join('');
    const more = evts.length > 3 ? `<div class="cal-evt-more" onclick="event.stopPropagation();selectCalDay('${iso}')">+${evts.length-3} more</div>` : '';
    const holLabel = hol && inMonth ? `<div class="cal-cell-holiday" title="${escapeAttr(hol.name)}">${escapeHtml(hol.name)}</div>` : '';
    return `<div class="${cellClasses}" data-date="${iso}"${holTitle} onclick="addEventOnDate('${iso}')">
      <div class="cal-cell-num">${d.getDate()}</div>
      ${holLabel}
      <div class="cal-cell-events">${evtsHTML}${more}</div>
    </div>`;
  }).join('');

  // List of trainings whose start OR end falls in this month
  const monthEvents = S.hub.events.filter(ev => {
    const start = ev.date;
    const end = ev.endDate || ev.date;
    const monthStart = `${year}-${String(month+1).padStart(2,'0')}-01`;
    const monthEnd = `${year}-${String(month+1).padStart(2,'0')}-31`;
    // Event overlaps the month if it starts before month-end and ends after month-start
    return start <= monthEnd && end >= monthStart;
  }).sort((a,b) => (a.date).localeCompare(b.date));

  const listHTML = monthEvents.length === 0
    ? `<div class="hub-empty">No trainings this month. Click any day to add one.</div>`
    : monthEvents.map(ev => {
        const plat = HUB_PLATFORM_BY_V[ev.platform] || { color:'#6b779e', l:'Unknown' };
        const dt = new Date(ev.date + 'T00:00:00');
        const dateLbl = dt.toLocaleDateString('en-US', { weekday:'short', day:'numeric', month:'short' });
        const endDt = new Date((ev.endDate || ev.date) + 'T00:00:00');
        const isMultiDay = (ev.endDate && ev.endDate !== ev.date);
        const rangeStr = isMultiDay
          ? `${dt.toLocaleDateString('en-US',{day:'numeric',month:'short'})} – ${endDt.toLocaleDateString('en-US',{day:'numeric',month:'short'})}`
          : dt.toLocaleDateString('en-US',{day:'numeric',month:'short',year:'numeric'});
        const trainees = (ev.trainees || []).filter(n => n && String(n).trim());
        return `<div class="hub-evt-row" onclick="editEvent('${ev.id}')">

            <div class="hub-evt-day">${dt.getDate()}</div>

          <div class="hub-evt-bar" style="background:${plat.color}"></div>
          <div class="hub-evt-body">
            <div class="hub-evt-title"><span class="hub-evt-platform" style="color:${plat.color}">${plat.l}</span></div>
            <div class="hub-evt-meta">
              <span><svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="4" width="18" height="18" rx="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg> ${rangeStr}</span>
              ${ev.trainer ? `<span><svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg> ${escapeHtml(ev.trainer)}</span>` : ''}
              ${trainees.length ? `<span><svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/></svg> ${trainees.length} trainee${trainees.length!==1?'s':''}</span>` : ''}
            </div>
          </div>
        </div>`;
      }).join('');

  host.innerHTML = `
    <div class="cal-toolbar">
      <button class="cal-nav-btn" onclick="hubMoveMonth(-1)" aria-label="Previous month">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="15 18 9 12 15 6"/></svg>
      </button>
      <div class="cal-month-lbl">${hubMonthLabel(cur)}</div>
      <button class="cal-nav-btn" onclick="hubMoveMonth(1)" aria-label="Next month">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="9 18 15 12 9 6"/></svg>
      </button>
      <button class="cal-today-btn" onclick="hubGoToday()">Today</button>
      <div style="flex:1"></div>
      <button class="btn btn-navy editor-only" onclick="addEventOnDate('${(new Date()).toISOString().slice(0,10)}')">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
        Add Training
      </button>
    </div>
    <div class="cal-grid-wrap">
      <div class="cal-grid">
        ${dayHdr}
        ${cellsHTML}
      </div>
    </div>
    <div class="cal-list-hd">Trainings in ${hubMonthLabel(cur)}</div>
    <div class="cal-list">${listHTML}</div>`;
}

function hubGoToday() {
  const now = new Date();
  S.hub.calCursor = `${now.getFullYear()}-${String(now.getMonth()+1).padStart(2,'0')}-01`;
  renderHubCalendar();
  dirty();
}

function selectCalDay(iso) {
  // Show all events that COVER this day (start<=iso<=end)
  const events = S.hub.events
    .filter(ev => (ev.date <= iso) && ((ev.endDate || ev.date) >= iso))
    .sort((a,b) => a.date.localeCompare(b.date));
  if (events.length === 0) { addEventOnDate(iso); return; }
  const dt = new Date(iso+'T00:00:00');
  const dateLbl = dt.toLocaleDateString('en-US', { weekday:'long', day:'numeric', month:'long', year:'numeric' });
  const list = events.map(ev => {
    const plat = HUB_PLATFORM_BY_V[ev.platform] || { color:'#6b779e', l:'Unknown' };
    const isMultiDay = (ev.endDate && ev.endDate !== ev.date);
    const startD = new Date(ev.date+'T00:00:00');
    const endD = new Date((ev.endDate||ev.date)+'T00:00:00');
    const rangeStr = isMultiDay
      ? `${startD.toLocaleDateString('en-US',{day:'numeric',month:'short'})} – ${endD.toLocaleDateString('en-US',{day:'numeric',month:'short'})}`
      : '';
    return `<div class="hub-evt-row" onclick="editEvent('${ev.id}')" style="cursor:pointer">
      <div class="hub-evt-bar" style="background:${plat.color}"></div>
      <div class="hub-evt-body">
        <div class="hub-evt-title"><span class="hub-evt-platform" style="color:${plat.color}">${plat.l}</span></div>
        <div class="hub-evt-meta">
          ${rangeStr ? `<span>${rangeStr}</span>` : ''}
          ${ev.trainer ? `<span>${rangeStr?'· ':''}${escapeHtml(ev.trainer)}</span>` : ''}
        </div>
      </div>
    </div>`;
  }).join('');
  showModal({
    size:'small',
    title: dateLbl,
    subtitle: `${events.length} training${events.length!==1?'s':''}`,
    body: `<div style="display:flex;flex-direction:column;gap:8px">${list}</div>`,
    actions: [
      ...(editUnlocked ? [{ label:'Add another', class:'btn-navy', value:'add' }] : []),
      { label:'Close', class:'btn-ghost-dark', value:'close' }
    ]
  }).then(act => { if (act === 'add') addEventOnDate(iso); });
}

function addEventOnDate(iso) {
  if (!editUnlocked) { promptEditUnlock(); return; }
  openEventModal(null, iso);
}
function editEvent(id) {
  if (!editUnlocked) { promptEditUnlock(); return; }
  openEventModal(id, null);
}

function openEventModal(eventId, defaultDate) {
  const isEdit = !!eventId;
  const ev = isEdit ? S.hub.events.find(e => e.id === eventId) : {
    id: uid(),
    date: defaultDate || (new Date()).toISOString().slice(0,10),
    endDate: defaultDate || (new Date()).toISOString().slice(0,10),
    platform:'dim_sw', trainer:'',
    trainees: [],   // now array of strings (free text names)
    note:''
  };
  if (!ev) return;

  // Backwards-compat: events created before this version may have trainees as IDs
  // and may have startTime/endTime. We keep those keys but ignore them visually.
  // Trainees: convert any ID-shaped entries to names if we can resolve them.
  const allTrainees = [...S.trainees, ...S.archived];
  const traineeNames = (ev.trainees || []).map(entry => {
    // If it looks like a stored ID and resolves to a known trainee, use name
    const found = allTrainees.find(t => t.id === entry);
    return found ? (found.name || 'Unnamed') : entry;
  }).filter(n => n && String(n).trim());
  // Default endDate fallback to start date if missing
  if (!ev.endDate) ev.endDate = ev.date;

  const platOpts = HUB_PLATFORMS.map(p => `<option value="${p.v}" ${p.v===ev.platform?'selected':''}>${p.l}</option>`).join('');

  return new Promise(resolve => {
    const host = document.getElementById('modal-host');
    let resolved = false;
    const cleanup = () => {
      host.innerHTML = '';
      document.body.style.overflow = '';
      document.body.classList.remove('modal-open');
      document.removeEventListener('keydown', onKey);
    };
    const finish = (val) => { if (resolved) return; resolved = true; cleanup(); resolve(val); };
    const onKey = (e) => { if (e.key==='Escape') finish(false); };

    document.body.style.overflow = 'hidden';
    document.body.classList.add('modal-open');

    host.innerHTML = `
    <div class="mdl-back" id="mdl-back">
      <div class="mdl-card mdl-large" role="dialog" onclick="event.stopPropagation()" style="max-width:640px">
        <div class="mdl-hd">
          <div>
            <div class="mdl-sub">${isEdit?'Edit training':'New training'}</div>
            <div class="mdl-title">${isEdit?'Update <em>training</em>':'Schedule a <em>training</em>'}</div>
          </div>
          <button class="mdl-x" id="mdl-x">✕</button>
        </div>
        <div class="mdl-bd">
          <div class="evt-grid">
            <div>
              <label class="field-lbl">Start Date</label>
              <input type="date" class="setup-input" id="ev-date" value="${ev.date}">
            </div>
            <div>
              <label class="field-lbl">End Date</label>
              <input type="date" class="setup-input" id="ev-end-date" value="${ev.endDate||ev.date}">
            </div>
            <div>
              <label class="field-lbl">Platform</label>
              <select class="setup-input" id="ev-platform">${platOpts}</select>
            </div>
            <div>
              <label class="field-lbl">Trainer</label>
              <input type="text" class="setup-input" id="ev-trainer" placeholder="Trainer name…" value="${escapeAttr(ev.trainer||'')}">
            </div>
          </div>
          <div style="margin-top:18px">
            <label class="field-lbl">Trainees attending <span style="font-weight:500;text-transform:none;letter-spacing:0;color:var(--muted2)">(optional)</span></label>
            <div class="evt-trainees-list" id="ev-trainees-list"></div>
            <button type="button" class="btn btn-ghost-dark" id="ev-add-trainee" style="margin-top:8px">
              <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
              Add trainee
            </button>
          </div>
        </div>
        <div class="mdl-ft">
          ${isEdit ? `<button class="btn btn-danger" id="btn-del">Delete</button>` : ''}
          <div style="flex:1"></div>
          <button class="btn btn-ghost-dark" id="btn-cancel">Cancel</button>
          <button class="btn btn-navy" id="btn-save">${isEdit?'Save':'Create'}</button>
        </div>
      </div>
    </div>`;

    const listEl = document.getElementById('ev-trainees-list');
    const renderTraineeRows = (names) => {
      if (!names.length) {
        listEl.innerHTML = `<div class="hub-empty" style="margin:0;padding:14px">No trainees added yet.</div>`;
        return;
      }
      listEl.innerHTML = names.map((n, i) => `
        <div class="evt-trainee-row">
          <input type="text" class="setup-input evt-trainee-input" data-idx="${i}" placeholder="Trainee name…" value="${escapeAttr(n)}">
          <button type="button" class="evt-trainee-rm" data-idx="${i}" title="Remove">
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
          </button>
        </div>`).join('');
      // Wire up remove buttons
      listEl.querySelectorAll('.evt-trainee-rm').forEach(btn => {
        btn.addEventListener('click', () => {
          const idx = parseInt(btn.dataset.idx);
          // Capture current input values before re-render
          const cur = [...listEl.querySelectorAll('.evt-trainee-input')].map(i => i.value);
          cur.splice(idx, 1);
          renderTraineeRows(cur);
        });
      });
    };
    renderTraineeRows(traineeNames);

    document.getElementById('ev-add-trainee').addEventListener('click', () => {
      const cur = [...listEl.querySelectorAll('.evt-trainee-input')].map(i => i.value);
      cur.push('');
      renderTraineeRows(cur);
      // Focus the new (last) input
      const inputs = listEl.querySelectorAll('.evt-trainee-input');
      inputs[inputs.length-1]?.focus();
    });

    const save = () => {
      const date = document.getElementById('ev-date').value;
      const endDate = document.getElementById('ev-end-date').value || date;
      const platform = document.getElementById('ev-platform').value;
      const trainer = document.getElementById('ev-trainer').value.trim();
      const trainees = [...listEl.querySelectorAll('.evt-trainee-input')]
        .map(i => i.value.trim()).filter(Boolean);
      if (!date) { toast('Start date is required', 'warn'); return; }
      if (endDate < date) { toast('End date cannot be before start date', 'warn'); return; }
      if (!platform) { toast('Platform is required', 'warn'); return; }
      const next = { ...ev, date, endDate, platform, trainer, trainees };
      // Strip legacy time fields if they exist
      delete next.startTime; delete next.endTime;
      if (isEdit) {
        const idx = S.hub.events.findIndex(e => e.id === ev.id);
        if (idx >= 0) S.hub.events[idx] = next;
      } else {
        S.hub.events.push(next);
      }
      dirty();
      renderHubCalendar();
      finish(true);
      toast(isEdit?'Training updated':'Training added', 'ok');
    };

    document.getElementById('btn-save').addEventListener('click', save);
    document.getElementById('btn-cancel').addEventListener('click', () => finish(false));
    document.getElementById('mdl-x').addEventListener('click', () => finish(false));
    document.getElementById('mdl-back').addEventListener('click', e => { if (e.target.id==='mdl-back') finish(false); });
    if (isEdit) {
      document.getElementById('btn-del').addEventListener('click', async () => {
        cleanup(); resolved = true;
        const ok = await confirmModal(
          `Delete this <strong>${(HUB_PLATFORM_BY_V[ev.platform]||{}).l||'training'}</strong> on ${ev.date}?`,
          { title:'Delete training?', confirmLabel:'Delete', confirmClass:'btn-danger' }
        );
        if (!ok) { openEventModal(eventId, null); resolve(false); return; }
        S.hub.events = S.hub.events.filter(e => e.id !== ev.id);
        dirty();
        renderHubCalendar();
        toast('Training deleted', 'ok');
        resolve(true);
      });
    }
    document.addEventListener('keydown', onKey);
  });
}

/* ───── MATERIALS ───── */
function renderHubMaterials() {
  const host = document.getElementById('hub-content');
  if (!host) return;
  const filterTag = S.hub._matFilter || '';
  const filterType = S.hub._matFilterType || '';
  const list = S.hub.materials.filter(m => {
    if (filterTag && !(m.tags||[]).includes(filterTag)) return false;
    if (filterType && m.type !== filterType) return false;
    return true;
  }).sort((a,b) => (b.added||'').localeCompare(a.added||''));

  const tagOpts = `<option value="">All tags</option>` + HUB_MTAGS.map(t =>
    `<option value="${t.v}" ${filterTag===t.v?'selected':''}>${t.l}</option>`).join('');
  const typeOpts = `<option value="">All types</option>` + HUB_MTYPES.map(t =>
    `<option value="${t.v}" ${filterType===t.v?'selected':''}>${t.l}</option>`).join('');

  const cards = list.length === 0
    ? `<div class="hub-empty">No materials${filterTag||filterType?' match the filter':''}. ${editUnlocked?'Click "Add Material" to start a library.':''}</div>`
    : list.map(m => {
        const type = HUB_MTYPES.find(t => t.v===m.type) || { l:'Other' };
        const tagPills = (m.tags||[]).map(tg => {
          const t = HUB_MTAGS.find(x => x.v===tg);
          return t ? `<span class="mat-tag">${t.l}</span>` : '';
        }).join('');
        const typeIcon = matTypeIconSVG(m.type);
        return `<div class="mat-card">
          <div class="mat-icon">${typeIcon}</div>
          <div class="mat-body">
            <div class="mat-row1">
              <a class="mat-title" href="${escapeAttr(m.url)}" target="_blank" rel="noopener">${m.title||'Untitled'}</a>
              ${editUnlocked ? `<div class="mat-actions">
                <button class="mat-act" onclick="editMaterial('${m.id}')" title="Edit">
                  <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/><path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"/></svg>
                </button>
                <button class="mat-act mat-act-danger" onclick="deleteMaterial('${m.id}')" title="Delete">
                  <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="3 6 5 6 21 6"/><path d="M19 6l-1 14a2 2 0 0 1-2 2H8a2 2 0 0 1-2-2L5 6"/></svg>
                </button>
              </div>` : ''}
            </div>
            <div class="mat-meta">
              <span class="mat-type">${type.l}</span>
              ${m.addedBy?`<span>· ${m.addedBy}</span>`:''}
              ${m.added?`<span>· ${m.added}</span>`:''}
            </div>
            ${m.description ? `<div class="mat-desc">${escapeHtml(m.description)}</div>` : ''}
            ${tagPills ? `<div class="mat-tags">${tagPills}</div>` : ''}
          </div>
        </div>`;
      }).join('');

  host.innerHTML = `
    <div class="mat-toolbar">
      <select class="setup-input mat-filter" onchange="S.hub._matFilter=this.value;renderHubMaterials();">
        ${tagOpts}
      </select>
      <select class="setup-input mat-filter" onchange="S.hub._matFilterType=this.value;renderHubMaterials();">
        ${typeOpts}
      </select>
      <div style="flex:1"></div>
      <span style="font-size:12px;color:var(--muted);font-weight:700">${list.length} item${list.length!==1?'s':''}</span>
      <button class="btn btn-navy editor-only" onclick="addMaterial()">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
        Add Material
      </button>
    </div>
    <div class="mat-list">${cards}</div>`;
}

function matTypeIconSVG(t) {
  const common = 'width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"';
  switch (t) {
    case 'doc':     return `<svg ${common}><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/><line x1="16" y1="13" x2="8" y2="13"/><line x1="16" y1="17" x2="8" y2="17"/><polyline points="10 9 9 9 8 9"/></svg>`;
    case 'video':   return `<svg ${common}><polygon points="23 7 16 12 23 17 23 7"/><rect x="1" y="5" width="15" height="14" rx="2" ry="2"/></svg>`;
    case 'slides':  return `<svg ${common}><rect x="2" y="3" width="20" height="14" rx="2"/><line x1="8" y1="21" x2="16" y2="21"/><line x1="12" y1="17" x2="12" y2="21"/></svg>`;
    case 'tool':    return `<svg ${common}><path d="M14.7 6.3a1 1 0 0 0 0 1.4l1.6 1.6a1 1 0 0 0 1.4 0l3.77-3.77a6 6 0 0 1-7.94 7.94l-6.91 6.91a2.12 2.12 0 0 1-3-3l6.91-6.91a6 6 0 0 1 7.94-7.94l-3.76 3.76z"/></svg>`;
    case 'article': return `<svg ${common}><path d="M4 19.5A2.5 2.5 0 0 1 6.5 17H20"/><path d="M6.5 2H20v20H6.5A2.5 2.5 0 0 1 4 19.5v-15A2.5 2.5 0 0 1 6.5 2z"/></svg>`;
    default:        return `<svg ${common}><circle cx="12" cy="12" r="10"/><line x1="12" y1="16" x2="12" y2="12"/><line x1="12" y1="8" x2="12.01" y2="8"/></svg>`;
  }
}

function addMaterial() {
  if (!editUnlocked) { promptEditUnlock(); return; }
  openMaterialModal(null);
}

function editMaterial(id) {
  if (!editUnlocked) { promptEditUnlock(); return; }
  openMaterialModal(id);
}

async function deleteMaterial(id) {
  if (!editUnlocked) { promptEditUnlock(); return; }
  const m = S.hub.materials.find(x => x.id === id);
  if (!m) return;
  const ok = await confirmModal(
    `Delete <strong>${escapeHtml(m.title||'this material')}</strong>? The link itself stays where it is — only the entry is removed.`,
    { title:'Delete material?', confirmLabel:'Delete', confirmClass:'btn-danger' }
  );
  if (!ok) return;
  S.hub.materials = S.hub.materials.filter(x => x.id !== id);
  dirty(); renderHubMaterials();
  toast('Material deleted', 'ok');
}

  return new Promise(resolve => {
    const host = document.getElementById('modal-host');
    let resolved = false;
    const cleanup = () => {
      host.innerHTML = '';
      document.body.style.overflow = '';
      document.body.classList.remove('modal-open');
      document.removeEventListener('keydown', onKey);
    };
    const finish = (val) => { if (resolved) return; resolved = true; cleanup(); resolve(val); };
    const onKey = (e) => { if (e.key==='Escape') finish(false); };

    document.body.style.overflow = 'hidden';

        <div class="mdl-hd">

            <div class="mdl-sub">${isEdit?'Edit material':'New material'}</div>

          </div>
          <button class="mdl-x" id="mdl-x">✕</button>

        <div class="mdl-bd">
          <div style="margin-bottom:14px">

          </div>
          <div style="margin-bottom:14px">
            <label class="field-lbl">URL</label>
            <input type="url" class="setup-input" id="m-url" placeholder="https://…" value="${escapeAttr(m.url||'')}">
          </div>
          <div class="evt-grid" style="margin-bottom:14px">
            <div>
              <label class="field-lbl">Type</label>
              <select class="setup-input" id="m-type">${typeOpts}</select>
            </div>
            <div>
              <label class="field-lbl">Added by</label>
              <input type="text" class="setup-input" id="m-by" placeholder="Optional" value="${escapeAttr(m.addedBy||'')}">
            </div>
          </div>
          <div style="margin-bottom:14px">
            <label class="field-lbl">Tags</label>
            <div class="evt-trainees">${tagChecks}</div>
          </div>
          <div>
            <label class="field-lbl">Description <span style="font-weight:500;text-transform:none;letter-spacing:0;color:var(--muted2)">(optional)</span></label>
            <textarea class="note-ta" id="m-desc" placeholder="Why is this useful…" style="min-height:74px">${escapeHtml(m.description||'')}</textarea>
          </div>
        </div>
        <div class="mdl-ft">
          <div style="flex:1"></div>
          <button class="btn btn-ghost-dark" id="btn-cancel">Cancel</button>
          <button class="btn btn-navy" id="btn-save">${isEdit?'Save':'Add'}</button>
        </div>
      </div>
    </div>`;

    const save = () => {
      const title = document.getElementById('m-title').value.trim();
      const url = document.getElementById('m-url').value.trim();
      if (!title) { toast('Title is required', 'warn'); return; }
      if (!url)   { toast('URL is required', 'warn'); return; }
      const next = {
        ...m, title, url,
        type: document.getElementById('m-type').value,
        addedBy: document.getElementById('m-by').value.trim(),
        tags: [...host.querySelectorAll('.evt-trainee-chk input:checked')].map(c => c.value),
        description: document.getElementById('m-desc').value
      };
      if (isEdit) {
        const idx = S.hub.materials.findIndex(x => x.id === m.id);
        if (idx >= 0) S.hub.materials[idx] = next;
      } else {
        S.hub.materials.unshift(next);
      }
      dirty(); renderHubMaterials();
      finish(true);
      toast(isEdit?'Material updated':'Material added', 'ok');
    };

    document.getElementById('btn-save').addEventListener('click', save);
    document.getElementById('btn-cancel').addEventListener('click', () => finish(false));
    document.getElementById('mdl-x').addEventListener('click', () => finish(false));
    document.getElementById('mdl-back').addEventListener('click', e => { if (e.target.id==='mdl-back') finish(false); });
    document.addEventListener('keydown', onKey);
    setTimeout(() => document.getElementById('m-title').focus(), 30);
  });
}

function escapeHtml(s) {
  return String(s||'').replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'})[c]);
}
function escapeAttr(s) { return escapeHtml(s); }

function addTrainee() {
  if (!requireEdit()) return promptEditUnlock();
  const t = newTrainee();
  S.trainees.push(t);
  S.activeId = t.id;
  S.activeWeek = 'w1';
  dirty(); renderAll();
}

function switchTrainee(id) {
  S.activeId = id;
  // If we're on archive tab, switching to an active trainee should leave the archive view
  if (S.activeWeek === 'arch') S.activeWeek = 'w1';
  renderTraineeBar();
  renderSetup();
  renderMain();
  dirty();
}

async function removeTrainee(e, id) {
  e.stopPropagation();
  if (!requireEdit()) return promptEditUnlock();
  const t = S.trainees.find(x=>x.id===id);
  const name = t?.name || 'this trainee';
  const ok = await confirmModal(
    `Remove <strong>${name}</strong> and all their data? This action cannot be undone.`,
    { title:'Delete trainee?', confirmLabel:'Delete', confirmClass:'btn-danger' }
  );
  if (!ok) return;
  S.trainees = S.trainees.filter(x=>x.id!==id);
  if (S.trainees.length === 0) { const nt=newTrainee(); S.trainees=[nt]; S.activeId=nt.id; }
  else if (S.activeId === id) S.activeId = S.trainees[0].id;
  dirty(); renderAll();
}

══════════════════════════════════════════════════════ */
function syncSetup(field, val) {
  if (!editUnlocked) { renderSetup(); return promptEditUnlock(); }
  const t = active();
  t[field] = val;
  // Update pill name live
  document.querySelectorAll('.trainee-pill').forEach(p => {
    if (p.getAttribute('onclick')?.includes(t.id)) {
      const nameEl = p.querySelector('.pill-name');
      if (nameEl && field === 'name') nameEl.textContent = val || 'New Trainee';
    }
  });
  // Update trainee count
  const cnt = document.querySelector('.trainee-count');
  if (cnt) cnt.textContent = `${S.trainees.length} trainee${S.trainees.length!==1?'s':''}`;
  dirty();
}

function onRating(tid, wid, di, crit, el) {
  const t = S.trainees.find(x=>x.id===tid);
  t.weeks[wid].days[di][crit] = el.value;
  el.className = `rating-sel rc-${el.value||'x'}`;
  dirty(); refreshScore(tid, wid); refreshDot(t, wid);
}

function onWeekTest(tid, wid, el) {
  if (!editUnlocked) { el.value = (active().weeks[wid] && active().weeks[wid].test) || ''; return promptEditUnlock(); }
  // Sanitize: keep only digits, clamp to 0-100
  let raw = String(el.value || '').replace(/[^\d]/g, '');
  if (raw !== '') {
    let n = parseInt(raw, 10);
    if (isNaN(n)) raw = '';
    else if (n > 100) raw = '100';
    else raw = String(n);
  }
  if (el.value !== raw) el.value = raw;
  const t = S.trainees.find(x=>x.id===tid);
  t.weeks[wid].test = raw;
  el.className = `wt-input ${testCls(raw)}`;
  dirty(); refreshScore(tid, wid); refreshDot(t, wid);
}

function onNote(tid, wid, di, val) {
  if (!editUnlocked) { renderMain(); return promptEditUnlock(); }
  S.trainees.find(x=>x.id===tid).weeks[wid].days[di].note = val;
  dirty();
}

function onWC(tid, wid, field, val) {
  if (!editUnlocked) { renderMain(); return promptEditUnlock(); }
  S.trainees.find(x=>x.id===tid).weeks[wid][field] = val;
  dirty();
}

function toggleNote(prefix, di, btn) {
  const nw = document.getElementById(`${prefix}_d${di}_nw`);
  const open = nw.classList.toggle('open');
  btn.textContent = open ? '💬 Note' : '+ Note';
  if (open) document.getElementById(`${prefix}_d${di}_note`)?.focus();
}

/* ══════════════════════════════════════════════════════
   SCORE + DOT REFRESH
══════════════════════════════════════════════════════ */
function refreshScore(tid, wid) {
  const t = S.trainees.find(x=>x.id===tid);
  const avg = weekAvg(t, wid);
  const el = document.getElementById(`ws-${wid}`);
  if (el) { el.textContent = avg!==null?Math.round(avg):'—'; el.className=`week-score-num sc-${sc(avg)}`; }
  // Update pill score
  renderTraineeBar();
  if (S.activeWeek==='ov') renderOverview();
}

function refreshDot(t, wid) {
  const def = WD.find(d=>d.id===wid);
  const wd  = t.weeks[wid];
  const dot = document.getElementById(`wd-${wid}`);
  if (!dot) return;
  let filled=0, concern=false;
  wd.days.forEach(d => { def.crit.forEach(c => { if(d[c]){filled++; if(d[c]==='cause_concern')concern=true;} }); });
  const total = 5*def.crit.length;
  dot.className = 'w-dot'+(concern?' concern':filled>=total?' filled':filled>0?' partial':'');
}

══════════════════════════════════════════════════════ */
function goWeek(id) {
  S.activeWeek = id;
  document.querySelectorAll('.panel').forEach(p=>p.classList.remove('active'));
  document.querySelectorAll('.week-btn').forEach(b=>b.classList.remove('active'));
  document.getElementById(`panel-${id}`)?.classList.add('active');
  document.querySelector(`[data-tab="${id}"]`)?.classList.add('active');
  // Hide trainee-specific UI on global tabs (ov/arch/hub) — setup card is for the active trainee
  const isGlobal = (id==='ov' || id==='arch' || id==='hub');
  const noTraineeBar = (id==='hub' || id==='arch');
  document.getElementById('setup-outer').style.display    = isGlobal ? 'none' : '';
  document.querySelector('.trainee-bar-outer').style.display = noTraineeBar ? 'none' : '';
  document.body.classList.toggle('no-trainee-bar', noTraineeBar);
  if (id==='ov')   renderOverview();
  if (id==='arch') renderArchive();
  if (id==='hub')  renderHub();
}

async function sha256Hex(str) {
  const buf = await crypto.subtle.digest('SHA-256', new TextEncoder().encode(str));
  return Array.from(new Uint8Array(buf)).map(b => b.toString(16).padStart(2,'0')).join('');
}

function togglePwdEye(inputId, btn) {
  const inp = document.getElementById(inputId);
  if (!inp) return;
  const showing = inp.type === 'text';

  const span = btn.querySelector('span');
  if (span) span.textContent = showing ? '👁' : '🙈';
  btn.title = showing ? 'Show password' : 'Hide password';
  inp.focus();
}

function applyEditLockUI() {

async function toggleEditLock() {
  if (editUnlocked) {
    // Lock — confirm
    const ok = await confirmModal(
      'Lock the tool? You will need to re-enter the password to make further changes.',
      { title:'Lock tool?', confirmLabel:'Lock', confirmClass:'btn-navy' }
    );
    if (!ok) return;
    editUnlocked = false;
    try { sessionStorage.removeItem('tt3_edit'); } catch(e) {}
    applyEditLockUI();
    toast('Tool locked. Read-only mode.', 'info');
    return;
  }
  // Unlock prompt
  await promptEditUnlock();
}

let _editPromptOpen = null;
function promptEditUnlock() {
  // If already open, return the existing promise instead of stacking new modals
  if (_editPromptOpen) return _editPromptOpen;
  _editPromptOpen = new Promise((resolve) => {
    const host = document.getElementById('modal-host');
    let resolved = false;
    const cleanup = () => {
      host.innerHTML = '';
      document.body.style.overflow = '';
      document.body.classList.remove('modal-open');
      document.removeEventListener('keydown', onKey);
      _editPromptOpen = null;
    };
    const finish = (val) => {
      if (resolved) return;
      resolved = true;
      cleanup();
      resolve(val);
    };
    const onKey = (e) => {
      if (e.key === 'Escape') finish(false);
      else if (e.key === 'Enter' && document.activeElement?.id === 'edit-pwd-in') {
        e.preventDefault();
        attempt();
      }
    };

    document.body.style.overflow = 'hidden';
    document.body.classList.add('modal-open');

    host.innerHTML = `
      <div class="mdl-back" id="mdl-back">
        <div class="mdl-card mdl-small" role="dialog" aria-modal="true" onclick="event.stopPropagation()">
          <div class="mdl-hd">
            <div>
              <div class="mdl-sub">Trainers · Mentors · Team Leads</div>
              <div class="mdl-title">Unlock <em>editor mode</em></div>
            </div>
            <button class="mdl-x" id="mdl-x" aria-label="Close">✕</button>
          </div>
          <div class="mdl-bd">
            <p>Enter the editor password to enable editing, archiving, and adding trainees.</p>
            <div class="pwd-row">
              <input type="password" id="edit-pwd-in" class="mdl-pwd-input" placeholder="Editor password…" autocomplete="current-password">
              <button type="button" class="pwd-eye" id="pwd-eye" aria-label="Show password" title="Show password">
                <span id="pwd-eye-icon">👁</span>
              </button>
            </div>
            <div class="mdl-pwd-err" id="edit-pwd-err"></div>
          </div>
          <div class="mdl-ft">
            <button class="btn btn-ghost-dark" id="btn-cancel">Cancel</button>
            <button class="btn btn-navy" id="btn-unlock">Unlock</button>
          </div>
        </div>
      </div>`;

    const input = document.getElementById('edit-pwd-in');
    const errEl = document.getElementById('edit-pwd-err');
    const eye = document.getElementById('pwd-eye');
    const eyeIcon = document.getElementById('pwd-eye-icon');

    let busy = false;
    const attempt = async () => {
      if (busy || resolved) return;
      busy = true;
      const val = input.value || '';
      const hex = await sha256Hex(val);
      if (hex === EDIT_HASH) {
        editUnlocked = true;
        try { sessionStorage.setItem('tt3_edit', '1'); } catch(e) {}
        applyEditLockUI();
        finish(true);
        toast('Editor mode unlocked', 'ok');
        // First-time editor on this device — prompt for sync setup
        if (!gistReady()) {
          setTimeout(() => {
            confirmModal(
              'You are editing locally. To sync changes with the team shared Gist, configure your GitHub token now (one-time per device).',
              { title:'Configure sync?', confirmLabel:'Set up sync', confirmClass:'btn-navy', cancelLabel:'Skip for now' }
            ).then(ok => { if (ok) setupGistCredentials(); });
          }, 800);
        }
      } else {
        busy = false;
        errEl.textContent = 'Incorrect password';
        input.classList.add('shake');
        input.select();
        setTimeout(() => input.classList.remove('shake'), 400);
      }
    };

    document.getElementById('btn-unlock').addEventListener('click', attempt);
    document.getElementById('btn-cancel').addEventListener('click', () => finish(false));
    document.getElementById('mdl-x').addEventListener('click', () => finish(false));
    document.getElementById('mdl-back').addEventListener('click', (e) => {
      if (e.target.id === 'mdl-back') finish(false);
    });

    eye.addEventListener('click', () => {
      const showing = input.type === 'text';
      input.type = showing ? 'password' : 'text';
      eyeIcon.textContent = showing ? '👁' : '🙈';
      eye.title = showing ? 'Show password' : 'Hide password';
      input.focus();
    });

    document.addEventListener('keydown', onKey);
    setTimeout(() => input.focus(), 30);
  });
}

function requireEdit() {
  if (editUnlocked) return true;
  toast('Read-only mode — ask for the editor password to make changes', 'warn');
  return false;
}

/* ══════════════════════════════════════════════════════
   MODAL SYSTEM
══════════════════════════════════════════════════════ */
function showModal({ title, subtitle, body, actions, size='small', allowClose=true }) {
  return new Promise((resolve) => {
    const host = document.getElementById('modal-host');
    let resolved = false;
    const close = (val) => {
      if (resolved) return;
      resolved = true;
      host.innerHTML = '';
      document.body.style.overflow = '';
      document.body.classList.remove('modal-open');
      document.removeEventListener('keydown', onKey);
      resolve(val);
    };
    const onKey = (e) => { if (e.key === 'Escape' && allowClose) close(null); };
    document.addEventListener('keydown', onKey);
    document.body.style.overflow = 'hidden';
    document.body.classList.add('modal-open');

    const titleHTML = title ? `<div class="mdl-hd">
      <div>
        ${subtitle ? `<div class="mdl-sub">${subtitle}</div>` : ''}
        <div class="mdl-title">${title}</div>
      </div>
      ${allowClose ? `<button class="mdl-x" id="mdl-x" aria-label="Close">✕</button>` : ''}
    </div>` : '';

    const actHTML = (actions || []).length
      ? `<div class="mdl-ft">${actions.map((a, i) =>
          `<button class="btn ${a.class||'btn-navy'}" data-act="${i}">${a.label}</button>`
        ).join('')}</div>`
      : '';

    host.innerHTML = `
      <div class="mdl-back" id="mdl-back">
        <div class="mdl-card mdl-${size}" role="dialog" aria-modal="true" onclick="event.stopPropagation()">
          ${titleHTML}
          <div class="mdl-bd">${body || ''}</div>
          ${actHTML}
        </div>
      </div>`;

    if (allowClose) {
      document.getElementById('mdl-x')?.addEventListener('click', () => close(null));
      document.getElementById('mdl-back').addEventListener('click', (e) => {
        if (e.target.id === 'mdl-back') close(null);
      });
    }
    host.querySelectorAll('[data-act]').forEach((btn) => {
      btn.addEventListener('click', () => {
        const idx = parseInt(btn.dataset.act);
        const act = actions[idx];
        close(act.value !== undefined ? act.value : idx);
      });
    });
  });
}

async function confirmModal(message, opts={}) {
  const result = await showModal({
    title: opts.title || 'Are you sure?',
    body: `<p>${message}</p>`,
    actions: [
      { label: opts.cancelLabel || 'Cancel', class: 'btn-ghost-dark', value: false },
      { label: opts.confirmLabel || 'Confirm', class: opts.confirmClass || 'btn-navy', value: true }
    ],
    size: 'small'
  });
  return result === true;
}

   ARCHIVE
══════════════════════════════════════════════════════ */

function renderArchive() {
  const el = document.getElementById('arch-inner');
  if (!el) return;

  if (!archUnlocked) {
    el.innerHTML = `
      <div class="arch-lock">
        <div class="arch-lock-icon">🔒</div>
        <div class="arch-lock-title">Archive — restricted access</div>
        <div class="arch-lock-sub">Enter the archive password to view completed trainees.</div>
        <div class="arch-lock-row">
          <div class="pwd-row" style="flex:1;max-width:320px">
            <input class="arch-pwd-input mdl-pwd-input" id="arch-pwd" type="password" placeholder="Password…"
              autocomplete="current-password"
              onkeydown="if(event.key==='Enter')checkArchPwd()">
            <button type="button" class="pwd-eye" onclick="togglePwdEye('arch-pwd', this)" aria-label="Show password" title="Show password">
              <span>👁</span>
            </button>
          </div>
          <button class="btn btn-navy" onclick="checkArchPwd()">Unlock</button>
        </div>
        <div class="arch-pwd-err" id="arch-err"></div>
      </div>`;
    return;
  }

  // Sort by start date desc (newest first); group by start date
  const sorted = [...S.archived].sort((a,b) => (b.date||'').localeCompare(a.date||''));
  const groups = {};
  sorted.forEach(t => {
    const key = t.date || 'Unknown date';
    (groups[key] = groups[key] || []).push(t);
  });

  const fmtDate = (iso) => {
    if (!iso || iso === 'Unknown date') return 'Unknown date';
    try {
      const d = new Date(iso);
      if (isNaN(d)) return iso;
      return d.toLocaleDateString('bg-BG',{day:'2-digit',month:'long',year:'numeric'});
    } catch { return iso; }
  };

  const groupHTML = Object.keys(groups).map(dateKey => {
    const grp = groups[dateKey];
    const cards = grp.map(t => {
      const hasData = !!(t.weeks && Object.keys(t.weeks).length);
      const oavg = hasData ? overallAvg(t) : null;
      const trainerLine = t.trainer ? `<div class="arch-card-meta">👤 ${t.trainer}</div>` : '';
      const scoreBadge = oavg !== null
        ? `<div class="arch-card-score sc-${sc(oavg)}">${Math.round(oavg)}</div>`
        : `<div class="arch-card-score-empty" title="No detailed data">—</div>`;
      return `<div class="arch-card" onclick="openArchiveViewer('${t.id}')">
        <div class="arch-card-top">
          <div class="arch-card-name">${t.name}</div>
          ${scoreBadge}
        </div>
        ${trainerLine}
        <div class="arch-card-actions">
          <button class="btn btn-sm btn-ghost-dark" onclick="event.stopPropagation();openArchiveViewer('${t.id}')">View</button>
          <button class="btn btn-sm btn-restore" onclick="event.stopPropagation();askRestore('${t.id}')">↺ Restore</button>
        </div>
      </div>`;
    }).join('');
    return `<div class="arch-group">
      <div class="arch-group-hd">
        <div class="arch-group-date">${fmtDate(dateKey)}</div>
        <div class="arch-group-count">${grp.length} ${grp.length===1?'trainee':'trainees'}</div>
      </div>
      <div class="arch-grid">${cards}</div>
    </div>`;
  }).join('');

  el.innerHTML = `
    <div class="arch-hd">
      <div>
        <div class="week-phase-lbl">Read-only · Password protected</div>
        <div class="week-title">Completed <em>Training</em></div>
      </div>
      <div style="display:flex;align-items:center;gap:10px">
        <div class="arch-count">${S.archived.length} graduates</div>
        ${archUnlocked ? `<button class="arch-lock-btn" onclick="lockArchive()">🔒 Lock archive</button>` : ''}
      </div>
    </div>
    ${groupHTML || '<div class="rw-empty">Archive is empty.</div>'}`;
}

async function askRestore(id) {
  if (!requireEdit()) return promptEditUnlock();
  const t = S.archived.find(x => x.id === id);
  if (!t) return;
  const ok = await confirmModal(
    `Restore <strong>${t.name}</strong> back to active trainees? Their data will be preserved.`,
    { title:'Restore from archive?', confirmLabel:'Restore', confirmClass:'btn-restore' }
  );
  if (!ok) return;
  // Strip archive metadata, ensure weeks structure exists
  const { archived, archivedAt, ...restored } = t;
  if (!restored.weeks) restored.weeks = emptyWeeks();
  WD.forEach(def => { if (!restored.weeks[def.id]) restored.weeks[def.id] = emptyWeeks()[def.id]; });
  S.trainees.push(restored);
  S.archived = S.archived.filter(x => x.id !== id);
  S.activeId = restored.id;
  S.activeWeek = 'w1';
  dirty(); renderAll();
}

/* ══════════════════════════════════════════════════════
   ARCHIVE READ-ONLY VIEWER (modal)
══════════════════════════════════════════════════════ */
function openArchiveViewer(id) {
  const t = S.archived.find(x => x.id === id);
  if (!t) return;

  const hasData = !!(t.weeks && Object.keys(t.weeks).length);
  const startDate = t.date ? new Date(t.date).toLocaleDateString('bg-BG',{day:'2-digit',month:'long',year:'numeric'}) : '—';

  let summaryHTML = '';
  let weeksHTML = '';

  if (hasData) {
    const oavg = overallAvg(t);
    const tavg = phaseAvg(t,'training');
    const mavg = phaseAvg(t,'mentoring');
    summaryHTML = `<div class="rw-summary">
      <div class="rw-summary-cell"><div class="rw-summary-val sc-${sc(oavg)}">${oavg!==null?Math.round(oavg):'—'}</div><div class="rw-summary-lbl">Overall</div></div>
      <div class="rw-summary-cell"><div class="rw-summary-val sc-${sc(tavg)}">${tavg!==null?Math.round(tavg):'—'}</div><div class="rw-summary-lbl">Training</div></div>
      <div class="rw-summary-cell"><div class="rw-summary-val sc-${sc(mavg)}">${mavg!==null?Math.round(mavg):'—'}</div><div class="rw-summary-lbl">Mentoring</div></div>
    </div>`;
    weeksHTML = WD.map(def => buildReadonlyWeek(t, def)).join('');
  } else {
    summaryHTML = `<div class="rw-empty">No detailed data available — historical record from before the tracker was used.</div>`;
  }

  showModal({
    size: 'large',
    subtitle: `Started ${startDate}${t.trainer ? ' · Trainer: '+t.trainer : ''}${t.mentor ? ' · Mentor: '+t.mentor : ''}`,
    title: `${t.name} <em>— archived</em>`,
    body: summaryHTML + weeksHTML,
    actions: [
      { label: '↺ Restore to active', class: 'btn-restore', value: 'restore' },
      { label: 'Close', class: 'btn-ghost-dark', value: 'close' }
    ]
  }).then(action => {
    if (action === 'restore') askRestore(id);
  });
}

function buildReadonlyWeek(t, def) {
  const wd = t.weeks[def.id];
  if (!wd) return '';
  const avg = weekAvg(t, def.id);
  const phaseLbl = def.phase==='training' ? 'Training' : 'Mentoring';

  // Days table (no test column anymore)
  const headers = `<tr>
    <th class="left">Day</th>
    ${def.critLbls.map(l=>`<th>${l}</th>`).join('')}
  </tr>`;

  const rows = wd.days.map((d, i) => {
    const cells = def.crit.map(c => {
      const v = d[c];
      if (!v) return `<td><span class="rw-empty-cell">—</span></td>`;
      const lbl = (RATINGS.find(r=>r.v===v)||{}).l || v;
      const cls = sc(SCORE[v]);
      return `<td><span class="rw-pill op-${cls}">${lbl}</span></td>`;
    }).join('');
    return `<tr><td class="left">Day ${i+1}</td>${cells}</tr>`;
  }).join('');

  // End-of-week test (only for w1 in current schema)
  const testHTML = def.test ? `<div class="rw-test-row">
    <span class="rw-test-lbl">📊 End-of-Week Test:</span>
    ${(wd.test !== '' && wd.test != null)
      ? `<span class="rw-test-val sc-${sc(parseFloat(wd.test))}">${wd.test}%</span>`
      : `<span class="rw-empty-cell">—</span>`}
  </div>` : '';

  // Notes
  const wc = wd.weeklyComment || '';
  const tc = wd.tlComment || '';

  return `<div class="rw-week">
    <div class="rw-hd">
      <div>
        <div class="rw-w-phase">${phaseLbl} Phase</div>
        <div class="rw-w-title">${def.lbl}</div>
      </div>
      <div class="rw-score sc-${sc(avg)}">${avg!==null?Math.round(avg):'—'}</div>
    </div>
    <table class="rw-table">
      <thead>${headers}</thead>
      <tbody>${rows}</tbody>
    </table>
    ${testHTML}
    <div class="rw-notes">
      <div class="rw-note">
        <div class="rw-note-lbl">${def.staffLbl} weekly notes</div>
        <div class="rw-note-bd${wc?'':' empty'}">${wc || 'No notes recorded.'}</div>
      </div>
      <div class="rw-note">
        <div class="rw-note-lbl">TL comments</div>
        <div class="rw-note-bd tl${tc?'':' empty'}">${tc || 'No TL notes recorded.'}</div>
      </div>
    </div>
  </div>`;
}

async function checkArchPwd() {
  const val = document.getElementById('arch-pwd')?.value || '';
  const enc = new TextEncoder().encode(val);
  const buf = await crypto.subtle.digest('SHA-256', enc);
  const hex = Array.from(new Uint8Array(buf)).map(b=>b.toString(16).padStart(2,'0')).join('');
  if (hex === ARCHIVE_HASH) {
    archUnlocked = true;
    renderArchive();
  } else {
    const err = document.getElementById('arch-err');
    if (err) { err.textContent = 'Incorrect password.'; setTimeout(()=>{ if(err) err.textContent=''; }, 2500); }
  }
}

function lockArchive() {
  archUnlocked = false;
  renderArchive();
}

function askArchive() {
  const t = active();
  if (!t) return;
  archiveTrainee(t.id);
}

async function archiveTrainee(id) {
  if (!requireEdit()) return promptEditUnlock();
  const t = S.trainees.find(x=>x.id===id);
  if (!t) return;
  const name = t.name || 'this trainee';
  const ok = await confirmModal(
    `Move <strong>${name}</strong> to the Archive? You can restore them later if needed.`,
    { title:'Archive this trainee?', confirmLabel:'Archive', confirmClass:'btn-archive' }
  );
  if (!ok) return;
  // Preserve full trainee data (weeks, comments, tests) so archive is not just a name list
  const entry = { ...t, archived:true, archivedAt:new Date().toISOString().slice(0,10) };
  S.archived.unshift(entry);
  S.trainees = S.trainees.filter(x=>x.id!==id);
  if (S.trainees.length===0) { const nt=newTrainee(); S.trainees=[nt]; S.activeId=nt.id; }
  else if (S.activeId===id) S.activeId=S.trainees[0].id;
  dirty(); renderAll();
}

/* ══════════════════════════════════════════════════════
   GIST SYNC
   Credentials come from window.GIST_TOKEN / GIST_ID
   (embedded in the file by whoever sets it up).
   "Save & Share" bakes them into the downloaded copy.
══════════════════════════════════════════════════════ */

function gistReady() { return !!(window.GIST_TOKEN && window.GIST_ID); }

/* Setup Gist credentials — stored in localStorage per device.
   Token is never embedded in the HTML file (avoids GitHub auto-revoke). */
function setupGistCredentials() {
  return new Promise((resolve) => {
    const host = document.getElementById('modal-host');
    let resolved = false;
    const cleanup = () => {
      host.innerHTML = '';
      document.body.style.overflow = '';
      document.body.classList.remove('modal-open');
      document.removeEventListener('keydown', onKey);
    };
    const finish = (val) => {
      if (resolved) return;
      resolved = true;
      cleanup();
      resolve(val);
    };
    const onKey = (e) => { if (e.key === 'Escape') finish(false); };

    document.body.style.overflow = 'hidden';
    document.body.classList.add('modal-open');

    const curToken = window.GIST_TOKEN || '';
    const curId    = window.GIST_ID || '';
    const curFile  = window.GIST_FILE || 'training-tracker.json';
    const tokenMasked = curToken ? curToken.substring(0,7) + '…' + curToken.substring(curToken.length-4) : '';

    host.innerHTML = `
      <div class="mdl-back" id="mdl-back">
        <div class="mdl-card mdl-large" role="dialog" aria-modal="true" onclick="event.stopPropagation()" style="max-width:620px">
          <div class="mdl-hd">
            <div>
              <div class="mdl-sub">Per-device · Stored locally</div>
              <div class="mdl-title">Configure <em>Gist sync</em></div>
            </div>
            <button class="mdl-x" id="mdl-x" aria-label="Close">✕</button>
          </div>
          <div class="mdl-bd">
            <p style="margin-bottom:14px">Enter your GitHub Gist credentials. They are stored only in this browser, never uploaded.</p>
            ${curToken ? `<p style="font-size:12px;color:var(--muted);margin-bottom:14px">Currently configured: <strong>${tokenMasked}</strong> · Gist <strong>${curId.substring(0,8)}…</strong></p>` : ''}

            <div style="margin-bottom:14px">
              <label style="display:block;font-size:11px;font-weight:800;text-transform:uppercase;letter-spacing:.08em;color:var(--muted);margin-bottom:6px">GitHub Personal Access Token</label>
              <div class="pwd-row">
                <input type="password" id="cfg-token" class="mdl-pwd-input" placeholder="ghp_..." autocomplete="off" spellcheck="false">
                <button type="button" class="pwd-eye" onclick="togglePwdEye('cfg-token', this)" title="Show"><span>👁</span></button>
              </div>
              <div style="font-size:11px;color:var(--muted2);margin-top:4px">Classic token with <strong>gist</strong> scope. <a href="https://github.com/settings/tokens/new?scopes=gist&description=Training%20Tracker" target="_blank" style="color:var(--teal-deep)">Generate one →</a></div>
            </div>

            <div style="margin-bottom:14px">
              <label style="display:block;font-size:11px;font-weight:800;text-transform:uppercase;letter-spacing:.08em;color:var(--muted);margin-bottom:6px">Gist ID</label>
              <input type="text" id="cfg-id" class="mdl-pwd-input" placeholder="0ff26bff55c4bdde42196f6c54a3e236" value="${curId}" autocomplete="off" spellcheck="false">
              <div style="font-size:11px;color:var(--muted2);margin-top:4px">The hex string from the gist URL: gist.github.com/user/<strong>{this part}</strong></div>
            </div>

            <div style="margin-bottom:14px">
              <label style="display:block;font-size:11px;font-weight:800;text-transform:uppercase;letter-spacing:.08em;color:var(--muted);margin-bottom:6px">Filename inside Gist</label>
              <input type="text" id="cfg-file" class="mdl-pwd-input" placeholder="training-tracker.json" value="${curFile}" autocomplete="off" spellcheck="false">
            </div>

            <div class="mdl-pwd-err" id="cfg-err"></div>
            <div id="cfg-status" style="font-size:12px;font-weight:700;color:var(--teal-deep);min-height:18px"></div>
          </div>
          <div class="mdl-ft">
            ${curToken ? `<button class="btn btn-danger" id="btn-clear">Disconnect</button>` : ''}
            <div style="flex:1"></div>
            <button class="btn btn-ghost-dark" id="btn-cancel">Cancel</button>
            <button class="btn btn-navy" id="btn-test">Test &amp; Save</button>
          </div>
        </div>
      </div>`;

    const tokenIn = document.getElementById('cfg-token');
    const idIn    = document.getElementById('cfg-id');
    const fileIn  = document.getElementById('cfg-file');
    const errEl   = document.getElementById('cfg-err');
    const statusEl = document.getElementById('cfg-status');
    const btnTest = document.getElementById('btn-test');

    let busy = false;
    btnTest.addEventListener('click', async () => {
      if (busy) return;
      const tok  = tokenIn.value.trim();
      const gid  = idIn.value.trim();
      const file = fileIn.value.trim() || 'training-tracker.json';
      errEl.textContent = '';
      if (!tok)  { errEl.textContent = 'Token is required'; tokenIn.focus(); return; }
      if (!gid)  { errEl.textContent = 'Gist ID is required'; idIn.focus(); return; }
      busy = true;
      btnTest.textContent = 'Testing…';
      statusEl.textContent = 'Pinging GitHub…';
      try {
        const r = await fetch(`https://api.github.com/gists/${gid}`, {
          headers: {
            'Authorization': 'Bearer ' + tok,
            'Accept': 'application/vnd.github+json',
            'X-GitHub-Api-Version': '2022-11-28'
          }
        });
        if (!r.ok) {
          const e = await r.json().catch(() => ({}));
          throw new Error(`HTTP ${r.status}: ${e.message || 'unknown error'}`);
        }
        const data = await r.json();
        const files = Object.keys(data.files || {});
        if (!files.includes(file)) {
          if (files.length === 0) {
            throw new Error('Gist exists but contains no files. Add an empty {} file in your gist first.');
          }
          throw new Error(`File "${file}" not found in gist. Available: ${files.join(', ')}`);
        }
        try {
          localStorage.setItem('tt3_gist_token', tok);
          localStorage.setItem('tt3_gist_id', gid);
          localStorage.setItem('tt3_gist_file', file);
        } catch(e) {}
        window.GIST_TOKEN = tok;
        window.GIST_ID    = gid;
        window.GIST_FILE  = file;
        statusEl.textContent = '✓ Connected. Loading data…';
        setTimeout(() => { finish(true); pullGist(); }, 600);
      } catch (e) {
        errEl.textContent = e.message;
        statusEl.textContent = '';
        busy = false;
        btnTest.textContent = 'Test & Save';
      }
    });

    const clearBtn = document.getElementById('btn-clear');
    if (clearBtn) {
      clearBtn.addEventListener('click', async () => {
        cleanup(); resolved = true;
        const ok = await confirmModal(
          'Disconnect this device from Gist sync? Your local data will remain, but new changes will not sync to other devices until you reconnect.',
          { title:'Disconnect sync?', confirmLabel:'Disconnect', confirmClass:'btn-danger' }
        );
        if (!ok) { setupGistCredentials(); return; }
        try {
          localStorage.removeItem('tt3_gist_token');
          localStorage.removeItem('tt3_gist_id');
          localStorage.removeItem('tt3_gist_file');
        } catch(e) {}
        window.GIST_TOKEN = null;
        window.GIST_ID    = null;
        setIndicator('local', 'Local only');
        resolve('disconnect');
      });
    }

    document.getElementById('btn-cancel').addEventListener('click', () => finish(false));
    document.getElementById('mdl-x').addEventListener('click', () => finish(false));
    document.getElementById('mdl-back').addEventListener('click', (e) => {
      if (e.target.id === 'mdl-back') finish(false);
    });

    document.addEventListener('keydown', onKey);
    setTimeout(() => tokenIn.focus(), 30);
  });
}

function setIndicator(state, msg) {
  // state: 'ok' | 'busy' | 'err' | 'local'
  const dot = document.getElementById('as-dot');
  const txt = document.getElementById('as-txt');
  const colors = { ok:'#7ee89a', busy:'#fcd34d', err:'#f87171', local:'rgba(255,255,255,.35)' };
  dot.style.background = colors[state] || colors.local;
  if (msg) txt.textContent = msg;
}

async function pushGist() {
  if (!gistReady()) return;
  if (_gistPushInFlight) {
    // A push is already going; reschedule to push again afterwards
    scheduleGistPush();
    return;
  }
  _gistPushInFlight = true;
  setIndicator('busy', 'Saving…');
  // Snapshot the body BEFORE the await to avoid pushing data that changes mid-flight
  const body = JSON.stringify({ files: { [window.GIST_FILE]: { content: JSON.stringify(S, null, 2) } } });
  const wasPendingBefore = _gistPushPending;
  _gistPushPending = false;
  try {
    const res = await fetch(`https://api.github.com/gists/${window.GIST_ID}`, {
      method: 'PATCH',
      headers: {
        'Authorization': `Bearer ${window.GIST_TOKEN}`,
        'Accept': 'application/vnd.github+json',
        'X-GitHub-Api-Version': '2022-11-28',
        'Content-Type': 'application/json'
      },
      body
    });
    if (!res.ok) {
      const errBody = await res.text();
      throw new Error(`HTTP ${res.status} — ${errBody.substring(0,200)}`);
    }
    setIndicator('ok', 'Synced ✓ ' + new Date().toLocaleTimeString('bg-BG',{hour:'2-digit',minute:'2-digit'}));
  } catch(e) {
    setIndicator('err', 'Sync failed ✕');
    console.error('Gist push error:', e.message);
    // Restore pending flag so beforeunload still flushes
    _gistPushPending = wasPendingBefore;
  } finally {
    _gistPushInFlight = false;
  }
}

let _pullInProgress = false;
async function pullGist() {
  if (!gistReady()) return;
  if (_pullInProgress) return;
  _pullInProgress = true;
  setIndicator('busy', 'Loading…');
  try {
    const res = await fetch(`https://api.github.com/gists/${window.GIST_ID}`, {
      headers: {
        'Authorization': `Bearer ${window.GIST_TOKEN}`,
        'Accept': 'application/vnd.github+json',
        'X-GitHub-Api-Version': '2022-11-28'
      },
      cache: 'no-store'
    });
    if (!res.ok) {
      const errBody = await res.text();
      throw new Error(`HTTP ${res.status} — ${errBody.substring(0,200)}`);
    }
    const data = await res.json();
    const file = data.files[window.GIST_FILE];
    if (!file) {
      const available = Object.keys(data.files || {}).join(', ');
      throw new Error(`File "${window.GIST_FILE}" not found in Gist. Available files: ${available || '(none)'}`);
    }
    if (!file.content || file.content.trim() === '{}' || file.content.trim() === '') {
      setIndicator('ok', 'Gist empty — starting fresh');
      return;
    }
    const loaded = JSON.parse(file.content);
    if (!loaded.trainees) {
      setIndicator('ok', 'Gist invalid — starting fresh');
      return;
    }
    // Don't clobber unpushed local edits — push them out first, skip the pull
    if (_gistPushPending || _gistPushInFlight) {
      console.log('Skipping pull: local has unpushed changes');
      setIndicator('ok', 'Local changes preserved');
      return;
    }
    S = loaded;
    applyMigrations(S);
    try { localStorage.setItem('tt3_state', JSON.stringify(S)); } catch(e){}
    setIndicator('ok', 'Loaded ✓ ' + new Date().toLocaleTimeString('bg-BG',{hour:'2-digit',minute:'2-digit'}));
    renderAll();
  } catch(e) {
    setIndicator('err', 'Load failed ✕');
    console.error('Gist pull error:', e.message);
    console.error('Full error:', e);
  } finally {
    _pullInProgress = false;
  }
}

let _gistTimer = null;
let _gistPushPending = false;   // True between dirty() and successful pushGist
let _gistPushInFlight = false;  // True while a pushGist fetch is awaiting

function scheduleGistPush() {
  if (!gistReady()) return;
  _gistPushPending = true;
  clearTimeout(_gistTimer);
  _gistTimer = setTimeout(() => { pushGist(); }, 800);
}

// Flush any pending push synchronously before page unload (so data isn't lost on refresh)
window.addEventListener('beforeunload', (e) => {
  if (!gistReady() || !_gistPushPending) return;
  // Clear the debounce — we'll force-push now
  clearTimeout(_gistTimer);
  // Use sync XHR to ensure the request goes out before the page unloads
  try {
    const xhr = new XMLHttpRequest();
    xhr.open('PATCH', `https://api.github.com/gists/${window.GIST_ID}`, false); // false = synchronous
    xhr.setRequestHeader('Authorization', 'Bearer ' + window.GIST_TOKEN);
    xhr.setRequestHeader('Accept', 'application/vnd.github+json');
    xhr.setRequestHeader('Content-Type', 'application/json');
    xhr.send(JSON.stringify({ files: { [window.GIST_FILE]: { content: JSON.stringify(S, null, 2) } } }));
    _gistPushPending = false;
  } catch(err) {
    // If sync fails, at least localStorage has it
    console.error('Beforeunload flush failed:', err);
  }
});

/* ══════════════════════════════════════════════════════
   INIT
══════════════════════════════════════════════════════ */
renderAll();
applyEditLockUI();

if (gistReady()) {
  // Auto-load from Gist on open (Gist is source of truth)
  pullGist();
} else {
  setIndicator('local', 'Local only');
}
</script>
