   EXPORT / SAVE & SHARE
══════════════════════════════════════════════════════ */
function exportJSON() {
  dl(new Blob([JSON.stringify(S,null,2)],{type:'application/json'}), `training_data.json`);
}
function saveHTML() {
  let html = document.documentElement.outerHTML;
  // Embed current data
  html = html.replace(/window\.FORM_DATA\s*=\s*null;/, `window.FORM_DATA = ${JSON.stringify(S)};`);
  // Embed credentials (they stay from window.GIST_TOKEN/ID already in the live page outerHTML)
  dl(new Blob([html],{type:'text/html;charset=utf-8'}), `training_tracker.html`);
}
function dl(blob, name) {
  const url=URL.createObjectURL(blob), a=document.createElement('a');
  a.href=url; a.download=name; a.click(); URL.revokeObjectURL(url);
}

/* ══════════════════════════════════════════════════════
   TOAST
══════════════════════════════════════════════════════ */
function toast(msg, type='info') {
  const host = document.getElementById('toast-host');
  if (!host) return;
  const el = document.createElement('div');
  el.className = `toast toast-${type}`;
  const icon = type === 'warn' ? '🔒' : type === 'ok' ? '✓' : 'ⓘ';
  el.innerHTML = `<span>${icon}</span><span>${msg}</span>`;
  host.appendChild(el);
  setTimeout(() => el.remove(), 3000);
}

/* ══════════════════════════════════════════════════════
   EDIT LOCK — UI gating
══════════════════════════════════════════════════════ */
async function sha256Hex(str) {
  const buf = await crypto.subtle.digest('SHA-256', new TextEncoder().encode(str));
  return Array.from(new Uint8Array(buf)).map(b => b.toString(16).padStart(2,'0')).join('');
}

function togglePwdEye(inputId, btn) {
  const inp = document.getElementById(inputId);
  if (!inp) return;
  const showing = inp.type === 'text';
  inp.type = showing ? 'password' : 'text';
  const span = btn.querySelector('span');
  if (span) span.textContent = showing ? '👁' : '🙈';
  btn.title = showing ? 'Show password' : 'Hide password';
  inp.focus();
}

function applyEditLockUI() {
  document.body.classList.toggle('readonly', !editUnlocked);
  const pill = document.getElementById('lock-pill');
  const txt = document.getElementById('lock-pill-txt');
  if (pill) pill.classList.toggle('unlocked', editUnlocked);
  if (txt) txt.textContent = editUnlocked ? 'Editor mode' : 'Read only';
  if (pill) {
    const icon = pill.querySelector('.lock-icon');
    if (icon) icon.textContent = editUnlocked ? '🔓' : '🔒';
  }
  // Toggle inputs disabled state
  document.querySelectorAll('.setup-input, .test-input, .note-ta, .week-ta').forEach(el => {
    if (editUnlocked) el.removeAttribute('readonly');
    else el.setAttribute('readonly', 'readonly');
  });
}

async function toggleEditLock() {
  if (editUnlocked) {
    // Lock — confirm
    const ok = await confirmModal(
      'Lock the tool? You will need to re-enter the password to make further changes.',
      { title:'Lock tool?', confirmLabel:'Lock', confirmClass:'btn-navy' }
    );
    if (!ok) return;
    editUnlocked = false;
    try { sessionStorage.removeItem('tt3_edit'); } catch(e) {}
    applyEditLockUI();
    toast('Tool locked. Read-only mode.', 'info');
    return;
  }
  // Unlock prompt
  await promptEditUnlock();
}

function promptEditUnlock() {
  return new Promise((resolve) => {
    const host = document.getElementById('modal-host');
    let resolved = false;
    const cleanup = () => {
      host.innerHTML = '';
      document.body.style.overflow = '';
      document.body.classList.remove('modal-open');
      document.removeEventListener('keydown', onKey);
    };
    const finish = (val) => {
      if (resolved) return;
      resolved = true;
      cleanup();
      resolve(val);
    };
    const onKey = (e) => {
      if (e.key === 'Escape') finish(false);
      else if (e.key === 'Enter' && document.activeElement?.id === 'edit-pwd-in') {
        e.preventDefault();
        attempt();
      }
    };

    document.body.style.overflow = 'hidden';
    document.body.classList.add('modal-open');

    host.innerHTML = `
      <div class="mdl-back" id="mdl-back">
        <div class="mdl-card mdl-small" role="dialog" aria-modal="true" onclick="event.stopPropagation()">
          <div class="mdl-hd">
            <div>
              <div class="mdl-sub">Trainers · Mentors · Team Leads</div>
              <div class="mdl-title">Unlock <em>editor mode</em></div>
            </div>
            <button class="mdl-x" id="mdl-x" aria-label="Close">✕</button>
          </div>
          <div class="mdl-bd">
            <p>Enter the editor password to enable editing, archiving, and adding trainees.</p>
            <div class="pwd-row">
              <input type="password" id="edit-pwd-in" class="mdl-pwd-input" placeholder="Editor password…" autocomplete="current-password">
              <button type="button" class="pwd-eye" id="pwd-eye" aria-label="Show password" title="Show password">
                <span id="pwd-eye-icon">👁</span>
              </button>
            </div>
            <div class="mdl-pwd-err" id="edit-pwd-err"></div>
          </div>
          <div class="mdl-ft">
            <button class="btn btn-ghost-dark" id="btn-cancel">Cancel</button>
            <button class="btn btn-navy" id="btn-unlock">Unlock</button>
          </div>
        </div>
      </div>`;

    const input = document.getElementById('edit-pwd-in');
    const errEl = document.getElementById('edit-pwd-err');
    const eye = document.getElementById('pwd-eye');
    const eyeIcon = document.getElementById('pwd-eye-icon');

    let busy = false;
    const attempt = async () => {
      if (busy || resolved) return;
      busy = true;
      const val = input.value || '';
      const hex = await sha256Hex(val);
      if (hex === EDIT_HASH) {
        editUnlocked = true;
        try { sessionStorage.setItem('tt3_edit', '1'); } catch(e) {}
        applyEditLockUI();
        finish(true);
        toast('Editor mode unlocked', 'ok');
      } else {
        busy = false;
        errEl.textContent = 'Incorrect password';
        input.classList.add('shake');
        input.select();
        setTimeout(() => input.classList.remove('shake'), 400);
      }
    };

    document.getElementById('btn-unlock').addEventListener('click', attempt);
    document.getElementById('btn-cancel').addEventListener('click', () => finish(false));
    document.getElementById('mdl-x').addEventListener('click', () => finish(false));
    document.getElementById('mdl-back').addEventListener('click', (e) => {
      if (e.target.id === 'mdl-back') finish(false);
    });

    eye.addEventListener('click', () => {
      const showing = input.type === 'text';
      input.type = showing ? 'password' : 'text';
      eyeIcon.textContent = showing ? '👁' : '🙈';
      eye.title = showing ? 'Show password' : 'Hide password';
      input.focus();
    });

    document.addEventListener('keydown', onKey);
    setTimeout(() => input.focus(), 30);
  });
}

function requireEdit() {
  if (editUnlocked) return true;
  toast('Read-only mode — ask for the editor password to make changes', 'warn');
  return false;
}

/* ══════════════════════════════════════════════════════
   MODAL SYSTEM
══════════════════════════════════════════════════════ */
function showModal({ title, subtitle, body, actions, size='small', allowClose=true }) {
  return new Promise((resolve) => {
    const host = document.getElementById('modal-host');
    let resolved = false;
    const close = (val) => {
      if (resolved) return;
      resolved = true;
      host.innerHTML = '';
      document.body.style.overflow = '';
      document.body.classList.remove('modal-open');
      document.removeEventListener('keydown', onKey);
      resolve(val);
    };
    const onKey = (e) => { if (e.key === 'Escape' && allowClose) close(null); };
    document.addEventListener('keydown', onKey);
    document.body.style.overflow = 'hidden';
    document.body.classList.add('modal-open');

    const titleHTML = title ? `<div class="mdl-hd">
      <div>
        ${subtitle ? `<div class="mdl-sub">${subtitle}</div>` : ''}
        <div class="mdl-title">${title}</div>
      </div>
      ${allowClose ? `<button class="mdl-x" id="mdl-x" aria-label="Close">✕</button>` : ''}
    </div>` : '';

    const actHTML = (actions || []).length
      ? `<div class="mdl-ft">${actions.map((a, i) =>
          `<button class="btn ${a.class||'btn-navy'}" data-act="${i}">${a.label}</button>`
        ).join('')}</div>`
      : '';

    host.innerHTML = `
      <div class="mdl-back" id="mdl-back">
        <div class="mdl-card mdl-${size}" role="dialog" aria-modal="true" onclick="event.stopPropagation()">
          ${titleHTML}
          <div class="mdl-bd">${body || ''}</div>
          ${actHTML}
        </div>
      </div>`;

    if (allowClose) {
      document.getElementById('mdl-x')?.addEventListener('click', () => close(null));
      document.getElementById('mdl-back').addEventListener('click', (e) => {
        if (e.target.id === 'mdl-back') close(null);
      });
    }
    host.querySelectorAll('[data-act]').forEach((btn) => {
      btn.addEventListener('click', () => {
        const idx = parseInt(btn.dataset.act);
        const act = actions[idx];
        close(act.value !== undefined ? act.value : idx);
      });
    });
  });
}

async function confirmModal(message, opts={}) {
  const result = await showModal({
    title: opts.title || 'Are you sure?',
    body: `<p>${message}</p>`,
    actions: [
      { label: opts.cancelLabel || 'Cancel', class: 'btn-ghost-dark', value: false },
      { label: opts.confirmLabel || 'Confirm', class: opts.confirmClass || 'btn-navy', value: true }
    ],
    size: 'small'
  });
  return result === true;
}

/* ══════════════════════════════════════════════════════
   ARCHIVE
══════════════════════════════════════════════════════ */

function renderArchive() {
  const el = document.getElementById('arch-inner');
  if (!el) return;

  if (!archUnlocked) {
    el.innerHTML = `
      <div class="arch-lock">
        <div class="arch-lock-icon">🔒</div>
        <div class="arch-lock-title">Archive — restricted access</div>
        <div class="arch-lock-sub">Enter the archive password to view completed trainees.</div>
        <div class="arch-lock-row">
          <div class="pwd-row" style="flex:1;max-width:320px">
            <input class="arch-pwd-input mdl-pwd-input" id="arch-pwd" type="password" placeholder="Password…"
              autocomplete="current-password"
              onkeydown="if(event.key==='Enter')checkArchPwd()">
            <button type="button" class="pwd-eye" onclick="togglePwdEye('arch-pwd', this)" aria-label="Show password" title="Show password">
              <span>👁</span>
            </button>
          </div>
          <button class="btn btn-navy" onclick="checkArchPwd()">Unlock</button>
        </div>
        <div class="arch-pwd-err" id="arch-err"></div>
      </div>`;
    return;
  }

  // Sort by start date desc (newest first); group by start date
  const sorted = [...S.archived].sort((a,b) => (b.date||'').localeCompare(a.date||''));
  const groups = {};
  sorted.forEach(t => {
    const key = t.date || 'Unknown date';
    (groups[key] = groups[key] || []).push(t);
  });

  const fmtDate = (iso) => {
    if (!iso || iso === 'Unknown date') return 'Unknown date';
    try {
      const d = new Date(iso);
      if (isNaN(d)) return iso;
      return d.toLocaleDateString('bg-BG',{day:'2-digit',month:'long',year:'numeric'});
    } catch { return iso; }
  };

  const groupHTML = Object.keys(groups).map(dateKey => {
    const grp = groups[dateKey];
    const cards = grp.map(t => {
      const hasData = !!(t.weeks && Object.keys(t.weeks).length);
      const oavg = hasData ? overallAvg(t) : null;
      const trainerLine = t.trainer ? `<div class="arch-card-meta">👤 ${t.trainer}</div>` : '';
      const scoreBadge = oavg !== null
        ? `<div class="arch-card-score sc-${sc(oavg)}">${Math.round(oavg)}</div>`
        : `<div class="arch-card-score-empty" title="No detailed data">—</div>`;
      return `<div class="arch-card" onclick="openArchiveViewer('${t.id}')">
        <div class="arch-card-top">
          <div class="arch-card-name">${t.name}</div>
          ${scoreBadge}
        </div>
        ${trainerLine}
        <div class="arch-card-actions">
          <button class="btn btn-sm btn-ghost-dark" onclick="event.stopPropagation();openArchiveViewer('${t.id}')">View</button>
          <button class="btn btn-sm btn-restore" onclick="event.stopPropagation();askRestore('${t.id}')">↺ Restore</button>
        </div>
      </div>`;
    }).join('');
    return `<div class="arch-group">
      <div class="arch-group-hd">
        <div class="arch-group-date">${fmtDate(dateKey)}</div>
        <div class="arch-group-count">${grp.length} ${grp.length===1?'trainee':'trainees'}</div>
      </div>
      <div class="arch-grid">${cards}</div>
    </div>`;
  }).join('');

  el.innerHTML = `
    <div class="arch-hd">
      <div>
        <div class="week-phase-lbl">Read-only · Password protected</div>
        <div class="week-title">Completed <em>Training</em></div>
      </div>
      <div style="display:flex;align-items:center;gap:10px">
        <div class="arch-count">${S.archived.length} graduates</div>
        ${archUnlocked ? `<button class="arch-lock-btn" onclick="lockArchive()">🔒 Lock archive</button>` : ''}
      </div>
    </div>
    ${groupHTML || '<div class="rw-empty">Archive is empty.</div>'}`;
}

async function askRestore(id) {
  if (!requireEdit()) return promptEditUnlock();
  const t = S.archived.find(x => x.id === id);
  if (!t) return;
  const ok = await confirmModal(
    `Restore <strong>${t.name}</strong> back to active trainees? Their data will be preserved.`,
    { title:'Restore from archive?', confirmLabel:'Restore', confirmClass:'btn-restore' }
  );
  if (!ok) return;
  // Strip archive metadata, ensure weeks structure exists
  const { archived, archivedAt, ...restored } = t;
  if (!restored.weeks) restored.weeks = emptyWeeks();
  WD.forEach(def => { if (!restored.weeks[def.id]) restored.weeks[def.id] = emptyWeeks()[def.id]; });
  S.trainees.push(restored);
  S.archived = S.archived.filter(x => x.id !== id);
  S.activeId = restored.id;
  S.activeWeek = 'w1';
  dirty(); renderAll();
}

/* ══════════════════════════════════════════════════════
   ARCHIVE READ-ONLY VIEWER (modal)
══════════════════════════════════════════════════════ */
function openArchiveViewer(id) {
  const t = S.archived.find(x => x.id === id);
  if (!t) return;

  const hasData = !!(t.weeks && Object.keys(t.weeks).length);
  const startDate = t.date ? new Date(t.date).toLocaleDateString('bg-BG',{day:'2-digit',month:'long',year:'numeric'}) : '—';

  let summaryHTML = '';
  let weeksHTML = '';

  if (hasData) {
    const oavg = overallAvg(t);
    const tavg = phaseAvg(t,'training');
    const mavg = phaseAvg(t,'mentoring');
    summaryHTML = `<div class="rw-summary">
      <div class="rw-summary-cell"><div class="rw-summary-val sc-${sc(oavg)}">${oavg!==null?Math.round(oavg):'—'}</div><div class="rw-summary-lbl">Overall</div></div>
      <div class="rw-summary-cell"><div class="rw-summary-val sc-${sc(tavg)}">${tavg!==null?Math.round(tavg):'—'}</div><div class="rw-summary-lbl">Training</div></div>
      <div class="rw-summary-cell"><div class="rw-summary-val sc-${sc(mavg)}">${mavg!==null?Math.round(mavg):'—'}</div><div class="rw-summary-lbl">Mentoring</div></div>
    </div>`;
    weeksHTML = WD.map(def => buildReadonlyWeek(t, def)).join('');
  } else {
    summaryHTML = `<div class="rw-empty">No detailed data available — historical record from before the tracker was used.</div>`;
  }

  showModal({
    size: 'large',
    subtitle: `Started ${startDate}${t.trainer ? ' · Trainer: '+t.trainer : ''}${t.mentor ? ' · Mentor: '+t.mentor : ''}`,
    title: `${t.name} <em>— archived</em>`,
    body: summaryHTML + weeksHTML,
    actions: [
      { label: '↺ Restore to active', class: 'btn-restore', value: 'restore' },
      { label: 'Close', class: 'btn-ghost-dark', value: 'close' }
    ]
  }).then(action => {
    if (action === 'restore') askRestore(id);
  });
}

function buildReadonlyWeek(t, def) {
  const wd = t.weeks[def.id];
  if (!wd) return '';
  const avg = weekAvg(t, def.id);
  const phaseLbl = def.phase==='training' ? 'Training' : 'Mentoring';

  // Days table
  const headers = `<tr>
    <th class="left">Day</th>
    ${def.critLbls.map(l=>`<th>${l}</th>`).join('')}
    ${def.test ? '<th>Test</th>' : ''}
  </tr>`;

  const rows = wd.days.map((d, i) => {
    const cells = def.crit.map(c => {
      const v = d[c];
      if (!v) return `<td><span class="rw-empty-cell">—</span></td>`;
      const lbl = (RATINGS.find(r=>r.v===v)||{}).l || v;
      const cls = sc(SCORE[v]);
      return `<td><span class="rw-pill op-${cls}">${lbl}</span></td>`;
    }).join('');
    const testCell = def.test
      ? (d.test!=='' && d.test!=null
          ? `<td class="rw-test sc-${sc(parseFloat(d.test))}">${d.test}%</td>`
          : `<td><span class="rw-empty-cell">—</span></td>`)
      : '';
    return `<tr><td class="left">Day ${i+1}</td>${cells}${testCell}</tr>`;
  }).join('');

  // Notes
  const wc = wd.weeklyComment || '';
  const tc = wd.tlComment || '';

  return `<div class="rw-week">
    <div class="rw-hd">
      <div>
        <div class="rw-w-phase">${phaseLbl} Phase</div>
        <div class="rw-w-title">${def.lbl}</div>
      </div>
      <div class="rw-score sc-${sc(avg)}">${avg!==null?Math.round(avg):'—'}</div>
    </div>
    <table class="rw-table">
      <thead>${headers}</thead>
      <tbody>${rows}</tbody>
    </table>
    <div class="rw-notes">
      <div class="rw-note">
        <div class="rw-note-lbl">${def.staffLbl} weekly notes</div>
        <div class="rw-note-bd${wc?'':' empty'}">${wc || 'No notes recorded.'}</div>
      </div>
      <div class="rw-note">
        <div class="rw-note-lbl">TL comments</div>
        <div class="rw-note-bd tl${tc?'':' empty'}">${tc || 'No TL notes recorded.'}</div>
      </div>
    </div>
  </div>`;
}

async function checkArchPwd() {
  const val = document.getElementById('arch-pwd')?.value || '';
  const enc = new TextEncoder().encode(val);
  const buf = await crypto.subtle.digest('SHA-256', enc);
  const hex = Array.from(new Uint8Array(buf)).map(b=>b.toString(16).padStart(2,'0')).join('');
  if (hex === ARCHIVE_HASH) {
    archUnlocked = true;
    renderArchive();
  } else {
    const err = document.getElementById('arch-err');
    if (err) { err.textContent = 'Incorrect password.'; setTimeout(()=>{ if(err) err.textContent=''; }, 2500); }
  }
}

function lockArchive() {
  archUnlocked = false;
  renderArchive();
}

function askArchive() {
  const t = active();
  if (!t) return;
  archiveTrainee(t.id);
}

async function archiveTrainee(id) {
  if (!requireEdit()) return promptEditUnlock();
  const t = S.trainees.find(x=>x.id===id);
  if (!t) return;
  const name = t.name || 'this trainee';
  const ok = await confirmModal(
    `Move <strong>${name}</strong> to the Archive? You can restore them later if needed.`,
    { title:'Archive this trainee?', confirmLabel:'Archive', confirmClass:'btn-archive' }
  );
  if (!ok) return;
  // Preserve full trainee data (weeks, comments, tests) so archive is not just a name list
  const entry = { ...t, archived:true, archivedAt:new Date().toISOString().slice(0,10) };
  S.archived.unshift(entry);
  S.trainees = S.trainees.filter(x=>x.id!==id);
  if (S.trainees.length===0) { const nt=newTrainee(); S.trainees=[nt]; S.activeId=nt.id; }
  else if (S.activeId===id) S.activeId=S.trainees[0].id;
  dirty(); renderAll();
}

/* ══════════════════════════════════════════════════════
   GIST SYNC
   Credentials come from window.GIST_TOKEN / GIST_ID
   (embedded in the file by whoever sets it up).
   "Save & Share" bakes them into the downloaded copy.
══════════════════════════════════════════════════════ */

function gistReady() { return !!(window.GIST_TOKEN && window.GIST_ID); }

function setIndicator(state, msg) {
  // state: 'ok' | 'busy' | 'err' | 'local'
  const dot = document.getElementById('as-dot');
  const txt = document.getElementById('as-txt');
  const colors = { ok:'#7ee89a', busy:'#fcd34d', err:'#f87171', local:'rgba(255,255,255,.35)' };
  dot.style.background = colors[state] || colors.local;
  if (msg) txt.textContent = msg;
}

async function pushGist() {
  if (!gistReady()) return;
  setIndicator('busy', 'Saving…');
  try {
    const res = await fetch(`https://api.github.com/gists/${window.GIST_ID}`, {
      method: 'PATCH',
      headers: {
        'Authorization': `Bearer ${window.GIST_TOKEN}`,
        'Accept': 'application/vnd.github+json',
        'X-GitHub-Api-Version': '2022-11-28',
        'Content-Type': 'application/json'
      },
      body: JSON.stringify({ files: { [window.GIST_FILE]: { content: JSON.stringify(S, null, 2) } } })
    });
    if (!res.ok) {
      const errBody = await res.text();
      throw new Error(`HTTP ${res.status} — ${errBody.substring(0,200)}`);
    }
    setIndicator('ok', 'Synced ✓ ' + new Date().toLocaleTimeString('bg-BG',{hour:'2-digit',minute:'2-digit'}));
  } catch(e) {
    setIndicator('err', 'Sync failed ✕');
    console.error('Gist push error:', e.message);
  }
}

async function pullGist() {
  if (!gistReady()) return;
  setIndicator('busy', 'Loading…');
  try {
    const res = await fetch(`https://api.github.com/gists/${window.GIST_ID}`, {
      headers: {
        'Authorization': `Bearer ${window.GIST_TOKEN}`,
        'Accept': 'application/vnd.github+json',
        'X-GitHub-Api-Version': '2022-11-28'
      }
    });
    if (!res.ok) {
      const errBody = await res.text();
      throw new Error(`HTTP ${res.status} — ${errBody.substring(0,200)}`);
    }
    const data = await res.json();
    const file = data.files[window.GIST_FILE];
    if (!file) {
      const available = Object.keys(data.files || {}).join(', ');
      throw new Error(`File "${window.GIST_FILE}" not found in Gist. Available files: ${available || '(none)'}`);
    }
    if (!file.content || file.content.trim() === '{}' || file.content.trim() === '') {
      setIndicator('ok', 'Gist empty — starting fresh');
      return;
    }
    const loaded = JSON.parse(file.content);
    S = loaded;
    S.trainees.forEach(t => { WD.forEach(def => { if(!t.weeks[def.id]) t.weeks[def.id]=emptyWeeks()[def.id]; }); });
    if (!S.activeId && S.trainees.length) S.activeId = S.trainees[0].id;
    if (!S.activeWeek) S.activeWeek = 'w1';
    try { localStorage.setItem('tt3_state', JSON.stringify(S)); } catch(e){}
    setIndicator('ok', 'Loaded ✓ ' + new Date().toLocaleTimeString('bg-BG',{hour:'2-digit',minute:'2-digit'}));
    renderAll();
  } catch(e) {
    setIndicator('err', 'Load failed ✕');
    console.error('Gist pull error:', e.message);
    console.error('Full error:', e);
  }
}

let _gistTimer = null;
function scheduleGistPush() {
  if (!gistReady()) return;
  clearTimeout(_gistTimer);
  _gistTimer = setTimeout(pushGist, 2500);
}

/* ══════════════════════════════════════════════════════
   INIT
══════════════════════════════════════════════════════ */
renderAll();
applyEditLockUI();

if (gistReady()) {
  // Auto-load from Gist on open (Gist is source of truth)
  pullGist();
} else {
  setIndicator('local', 'Local only');
}
</script>
