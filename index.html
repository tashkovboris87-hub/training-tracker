<style>
:root {
  --navy:      #192166;
  --teal:      #00C4D0;
  --teal-deep: #009EBD;
  --amber:     #d97706;
  --green:     #3d9e4a;
  --red:       #e4003a;
  --bg:        #eef2f8;
  --bg2:       #f4f7fc;
  --surface:   #ffffff;
  --border:    rgba(25,33,102,0.11);
  --border-m:  rgba(25,33,102,0.18);
  --muted:     #7a85a8;
  --muted2:    #9aaac8;
  --navy-tint: rgba(25,33,102,0.06);
  --teal-tint: rgba(0,196,208,0.10);
  --amber-tint:rgba(217,119,6,0.10);
  --red-tint:  rgba(228,0,58,0.08);
  --green-tint:rgba(61,158,74,0.10);
  --r:  13px;
  --r-sm: 8px;
  --max: 1160px;
  --grad: linear-gradient(135deg,#192166 0%,#009EBD 55%,#00C4D0 100%);
}

/* Rating select colours */
.rc-exceptional   { background:rgba(61,158,74,.15);  color:#1f6b2a; border-color:rgba(61,158,74,.4)!important; }
.rc-no_concern    { background:rgba(0,196,208,.14);  color:#006f7e; border-color:rgba(0,196,208,.4)!important; }
.rc-attention     { background:rgba(217,119,6,.14);  color:#8a5000; border-color:rgba(217,119,6,.4)!important; }
.rc-cause_concern { background:rgba(228,0,58,.12);   color:#b0001a; border-color:rgba(228,0,58,.4)!important; }
.rc-not_applicable{ background:rgba(154,170,200,.15);color:#5a6888; border-color:rgba(154,170,200,.4)!important; }
.rc-paid_leave,.rc-sick_leave,.rc-holidays
                  { background:rgba(59,130,246,.12); color:#1d4ed8; border-color:rgba(59,130,246,.4)!important; }
.sc-good  { color:var(--green); }
.sc-ok    { color:var(--teal-deep); }
.sc-watch { color:var(--amber); }
.sc-bad   { color:var(--red); }
.sc-none  { color:var(--muted); }

*,*::before,*::after { box-sizing:border-box; margin:0; padding:0; }
button:focus { outline:none; }
button:focus-visible { outline:2px solid var(--teal); outline-offset:2px; }
body { font-family:'Nunito',system-ui,sans-serif; font-size:14px; line-height:1.6; background:var(--bg); color:var(--navy); min-height:100vh; }
body::before {
  content:''; position:fixed; inset:0; z-index:0; pointer-events:none;
  background:
    radial-gradient(ellipse 60% 45% at 8% 12%, rgba(25,33,102,.09) 0%,transparent 65%),
    radial-gradient(ellipse 40% 38% at 95% 80%,rgba(0,196,208,.09) 0%,transparent 65%),
    radial-gradient(ellipse 35% 30% at 62% 0%, rgba(0,159,179,.06) 0%,transparent 60%);
}
body::after {
  content:''; position:fixed; inset:0; z-index:0; pointer-events:none;
  background-image:radial-gradient(circle,rgba(25,33,102,.055) 1px,transparent 1px);
  background-size:32px 32px;
}
body > * { position:relative; z-index:1; }

/* ── HEADER ─────────────────────────────────────────── */
.hdr {
  background:var(--grad);
  padding:16px 28px;
  display:flex; align-items:center; justify-content:space-between;
  box-shadow:0 4px 22px rgba(25,33,102,.28);
  position:sticky; top:0; z-index:300;
}
.hdr-left { display:flex; align-items:center; gap:12px; }
.hdr-logo {
  width:36px; height:36px; border-radius:10px;
  background:rgba(255,255,255,.2); border:1px solid rgba(255,255,255,.25);
  display:flex; align-items:center; justify-content:center; font-size:18px;
}
.hdr-title {
  font-family:'Nunito',sans-serif; font-size:18px; font-weight:900;
  color:#fff; letter-spacing:-.02em; line-height:1.2;
}
.hdr-title em { font-style:normal; font-weight:400; opacity:.82; }
.hdr-sub { color:rgba(255,255,255,.6); font-size:11px; font-weight:700; letter-spacing:.04em; text-transform:uppercase; margin-top:2px; }
.hdr-right { display:flex; align-items:center; gap:9px; }
.as { display:flex; align-items:center; gap:5px; font-size:11px; font-weight:700; color:rgba(255,255,255,.6); margin-right:4px; }
.as-dot { width:7px; height:7px; border-radius:50%; background:rgba(255,255,255,.3); transition:background .3s; }
.as-dot.saved  { background:#7ee89a; }
.as-dot.saving { background:#fcd34d; animation:blink .5s infinite alternate; }
@keyframes blink { from{opacity:.4} to{opacity:1} }

/* ── BUTTONS ─────────────────────────────────────────── */
.btn {
  display:inline-flex; align-items:center; gap:6px;
  padding:8px 15px; border-radius:9px; border:none; cursor:pointer;
  font-family:'Nunito',sans-serif; font-size:12px; font-weight:800; transition:all .18s; white-space:nowrap;
}
.btn-ghost { background:rgba(255,255,255,.18); color:#fff; border:1px solid rgba(255,255,255,.28); }
.btn-ghost:hover { background:rgba(255,255,255,.28); }
.btn-white { background:#fff; color:var(--navy); box-shadow:0 2px 10px rgba(25,33,102,.22); }
.btn-white:hover { background:#f0f4fb; transform:translateY(-1px); }
.btn-navy { background:var(--navy); color:#fff; }
.btn-navy:hover { background:#131a55; }
.btn-teal { background:var(--teal); color:#fff; }
.btn-teal:hover { background:var(--teal-deep); }
.btn-sm { padding:6px 11px; font-size:11px; border-radius:7px; }
.btn-danger { background:var(--red-tint); color:var(--red); border:1.5px solid rgba(228,0,58,.2); }
.btn-danger:hover { background:rgba(228,0,58,.22); }
.btn-archive { background:var(--amber-tint); color:var(--amber); border:1.5px solid rgba(217,119,6,.28); }
.btn-archive:hover { background:rgba(217,119,6,.22); border-color:var(--amber); }
.btn-ghost-dark { background:var(--navy-tint); color:var(--navy); border:1.5px solid var(--border-m); }
.btn-ghost-dark:hover { background:rgba(25,33,102,0.12); }
.btn-restore { background:var(--green-tint); color:var(--green); border:1.5px solid rgba(61,158,74,.3); }
.btn-restore:hover { background:rgba(61,158,74,.22); border-color:var(--green); }

/* ── TRAINEE SWITCHER BAR ───────────────────────────── */
.trainee-bar-outer {
  background:rgba(255,255,255,.95); backdrop-filter:blur(14px);
  border-bottom:1px solid var(--border);
  position:sticky; top:68px; z-index:200;
  box-shadow:0 2px 12px rgba(25,33,102,.07);
}
.trainee-bar {
  max-width:var(--max); margin:0 auto;
  padding:10px 24px;
  display:flex; align-items:center; gap:8px;
  overflow-x:auto; scrollbar-width:none;
}
.trainee-bar::-webkit-scrollbar { display:none; }

.trainee-pill {
  display:flex; align-items:center; gap:7px;
  padding:7px 14px; border-radius:40px; border:none; cursor:pointer;
  font-family:'Nunito',sans-serif; font-size:13px; font-weight:700;
  white-space:nowrap; transition:all .18s;
  background:var(--navy-tint); color:var(--muted);
  border:1.5px solid transparent;
}
.trainee-pill:hover { background:rgba(25,33,102,.1); color:var(--navy); }
.trainee-pill:focus { outline:none; }
.trainee-pill:focus-visible { outline:2px solid var(--teal); outline-offset:2px; }
.trainee-pill.active {
  background:var(--grad); color:#fff;
  box-shadow:0 3px 14px rgba(25,33,102,.28);
}
.pill-name { max-width:130px; overflow:hidden; text-overflow:ellipsis; }
.pill-score {
  font-size:11px; font-weight:800; padding:2px 7px; border-radius:20px;
  background:rgba(255,255,255,.2); color:inherit;
}
.trainee-pill:not(.active) .pill-score {
  background:rgba(25,33,102,.08); color:var(--navy);
}
.pill-remove {
  width:16px; height:16px; border-radius:50%; background:rgba(255,255,255,.25);
  display:flex; align-items:center; justify-content:center;
  font-size:10px; cursor:pointer; border:none; color:inherit; font-family:inherit; font-weight:800;
  transition:background .15s;
}
.pill-remove:hover { background:rgba(228,0,58,.3); color:#fff; }
.trainee-pill:not(.active) .pill-remove:hover { background:rgba(228,0,58,.2); color:var(--red); }

.add-pill {
  padding:7px 14px; border-radius:40px; border:1.5px dashed var(--border-m);
  background:transparent; color:var(--muted2);
  font-family:'Nunito',sans-serif; font-size:13px; font-weight:700;
  cursor:pointer; white-space:nowrap; transition:all .18s; flex-shrink:0;
}
.add-pill:hover { border-color:var(--teal); color:var(--teal-deep); background:var(--teal-tint); }
.add-pill:focus { outline:none; }
.add-pill:focus-visible { outline:2px solid var(--teal); outline-offset:2px; }

.trainee-count {
  margin-left:auto; flex-shrink:0;
  font-size:11px; font-weight:800; text-transform:uppercase;
  letter-spacing:.08em; color:var(--muted2);
  padding-left:8px; border-left:1px solid var(--border);
}

/* ── SETUP CARD ─────────────────────────────────────── */
.setup-outer { max-width:var(--max); margin:0 auto; padding:16px 24px 0; }
.setup-card {
  background:var(--surface); border:1px solid var(--border); border-radius:var(--r);
  padding:14px 20px; box-shadow:0 2px 12px rgba(25,33,102,.06);
}
.setup-grid { display:grid; grid-template-columns:1fr 1fr 1fr 1fr; gap:12px; }
.setup-actions {
  display:flex; justify-content:flex-end; align-items:center;
  margin-top:14px; padding-top:14px; border-top:1px solid var(--border); gap:8px;
}
.setup-actions-empty { display:none; }
.field-lbl { display:block; font-size:10px; font-weight:800; text-transform:uppercase; letter-spacing:.1em; color:var(--muted); margin-bottom:5px; }
.setup-input {
  width:100%; padding:8px 11px;
  border:1.5px solid var(--border-m); border-radius:var(--r-sm);
  font-family:'Nunito',sans-serif; font-size:14px; font-weight:700; color:var(--navy);
  background:var(--bg2); transition:border-color .2s;
}
.setup-input:focus { outline:none; border-color:var(--teal); }
.setup-input::placeholder { color:var(--muted2); font-weight:400; }

/* ── WEEK TAB BAR ───────────────────────────────────── */
.week-bar-outer {
  background:rgba(255,255,255,.92); backdrop-filter:blur(14px);
  border-bottom:1px solid var(--border);
  position:sticky; top:115px; z-index:150;
  box-shadow:0 2px 10px rgba(25,33,102,.06);
}
/* When modal is open, hide sticky elements that would otherwise punch through the modal.
   Header stays visible (it sits at top of viewport, doesn't overlap modal content). */
body.modal-open .week-bar-outer,
body.modal-open .trainee-bar-outer { visibility:hidden; }
.week-bar {
  max-width:var(--max); margin:0 auto; padding:0 24px;
  display:flex; gap:2px; overflow-x:auto; scrollbar-width:none;
}
.week-bar::-webkit-scrollbar { display:none; }
.week-btn {
  display:flex; align-items:center; gap:5px;
  padding:12px 14px; border:none; background:transparent;
  font-family:'Nunito',sans-serif; font-size:13px; font-weight:700; color:var(--muted);
  cursor:pointer; white-space:nowrap;
  border-bottom:3px solid transparent; transition:all .18s;
}
.week-btn:hover { color:var(--navy); }
.week-btn.active { color:var(--navy); border-bottom-color:var(--teal); }
.w-dot { width:7px; height:7px; border-radius:50%; background:var(--border-m); transition:background .3s; }
.w-dot.filled  { background:var(--teal); }
.w-dot.partial { background:var(--amber); }
.w-dot.concern { background:var(--red); }

/* ── MAIN ───────────────────────────────────────────── */
.main { max-width:var(--max); margin:0 auto; padding:20px 24px 60px; }
.panel { display:none; }
.panel.active { display:block; }

/* ── WEEK HEADER ────────────────────────────────────── */
.week-hd { display:flex; align-items:flex-start; justify-content:space-between; margin-bottom:16px; padding-bottom:14px; border-bottom:1px solid var(--border); }
.week-phase-lbl { font-size:10px; font-weight:800; text-transform:uppercase; letter-spacing:.12em; color:var(--teal-deep); margin-bottom:4px; }
.week-title { font-family:'Nunito',sans-serif; font-size:25px; font-weight:900; color:var(--navy); letter-spacing:-.02em; }
.week-title em { font-style:normal; font-weight:700; color:var(--teal-deep); }
.week-score-box { text-align:right; }
.week-score-lbl { font-size:10px; font-weight:800; text-transform:uppercase; letter-spacing:.1em; color:var(--muted); margin-bottom:2px; }
.week-score-num { font-family:'Nunito',sans-serif; font-size:36px; font-weight:900; line-height:1; }

/* ── CRITERIA HEADER ────────────────────────────────── */
.col-hd { font-size:10px; font-weight:800; text-transform:uppercase; letter-spacing:.07em; color:var(--muted); text-align:center; }
.col-hd.left { text-align:left; }

/* ── DAY CARD ───────────────────────────────────────── */
.day-card {
  background:var(--surface); border:1px solid var(--border); border-radius:var(--r-sm);
  padding:11px 15px; margin-bottom:7px;
  box-shadow:0 1px 5px rgba(25,33,102,.04); transition:box-shadow .2s;
}
.day-card:hover { box-shadow:0 3px 14px rgba(25,33,102,.09); }
.day-row { display:grid; gap:7px; align-items:center; }
.day-lbl { display:flex; align-items:center; gap:6px; font-size:11px; font-weight:800; text-transform:uppercase; letter-spacing:.06em; color:var(--navy); }
.day-num-badge { width:22px; height:22px; border-radius:6px; background:var(--navy); color:#fff; display:flex; align-items:center; justify-content:center; font-size:11px; font-weight:800; flex-shrink:0; }

.sel-wrap { position:relative; }
.rating-sel {
  width:100%; padding:7px 22px 7px 9px;
  border:1.5px solid var(--border-m); border-radius:var(--r-sm);
  font-family:'Nunito',sans-serif; font-size:11.5px; font-weight:700; color:var(--navy);
  background:var(--bg2); cursor:pointer; appearance:none; -webkit-appearance:none; transition:all .18s;
}
.rating-sel:focus { outline:none; border-color:var(--teal); }
.sel-wrap::after { content:'▾'; position:absolute; right:7px; top:50%; transform:translateY(-50%); font-size:10px; color:var(--muted); pointer-events:none; }

/* Custom rating dropdown */
.rdrop { position:relative; }
.rdrop-btn {
  width:100%; padding:7px 26px 7px 10px; min-height:32px;
  border:1.5px solid var(--border-m); border-radius:var(--r-sm);
  background:var(--bg2); cursor:pointer; transition:all .18s;
  font-family:'Nunito',sans-serif; font-size:11.5px; font-weight:700; color:var(--navy);
  display:flex; align-items:center; gap:7px; text-align:left; line-height:1.2;
}
.rdrop-btn:hover { border-color:var(--teal); }
.rdrop-btn:focus { outline:none; border-color:var(--teal); box-shadow:0 0 0 3px var(--teal-tint); }
.rdrop-btn.open { border-color:var(--teal); box-shadow:0 0 0 3px var(--teal-tint); }
.rdrop-dot { width:9px; height:9px; border-radius:50%; flex-shrink:0; background:var(--muted2); }
.rdrop-lbl { flex:1; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
.rdrop-caret { position:absolute; right:8px; top:50%; transform:translateY(-50%); font-size:10px; color:var(--muted); pointer-events:none; transition:transform .18s; }
.rdrop-btn.open + .rdrop-caret, .rdrop-btn.open .rdrop-caret { transform:translateY(-50%) rotate(180deg); }
.rdrop-menu {
  position:absolute; top:calc(100% + 4px); left:0; min-width:max(100%, 220px); z-index:90;
  background:var(--surface); border:1px solid var(--border);
  border-radius:var(--r-sm); box-shadow:0 12px 36px rgba(25,33,102,.22), 0 0 0 1px rgba(25,33,102,.04);
  overflow:hidden; padding:4px;
  animation:rdrop-pop .14s ease-out;
}
@keyframes rdrop-pop { from{opacity:0;transform:translateY(-4px)} to{opacity:1;transform:translateY(0)} }
.rdrop-opt {
  display:flex; align-items:center; gap:9px;
  width:100%; padding:8px 10px; border:none; background:transparent;
  font-family:'Nunito',sans-serif; font-size:12.5px; font-weight:700; color:var(--navy);
  cursor:pointer; text-align:left; border-radius:6px; transition:background .12s;
}
.rdrop-opt:hover { background:var(--navy-tint); }
.rdrop-opt.selected { background:var(--teal-tint); color:var(--teal-deep); }
.rdrop-opt-dot { width:10px; height:10px; border-radius:50%; flex-shrink:0; }
.rdrop-opt-lbl { flex:1; }
.rdrop-opt-check { font-size:12px; color:var(--teal-deep); opacity:0; }
.rdrop-opt.selected .rdrop-opt-check { opacity:1; }
.rdrop-divider { height:1px; background:var(--border); margin:4px 6px; }

.test-wrap { position:relative; }
.test-input {
  width:100%; padding:7px 20px 7px 9px;
  border:1.5px solid var(--border-m); border-radius:var(--r-sm);
  font-family:'Nunito',sans-serif; font-size:13px; font-weight:700; color:var(--navy);
  background:var(--bg2); transition:all .18s;
}
.test-input:focus { outline:none; border-color:var(--teal); }
.test-input::-webkit-inner-spin-button { display:none; }
.test-wrap::after { content:'%'; position:absolute; right:8px; top:50%; transform:translateY(-50%); font-size:11px; font-weight:800; color:var(--muted); pointer-events:none; }

.note-btn { background:none; border:none; cursor:pointer; font-family:'Nunito',sans-serif; font-size:11px; font-weight:700; color:var(--muted2); display:flex; align-items:center; gap:4px; transition:color .18s; white-space:nowrap; }
.note-btn:hover { color:var(--teal-deep); }
.note-wrap { display:none; margin-top:8px; padding-top:8px; border-top:1px solid var(--border); }
.note-wrap.open { display:block; }
.note-ta { width:100%; padding:8px 12px; border:1.5px solid var(--border-m); border-radius:var(--r-sm); font-family:'Nunito',sans-serif; font-size:13px; color:var(--navy); background:var(--bg2); resize:vertical; min-height:56px; transition:border-color .2s; }
.note-ta:focus { outline:none; border-color:var(--teal); }

/* ── DIVIDER ────────────────────────────────────────── */
.divider { display:flex; align-items:center; gap:14px; margin:18px 0 14px; }
.divider::before,.divider::after { content:''; flex:1; height:1px; background:var(--border); }
.divider span { font-family:'Nunito',sans-serif; font-style:normal; font-size:11px; font-weight:800; color:var(--teal-deep); text-transform:uppercase; letter-spacing:.05em; white-space:nowrap; }

/* ── COMMENT CARDS ──────────────────────────────────── */
.comm-card { background:var(--surface); border:1px solid var(--border); border-radius:var(--r); padding:16px 20px; margin-bottom:12px; box-shadow:0 2px 10px rgba(25,33,102,.05); }
.comm-card.tl-card { border-left:4px solid var(--navy); background:rgba(25,33,102,.03); }
.comm-hd { display:flex; align-items:center; gap:9px; margin-bottom:10px; }
.comm-icon { width:28px; height:28px; border-radius:8px; display:flex; align-items:center; justify-content:center; font-size:13px; flex-shrink:0; }
.ci-t { background:var(--teal-tint); } .ci-tl { background:var(--navy-tint); }
.comm-meta-lbl { font-size:10px; font-weight:800; text-transform:uppercase; letter-spacing:.1em; color:var(--muted); margin-bottom:1px; }
.comm-meta-title { font-family:'Nunito',sans-serif; font-size:14px; font-weight:800; color:var(--navy); }
.comm-ta { width:100%; padding:10px 13px; border:1.5px solid var(--border-m); border-radius:var(--r-sm); font-family:'Nunito',sans-serif; font-size:14px; color:var(--navy); background:var(--bg2); resize:vertical; min-height:72px; transition:border-color .2s; }
.comm-ta:focus { outline:none; border-color:var(--teal); }
.tl-ta { border-color:rgba(25,33,102,.18); background:rgba(255,255,255,.7); }
.tl-ta:focus { border-color:var(--navy); }

/* ── LEGEND ─────────────────────────────────────────── */
.legend { background:var(--navy-tint); border:1px solid var(--border); border-radius:var(--r-sm); padding:9px 14px; margin-bottom:16px; display:flex; gap:18px; flex-wrap:wrap; align-items:center; }
.legend-lbl { font-size:10px; font-weight:800; text-transform:uppercase; letter-spacing:.08em; color:var(--muted); }
.legend-item { display:flex; align-items:center; gap:5px; font-size:12px; font-weight:700; }
.ldot { width:9px; height:9px; border-radius:3px; }

/* ── OVERVIEW ───────────────────────────────────────── */
.ov-intro { margin-bottom:20px; }
.ov-trainee-grid { display:grid; grid-template-columns:repeat(auto-fill, minmax(240px,1fr)); gap:14px; margin-bottom:28px; }
.ov-trainee-card {
  background:var(--surface); border:1px solid var(--border); border-radius:var(--r);
  padding:16px 18px; box-shadow:0 2px 10px rgba(25,33,102,.05); cursor:pointer; transition:all .2s;
}
.ov-trainee-card:hover { box-shadow:0 4px 18px rgba(25,33,102,.12); transform:translateY(-1px); }
.ov-tc-name { font-family:'Nunito',sans-serif; font-size:17px; font-weight:800; color:var(--navy); margin-bottom:4px; }

.ov-tc-score-cell { text-align:center; }
.ov-tc-score-val { font-family:'Nunito',sans-serif; font-size:22px; font-weight:900; line-height:1; }
.ov-tc-score-lbl { font-size:9px; font-weight:800; text-transform:uppercase; letter-spacing:.07em; color:var(--muted); margin-top:3px; }

.ov-table-wrap { background:var(--surface); border:1px solid var(--border); border-radius:var(--r); overflow:hidden; box-shadow:0 2px 10px rgba(25,33,102,.05); }
.ov-table { width:100%; border-collapse:collapse; font-size:13px; }
.ov-table th { background:var(--navy-tint); padding:11px 15px; text-align:left; font-size:10px; font-weight:800; text-transform:uppercase; letter-spacing:.08em; color:var(--navy); border-bottom:1px solid var(--border); }
.ov-table td { padding:10px 15px; border-bottom:1px solid var(--border); vertical-align:middle; }

.ov-pill { display:inline-block; padding:3px 9px; border-radius:20px; font-size:11px; font-weight:800; }
.op-good  { background:var(--green-tint); color:var(--green); }
.op-ok    { background:var(--teal-tint);  color:var(--teal-deep); }
.op-watch { background:var(--amber-tint); color:var(--amber); }
.op-bad   { background:var(--red-tint);   color:var(--red); }

/* ── EMPTY STATE ────────────────────────────────────── */
.empty-state { text-align:center; padding:60px 24px; }
.empty-icon { font-size:48px; margin-bottom:16px; }
.empty-title { font-family:'Nunito',sans-serif; font-size:22px; font-weight:800; color:var(--navy); margin-bottom:8px; }
.empty-sub { color:var(--muted); font-size:14px; margin-bottom:24px; }

/* ── FOOTER ─────────────────────────────────────────── */

/* ── ARCHIVE ─────────────────────────────────────────── */
.arch-lock {
  max-width:420px; margin:60px auto; text-align:center; padding:32px;

}
.arch-lock-icon { font-size:44px; margin-bottom:16px; }
.arch-lock-title { font-size:20px; font-weight:900; color:var(--navy); margin-bottom:6px; }
.arch-lock-sub { font-size:13px; color:var(--muted); margin-bottom:22px; }
.arch-lock-row { display:flex; gap:10px; }
.arch-pwd-input {

  border:1.5px solid var(--border-m); border-radius:var(--r-sm);

.arch-hd { display:flex; align-items:flex-start; justify-content:space-between; margin-bottom:18px; padding-bottom:14px; border-bottom:1px solid var(--border); }
.arch-count { font-size:11px; font-weight:800; text-transform:uppercase; letter-spacing:.08em; color:var(--muted); margin-top:6px; }

.arch-grid { display:grid; grid-template-columns:repeat(auto-fill,minmax(220px,1fr)); gap:12px; }
.arch-card {
  background:var(--surface); border:1px solid var(--border); border-radius:var(--r-sm);
  padding:14px 16px; box-shadow:0 1px 6px rgba(25,33,102,.05);

  cursor:pointer; transition:all .18s;
  display:flex; flex-direction:column; gap:6px;
}
.arch-card:hover { box-shadow:0 4px 16px rgba(25,33,102,.12); transform:translateY(-1px); border-left-color:var(--teal-deep); }
.arch-card-top { display:flex; justify-content:space-between; align-items:flex-start; gap:8px; }
.arch-card-name { font-size:14px; font-weight:800; color:var(--navy); flex:1; line-height:1.3; }
.arch-card-score {
  font-family:'Nunito',sans-serif; font-size:18px; font-weight:900; line-height:1;

}
.arch-card-score-empty {
  font-size:14px; font-weight:700; color:var(--muted2); padding:3px 9px;

}
.arch-card-meta { font-size:11px; color:var(--muted); line-height:1.5; }
.arch-card-actions { display:flex; gap:6px; margin-top:6px; padding-top:8px; border-top:1px dashed var(--border); }
.arch-card-actions .btn { flex:1; justify-content:center; }

.arch-group { margin-bottom:24px; }
.arch-group-hd {
  display:flex; align-items:baseline; justify-content:space-between;
  margin-bottom:10px; padding:6px 12px;
  background:var(--navy-tint); border-radius:var(--r-sm);
}
.arch-group-date { font-family:'Nunito',sans-serif; font-size:13px; font-weight:800; color:var(--navy); }
.arch-group-count { font-size:10px; font-weight:800; text-transform:uppercase; letter-spacing:.08em; color:var(--muted); }

.arch-lock-btn { background:var(--navy-tint); border:none; border-radius:7px; padding:5px 10px; font-family:'Nunito',sans-serif; font-size:11px; font-weight:800; color:var(--muted); cursor:pointer; }
.arch-lock-btn:hover { background:rgba(25,33,102,.14); color:var(--navy); }

/* ── EDIT LOCK / READ-ONLY ─────────────────────────── */
.lock-pill {
  display:inline-flex; align-items:center; gap:8px;
  padding:7px 14px; border-radius:18px; cursor:pointer;
  font-family:'Nunito',sans-serif; font-size:12.5px; font-weight:800;
  border:1.5px solid rgba(255,255,255,.32); background:rgba(255,255,255,.12);

}
.lock-pill:hover { background:rgba(255,255,255,.22); border-color:rgba(255,255,255,.5); }
.lock-pill.unlocked { background:rgba(0,196,208,.28); border-color:rgba(0,196,208,.65); color:#fff; }
.lock-pill.unlocked:hover { background:rgba(0,196,208,.4); }
.lock-pill .lock-icon { font-size:13px; line-height:1; }
.lock-pill .lock-status-dot { width:7px; height:7px; border-radius:50%; background:#ff8a8a; box-shadow:0 0 6px rgba(255,138,138,.6); }
.lock-pill.unlocked .lock-status-dot { background:#5fffd5; box-shadow:0 0 6px rgba(95,255,213,.7); }

/* Read-only mode visual + behavior */
body.readonly .setup-input,
body.readonly .test-input,
body.readonly .note-ta,
body.readonly .week-ta { background:var(--bg2); color:var(--muted); cursor:not-allowed; }
body.readonly .rdrop-btn { opacity:.7; cursor:not-allowed; background:var(--bg2); }
body.readonly .add-pill,
body.readonly .pill-remove,
body.readonly .btn-archive,
body.readonly .btn-restore,
body.readonly .note-btn { opacity:.45; cursor:not-allowed; }

/* Toast */
.toast-host {
  position:fixed; bottom:24px; left:50%; transform:translateX(-50%);
  z-index:10000; display:flex; flex-direction:column; gap:8px; align-items:center;
  pointer-events:none;
}
.toast {
  background:var(--navy); color:#fff;
  padding:11px 18px; border-radius:10px;
  font-family:'Nunito',sans-serif; font-size:13px; font-weight:700;
  box-shadow:0 10px 30px rgba(25,33,102,.4);
  display:flex; align-items:center; gap:9px;
  animation:toast-in .22s ease-out, toast-out .22s ease-in 2.6s forwards;
  pointer-events:auto;
}
.toast.toast-info { background:var(--navy); }
.toast.toast-warn { background:var(--amber); }
.toast.toast-ok { background:var(--green); }
@keyframes toast-in { from{opacity:0;transform:translateY(8px)} to{opacity:1;transform:translateY(0)} }
@keyframes toast-out { to{opacity:0;transform:translateY(-8px)} }

/* Password input inside modal */
.mdl-pwd-input {
  width:100%; padding:11px 14px;
  border:1.5px solid var(--border-m); border-radius:var(--r-sm);
  font-family:'Nunito',sans-serif; font-size:14px; font-weight:600; color:var(--navy);
  background:var(--bg2); transition:all .15s;
}
.mdl-pwd-input:focus { outline:none; border-color:var(--teal); box-shadow:0 0 0 3px var(--teal-tint); background:var(--surface); }
.mdl-pwd-err { font-size:12px; font-weight:700; color:var(--red); margin-top:8px; min-height:16px; }

/* Password row with eye toggle */
.pwd-row { position:relative; display:flex; align-items:stretch; gap:0; }
.pwd-row .mdl-pwd-input { padding-right:46px; }
.pwd-row .arch-pwd-input { padding-right:46px; }
.pwd-eye {
  position:absolute; right:6px; top:50%; transform:translateY(-50%);
  width:34px; height:34px; padding:0;
  background:transparent; border:none; cursor:pointer; border-radius:7px;
  display:flex; align-items:center; justify-content:center;
  font-size:16px; color:var(--muted); transition:all .15s;
}
.pwd-eye:hover { background:var(--navy-tint); color:var(--navy); }
.pwd-eye:focus { outline:none; background:var(--teal-tint); }

/* Shake animation for incorrect password */
@keyframes pwd-shake {
  0%, 100% { transform:translateX(0); }
  20% { transform:translateX(-6px); }
  40% { transform:translateX(6px); }
  60% { transform:translateX(-4px); }
  80% { transform:translateX(4px); }
}
.shake { animation:pwd-shake .35s ease-in-out; border-color:var(--red) !important; }

@media(max-width:600px) { .setup-grid { grid-template-columns:1fr; } .main { padding:14px; } .hdr { padding:12px 16px; } .btn-ghost { display:none; } }

/* ── MODAL ─────────────────────────────────────────── */
.mdl-back {
  position:fixed; inset:0; z-index:9999;
  background:rgba(25,33,102,.55); backdrop-filter:blur(4px);
  display:flex; align-items:center; justify-content:center;
  padding:20px; animation:mdl-fade .18s ease-out;
}
@keyframes mdl-fade { from{opacity:0} to{opacity:1} }
@keyframes mdl-pop  { from{opacity:0;transform:scale(.96) translateY(8px)} to{opacity:1;transform:scale(1) translateY(0)} }
.mdl-card {
  background:var(--surface); border-radius:var(--r);
  box-shadow:0 24px 70px rgba(25,33,102,.4), 0 0 0 1px rgba(25,33,102,.06);
  display:flex; flex-direction:column;
  max-height:calc(100vh - 40px); width:100%;
  animation:mdl-pop .22s ease-out;
}
.mdl-small { max-width:440px; }
.mdl-large { max-width:1000px; }
.mdl-hd {
  display:flex; align-items:flex-start; justify-content:space-between; gap:14px;
  padding:18px 22px 14px; border-bottom:1px solid var(--border);
}
.mdl-title { font-family:'Nunito',sans-serif; font-size:18px; font-weight:900; color:var(--navy); letter-spacing:-.01em; line-height:1.3; }
.mdl-title em { font-style:normal; font-weight:400; color:var(--teal-deep); }
.mdl-sub { font-size:11px; font-weight:700; color:var(--muted); margin-top:3px; text-transform:uppercase; letter-spacing:.06em; }
.mdl-x {
  width:30px; height:30px; border-radius:8px; border:none; cursor:pointer; flex-shrink:0;
  background:var(--navy-tint); color:var(--navy); font-size:16px; font-weight:700;
  display:flex; align-items:center; justify-content:center; transition:all .15s;
}
.mdl-x:hover { background:rgba(228,0,58,.15); color:var(--red); }
.mdl-bd { padding:18px 22px; overflow-y:auto; flex:1; }
.mdl-bd p { font-size:14px; line-height:1.6; color:var(--navy); margin-bottom:10px; }
.mdl-bd p:last-child { margin-bottom:0; }
.mdl-bd strong { color:var(--navy); font-weight:800; }
.mdl-ft {
  display:flex; justify-content:flex-end; gap:9px;
  padding:14px 22px 18px; border-top:1px solid var(--border);
  background:var(--bg2); border-radius:0 0 var(--r) var(--r);
}

/* Read-only archive viewer */
.rw-week {
  background:var(--bg2); border:1px solid var(--border); border-radius:var(--r-sm);
  padding:14px 16px; margin-bottom:14px;
}
.rw-hd { display:flex; justify-content:space-between; align-items:flex-start; margin-bottom:10px; padding-bottom:8px; border-bottom:1px dashed var(--border); }
.rw-w-title { font-family:'Nunito',sans-serif; font-size:15px; font-weight:800; color:var(--navy); }
.rw-w-phase { font-size:10px; font-weight:700; text-transform:uppercase; letter-spacing:.08em; color:var(--teal-deep); margin-bottom:2px; }
.rw-score { font-family:'Nunito',sans-serif; font-size:24px; font-weight:900; line-height:1; }
.rw-table { width:100%; border-collapse:collapse; font-size:12px; }
.rw-table th { background:transparent; padding:6px 8px; text-align:center; font-size:10px; font-weight:800; text-transform:uppercase; letter-spacing:.05em; color:var(--muted); }
.rw-table th.left { text-align:left; }
.rw-table td { padding:6px 8px; text-align:center; border-top:1px solid var(--border); vertical-align:middle; }
.rw-table td.left { text-align:left; font-weight:700; color:var(--navy); }
.rw-pill { display:inline-block; padding:3px 8px; border-radius:14px; font-size:11px; font-weight:700; }

.rw-note-bd {

  color:var(--muted); font-size:14px; font-style:italic;
  background:var(--bg2); border:1px dashed var(--border-m); border-radius:var(--r-sm);
}
</style>

<!-- HEADER -->
<header class="hdr">
  <div class="hdr-left">
    <div class="hdr-logo">🎓</div>
    <div>
      <div class="hdr-title">Training <em>Tracker</em></div>
      <div class="hdr-sub">Ipsos Bulgaria SD/QA</div>

<!-- TRAINEE SWITCHER -->
<div class="trainee-bar-outer">

  </div>
</div>

<div class="setup-outer" id="setup-outer">
  <div class="setup-card">
    <div class="setup-grid">
      <div>
        <label class="field-lbl">Trainee Name</label>
        <input class="setup-input" id="f-name" type="text" placeholder="Enter full name…" oninput="syncSetup('name',this.value)">
      </div>
      <div>
        <label class="field-lbl">Start Date</label>
        <input class="setup-input" id="f-date" type="date" oninput="syncSetup('date',this.value)">

        <label class="field-lbl">Trainer (Weeks 1–4)</label>
        <input class="setup-input" id="f-trainer" type="text" placeholder="Trainer name…" oninput="syncSetup('trainer',this.value)">
      </div>
      <div>
        <label class="field-lbl">Mentor (Weeks 5–8)</label>
        <input class="setup-input" id="f-mentor" type="text" placeholder="Mentor name…" oninput="syncSetup('mentor',this.value)">

    <div class="setup-actions" id="setup-actions">

    <button class="week-btn"        data-tab="w3"  onclick="goWeek('w3')"><div class="w-dot" id="wd-w3"></div>Week 3</button>
    <button class="week-btn"        data-tab="w4"  onclick="goWeek('w4')"><div class="w-dot" id="wd-w4"></div>Week 4</button>
    <button class="week-btn"        data-tab="w5"  onclick="goWeek('w5')"><div class="w-dot" id="wd-w5"></div>Week 5</button>
    <button class="week-btn"        data-tab="w6"  onclick="goWeek('w6')"><div class="w-dot" id="wd-w6"></div>Week 6</button>
    <button class="week-btn"        data-tab="w7"  onclick="goWeek('w7')"><div class="w-dot" id="wd-w7"></div>Week 7</button>
    <button class="week-btn"        data-tab="w8"  onclick="goWeek('w8')"><div class="w-dot" id="wd-w8"></div>Week 8</button>
    <button class="week-btn"        data-tab="ov"  onclick="goWeek('ov')">📊 Overview</button>
    <button class="week-btn"        data-tab="arch" onclick="goWeek('arch')">📦 Archive</button>
  </div>
</div>

<!-- MAIN -->
<div class="main" id="main"></div>

<footer class="footer">
  <div class="footer-name">Training Tracker</div>
  <div>Built for Ipsos Bulgaria SD/QA · Internal use only</div>
</footer>

<!-- MODAL HOST -->
<div id="modal-host"></div>

<!-- TOAST HOST -->
<div id="toast-host" class="toast-host"></div>

 докъто ги изчистим. Има някаква несигурност при него, не мога да разбера от къде идва това.", "tlComment": ""}, "w3": {"days": [{"note": "", "punctuality": "no_concern", "technical_knowledge": "attention", "behavior": "no_concern", "participation": "no_concern", "test": ""}, {"note": "", "punctuality": "no_concern", "technical_knowledge": "no_concern", "behavior": "no_concern", "participation": "no_concern", "test": ""}, {"note": "", "punctuality": "no_concern", "technical_knowledge": "attention", "behavior": "no_concern", "participation": "no_concern", "test": ""}, {"note": "", "punctuality": "no_concern", "technical_knowledge": "attention", "behavior": "no_concern", "participation": "no_concern", "test": ""}, {"note": "", "punctuality": "no_concern", "technical_knowledge": "attention", "behavior": "no_concern", "participation": "no_concern", "test": ""}], "weeklyComment": "като става много и по сложен материала се затруднява, мисля че много от нещата ще трябва да се повторят по няколко пъти с него. Иначе има разбиране за нещата , просто обема му идва много вече. ПОвторете нещата ако трябва и наблягайте на тестването повечеко.", "tlComment": ""}, "w4": {"days": [{"note": "", "punctuality": "", "technical_knowledge": "", "behavior": "", "participation": "", "test": ""}, {"note": "", "punctuality": "", "technical_knowledge": "", "behavior": "", "participation": "", "test": ""}, {"note": "", "punctuality": "", "technical_knowledge": "", "behavior": "", "participation": "", "test": ""}, {"note": "", "punctuality": "", "technical_knowledge": "", "behavior": "", "participation": "", "test": ""}, {"note": "", "punctuality": "", "technical_knowledge": "", "behavior": "", "participation": "", "test": ""}], "weeklyComment": "", "tlComment": ""}, "w5": {"days": [{"note": "", "language_proficiency": "no_concern", "engagement": "exceptional", "technical_knowledge": "attention", "productivity": "exceptional", "behavior": "no_concern"}, {"note": "", "language_proficiency": "no_c   {id:'arc012',name:'Simeon Velinov',date:'2024-09-24',trainer:'Miroslav Monev',mentor:'Vesela Kambitova',archived:true,archivedAt:'2024-09-24',weeks:{"w1": {"days": [{"note": "", "punctuality": "not_applicable", "technical_knowledge": "not_applicable", "behavior": "not_applicable", "participation": "not_applicable", "test": "83"}, {"note": "", "punctuality": "no_concern", "technical_knowledge": "no_concern", "behavior": "no_concern", "participation": "no_concern", "test": ""}, {"note": "", "punctuality": "no_concern", "technical_knowledge": "no_concern", "behavior": "no_concern", "participation": "no_concern", "test": ""}, {"note": "", "punctuality": "no_concern", "technical_knowledge": "no_concern", "behavior": "no_concern", "participation": "no_concern", "test": ""}, {"note": "", "punctuality": "no_concern", "technical_knowledge": "no_concern", "behavior": "no_concern", "participation": "no_concern", "test": ""}], "weeklyComment": "За сега нямам много наблюдения върху Симеон, изглежда да разбира какво се иска и как трябва да стане и следи логически нещата, което е добре. Внимава но мисля че повечко следене на документацията няма да му дойде зле, особено когато стане много информацията.", "tlComment": ""}, "w2": {"days": [{"note": "", "punctuality": "no_concern", "technical_knowledge": "no_concern", "behavior": "no_concern", "participation": "no_concern", "test": ""}, {"note": "", "punctuality": "no_concern", "technical_knowledge": "no_concern", "behavior": "no_concern", "participation": "no_concern", "test": ""}, {"note": "", "punctuality": "no_concern", "technical_knowledge": "no_concern", "behavior": "no_concern", "participation": "no_concern", "test": ""}, {"note": "", "punctuality": "no_concern", "technical_knowledge": "no_concern", "behavior": "no_concern", "participation": "no_concern", "test": ""}, {"note": "", "punctuality": "no_concern", "technical_knowledge": "no_concern", "behavior": "no_concern", "participation": "no_concern", "test": ""}], "weeklyComment": "Наблюденията ми от първата седмица със Симо са, че се справя с материала без проблеми. От двамата, за момента, той се справя една идея по-добре и по-бързо.\nНе се срамува да предлага решения на задачите, да споделя мнението си. Винаги се опитва да намери отговор на нещата, вместо да каже не знам или не мога.\nЕдинственото нещо, което мога да изтъкна като проблем е, че в някои моменти избързва. Вместо да провери нещата си на спокойствие, предпочита да прати задачите по-бързо. Това е причината понякога да допуска малки грешки.", "tlComment": ""}, "w3": {"days": [{"note": "", "punctuality": "no_concern", "technical_knowledge": "no_concern", "behavior": "no_concern", "participation": "no_concern", "test": ""}, {"note": "", "punctuality": "no_concern", "technical_knowledge": "no_concern", "behavior": "no_concern", "participation": "no_concern", "test": ""}, {"note": "", "punctuality": "no_concern", "technical_knowledge": "no_concern", "behavior": "no_concern", "participation": "no_concern", "test": ""}, {"note": "", "punctuality": "no_concern", "technical_knowledge": "no_concern", "behavior": "no_concern", "participation": "no_concern", "test": ""}, {"note": "", "punctuality": "no_concern", "technical_knowledge": "no_concern", "behavior": "no_concern", "participation": "no_concern", "test": ""}], "weeklyComment": "Затвърждава мнението от миналата седмица. Няма проблеми със задачите, справя се с всичко без проблем.\nТрябва да го похваля, защото винаги се опитва да се справи със задачите сам, дори и да става въпрос за нещо, с което не се е сблъсквал до момента, вместо веднага да ме пита за решение.\nРаботи доста бързо, но продължава в някои моменти да избързва, което и самият той го отчита като проблем.", "tlComment": ""}, "w4": {"days": [{"note": "", "punctuality": "no_concern", "technical_knowledge": "no_concern", "behavior": "no_concern", "participation": "no_concern", "test": ""}, {"note": "", "punctuality": "no_concern", "technical_knowledge": "no_concern", "behavior": "no_concern", "participation": "no_concern", "test": ""}, {"note": "", "punctuality": "no_concern", "technical_knowledge": "attention", "behavior": "no_concern", "participation": "no_concern", "test": ""}, {"note": "", "punctuality": "no_concern", "technical_knowledge": "no_concern", "behavior": "no_concern", "participation": "no_concern", "test": ""}, {"note": "", "punctuality": "not_applicable", "technical_knowledge": "not_applicable", "behavior": "not_applicable", "participation": "not_applicable", "test": ""}], "weeklyComment": "Тази седмица главно работихме по реални проекти, където Симо срещна проблеми с разбирането на отделни инструкции по въпросниците (което е нормално имайки предвид, че някои неща виждаме за първи път).\nИзвън това той продължава да се справя отлично - задава адекватни въпроси и вкарва мисъл за проверките, които пише. Взима предвид нещата, на които обръщаме внимание.\nНямам съмнения, че с още практика ще стане много добър QA.", "tlComment": ""}, "w5": {"days": [{"note": "", "language_proficiency": "not_applicable", "engagement": "not_applicable", "technical_knowledge": "not_applicable", "productivity": "not_applicable", "behavior": "not_applicable"}, {"note": "", "language_proficiency": "no_concern", "engagement": "no_concern", "technical_knowledge": "no_concern", "productivity": "no_concern", "behavior": "no_concern"}, {"note": "", "language_proficiency": "no_concern", "engagement": "no_concern", "technical_knowledge": "no_concern", "productivity": "no_concern", "behavior": "no_concern"}, {"note": "", "language_proficiency": "no_concern", "engagement": "no_concern", "technical_knowledge": "no_concern", "productivity": "no_concern", "behavior": "no_concern"}, {"note": "", "language_proficiency": "no_concern", "engagement": "no_concern", "technical_knowledge": "no_concern", "productivity": "no_concern", "behavior": "no_concern"}], "weeklyComment": "Първите ми впечатления от Симеон са, че той е мотивиран, работата му харесва и прави зададените тестови проекти с интерес. Има добър поглед върху логическата част, следи материалите внимателно и се опитва да разпише валидацията по възможно най-добрия начин, като си помага с документацията и доста въпроси към мен.", "tlComment": ""}, "w6": {"days": [{"note": "", "language_proficiency": "no_concern", "engagement": "no_concern", "technical_knowledge": "no_concern", "productivity": "no_concern", "behavior": "no_concern"}, {"note": "", "language_proficiency": "no_concern", "engagement": "no_concern", "technical_knowledge": "no_concern", "productivity": "no_concern", "behavior": "no_concern"}, {"note": "", "language_proficiency": "no_concern", "engagement": "no_concern", "technical_knowledge": "no_concern", "productivity": "no_concern", "behavior": "no_concern"}, {"note": "", "language_proficiency": "no_concern", "engagement": "no_concern", "technical_knowledge": "no_concern", "productivity": "no_concern", "behavior": "no_concern"}, {"note": "", "language_proficiency": "no_concern", "engagement": "no_concern", "technical_knowledge": "no_concern", "productivity": "no_concern", "behavior": "no_concern"}], "weeklyComment": "Симеон се справя добре. Задава въпроси винаги когато има нужда, любопитен е и сам търси решения за казусите си. Има добър подход към логичекста част на валидациите и добре се ориентира в работата си.", "tlComment": ""}, "w7": {"days": [{"note": "", "language_proficiency": "", "engagement": "", "technical_knowledge": "", "productivity": "", "behavior": ""}, {"note": "", "language_proficiency": "", "engagement": "", "technical_knowledge": "", "productivity": "", "behavior": ""}, {"note": "", "language_proficiency": "", "engagement": "", "technical_knowledge": "", "productivity": "", "behavior": ""}, {"note": "", "language_proficiency": "", "engagement": "", "technical_knowledge": "", "productivity": "", "behavior": ""}, {"note": "", "language_proficiency": "", "engagement": "", "technical_knowledge": "", "productivity": "", "behavior": ""}], "weeklyComment": "", "tlComment": ""}, "w8": {"days": [{"note": "", "language_proficiency": "", "engagement": "", "technical_knowledge": "", "productivity": "", "behavior": ""}, {"note": "", "language_proficiency": "", "engagement": "", "technical_knowledge": "", "productivity": "", "behavior": ""}, {"note": "", "language_proficiency": "", "engagement": "", "technical_knowledge": "", "productivity": "", "behavior": ""}, {"note": "", "language_proficiency": "", "engagement": "", "technical_knowledge": "", "productivity": "", "behavior": ""}, {"note": "", "language_proficiency": "", "engagement": "", "technical_knowledge": "", "productivity": "", "behavior": ""}], "weeklyComment": "", "tlComment": ""}}},
  {id:'arc013',name:'Silviya Gelusheva',date:'2024-09-24',trainer:'Miroslav Monev',mentor:'Angel Pankovski',archived:true,archivedAt:'2024-09-24',weeks:{"w1": {"days": [{"note": "", "punctuality": "not_applicable", "technical_knowledge": "not_applicable", "behavior": "not_applicable", "participation": "not_applicable", "test": "45"}, {"note": "", "punctuality": "no_concern", "technical_knowledge": "no_concern", "behavior": "no_concern", "participation": "no_concern", "test": ""}, {"note": "", "punctuality": "no_concern", "technical_knowledge": "attention", "behavior": "attention", "participation": "no_concern", "test": ""}, {"note": "", "punctuality": "no_concern", "technical_knowledge": "attention", "behavior": "attention", "participation": "no_concern", "test": ""}, {"note": "", "punctuality": "no_concern", "technical_knowledge": "attention", "behavior": "cause_concern", "participation": "no_concern", "test": ""}], "weeklyComment": "Имаме затруднения с нея, доста е притеснена и понякога разсеяна тея дни, има нещо което я товари може би в личен план и това се отразява на цялостния тренинг. Казва че спи по малко и се опитва да навакса нещата ама това по скоро прече. Помолих я, когато си почине и поуспокои, да прегледа материала и да ми кажев поненелник какво не е достатъчно ясно и да го повторим, Опитах се да я успокоя че имаме достатъчно време и никой не я гони за резултати, да видим дали това ще помогне.", "tlComment": ""}, "w2": {"days": [{"note": "", "punctuality": "no_concern", "technical_knowledge": "no_concern", "behavior": "no_concern", "participation": "no_concern", "test": ""}, {"note": "", "punctuality": "no_concern", "technical_knowledge": "no_concern", "behavior": "no_concern", "participation": "no_concern", "test": ""}, {"note": "", "punctuality": "no_concern", "technical_knowledge": "no_concern", "behavior": "no_concern", "participation": "no_concern", "test": ""}, {"note": "", "punctuality": "no_concern", "technical_knowledge": "no_concern", "behavior": "no_concern", "participation": "no_concern", "test": ""}, {"note": "", "punctuality": "no_concern", "technical_knowledge": "no_concern", "behavior": "no_concern", "participation": "no_concern", "test": ""}], "weeklyComment": "Силвето започна по-плахо/притеснително, но с течение на трейнинга се отпусна. За момента не виждам сериозни проблеми със задачите, които им давам - ако има въпроси не се страхува да пита.\nВъпреки че се справя една идея не толкова добре колкото Симо, в някои случаи дава решения на задачите, които са по-добри от неговите.\nВсе още не се е отпуснала напълно (когато прави грешки се извинява по няколко пъти, което не мисля че нужно, понеже е нормално да допускат грешки на този етап), но надявам се до края на трейнинга нещата да са много по-добре.", "tlComment": ""}, "w3": {"days": [{"note": "", "punctuality": "no_concern", "technical_knowledge": "no_concern", "behavior": "no_concern", "participation": "no_concern", "test": ""}, {"note": "", "punctuality": "no_concern", "technical_knowledge": "no_concern", "behavior": "no_concern", "participation": "no_concern", "test": ""}, {"note": "", "punctuality": "no_concern", "technical_knowledge": "no_concern", "behavior": "no_concern", "participation": "no_concern", "test": ""}, {"note": "", "punctuality": "no_concern", "technical_knowledge": "no_concern", "behavior": "no_concern", "participation": "no_concern", "test": ""}, {"note": "", "punctuality": "no_concern", "technical_knowledge": "no_concern", "behavior": "no_concern", "participation": "no_concern", "test": ""}], "weeklyComment": "Вижда се подобрение спрямо миналата седмица. Личи си, че се справя с материала по-лесно.\nВъпреки че остава една идея по-бавна от Симо, трябва да я поздравя, за това че страшно много се старае. Дава по няколко решения на задачите и търси мнение кое е най-доброто. Понякога остава след работа да навакса. Винаги всичко при нея е много добре и прилежно структурирано/написано.\nПродължава в същия дух от миналата седмица, но и надгради добрите впечатления.", "tlComment": ""}, "w4": {"days": [{"note": "", "punctuality": "no_concern", "technical_knowledge": "no_concern", "behavior": "no_concern", "participation": "no_concern", "test": ""}, {"note": "", "punctuality": "no_concern", "technical_knowledge": "no_concern", "behavior": "no_concern", "participation": "no_concern", "test": ""}, {"note": "", "punctuality": "no_concern", "technical_knowledge": "attention", "behavior": "exceptional", "participation": "no_concern", "test": ""}, {"note": "", "punctuality": "no_concern", "technical_knowledge": "attention", "behavior": "no_concern", "participation": "no_concern", "test": ""}, {"note": "", "punctuality": "not_applicable", "technical_knowledge": "not_applicable", "behavior": "not_applicable", "participation": "not_applicable", "test": ""}], "weeklyComment": "При Силвето нещата стоят по подобен начин както при Симо, но тя среща повече затруднения с разбирането на инструкции по въпросниците. Основните неща разписва лесно, но има проблеми при използването на по-сложни филтри и проверката на маркери.\nВъпреки трудностите, тя продължава много да се старае - задава въпроси, интересува се как трябва да се пишат проверките, остава допълнително за да настигне Симо.\nС още практика съм сигурен, че нещата ще станат много по-добре.", "tlComment": ""}, "w5": {"days": [{"note": "", "language_proficiency": "not_applicable", "engagement": "not_applicable", "technical_knowledge": "not_applicable", "productivity": "not_applicable", "behavior": "not_applicable"}, {"note": "", "language_proficiency": "not_applicable", "engagement": "not_applicable", "technical_knowledge": "not_applicable", "productivity": "not_applicable", "behavior": "not_applicable"}, {"note": "", "language_proficiency": "no_concern", "engagement": "no_concern", "technical_knowledge": "no_concern", "productivity": "no_concern", "behavior": "no_concern"}, {"note": "", "language_proficiency": "no_concern", "engagement": "no_concern", "technical_knowledge": "no_concern", "productivity": "no_concern", "behavior": "no_concern"}, {"note": "", "language_proficiency": "no_concern", "engagement": "no_concern", "technical_knowledge": "no_concern", "productivity": "no_concern", "behavior": "no_concern"}], "weeklyComment": "Силвето е усвоила всичко основно от гледна точка на Dimensions синтаксиса. Справя се сравнително бързо при проекти с complexity от 1 до 3. Прави всички нужни проверки, рядко се случва да е пропуснала да провери нещо и мисля, че с практиката ще минимизира максимално пропуските. Изпитва затруднение при проверка на променливи, които се използват за лийст фул алокация. Мисля, че ще изчисти този проблем след като през ръцете и преминат повечко проекти.", "tlComment": ""}, "w6": {"days": [{"note": "", "language_proficiency": "no_concern", "engagement": "no_concern", "technical_knowledge": "no_concern", "productivity": "no_concern", "behavior": "no_concern"}, {"note": "", "language_proficiency": "no_concern", "engagement": "no_concern", "technical_knowledge": "no_concern", "productivity": "no_concern", "behavior": "no_concern"}, {"note": "", "language_proficiency": "no_concern", "engagement": "no_concern", "technical_knowledge": "attention", "productivity": "no_concern", "behavior": "no_concern"}, {"note": "", "language_proficiency": "not_applicable", "engagement": "not_applicable", "technical_knowledge": "not_applicable", "productivity": "not_applicable", "behavior": "not_applicable"}, {"note": "", "language_proficiency": "not_applicable", "engagement": "not_applicable", "technical_knowledge": "not_applicable", "productivity": "not_applicable", "behavior": "not_applicable"}], "weeklyComment": "Хвана инерцията на проектите и започна да ги завършва по-бързо. Също така има и по-малко въпроси свързани с интрукциите във въпросника. Запознах я с идеята на тракерите. Прегледала е файла, който Вал е направила за етапите, развититето и стъпките, които се изискват от QA в един проект, но не задълбочено.", "tlComment": ""}, "w7": {"days": [{"note": "", "language_proficiency": "no_concern", "engagement": "no_concern", "technical_knowledge": "attention", "productivity": "no_concern", "behavior": "no_concern"}, {"note": "", "language_proficiency": "no_concern", "engagement": "no_concern", "technical_knowledge": "attention", "productivity": "no_concern", "behavior": "no_concern"}, {"note": "", "language_proficiency": "no_concern", "engagement": "no_concern", "technical_knowledge": "attention", "productivity": "no_concern", "behavior": "no_concern"}, {"note": "", "language_proficiency": "", "engagement": "", "technical_knowledge": "", "productivity": "", "behavior": ""}, {"note": "", "language_proficiency": "", "engagement": "", "technical_knowledge": "", "productivity": "", "behavior": ""}], "weeklyComment": "Започнахме работа по реални проекти и запознаване със стъпките на NWB. За начало хванахме по-лесни тракери с никакви или минимални промени по тях. Направихме фърст чек и експортнахме данни. Виждам, че си записва стъпките и след като приключим със работата по проект, иска да обобщим нещата, които сме правили - тя описва стъпките и действията, аз и потвърждавам дали правилно е запомнила и разбрала. Все още действа наизуст, но в един момент ще започне да прави нещата с разбиране. Отнема и малко повече време да разбере идеята на всяка стъпка на NWB, което забавя с една идея процеса на работа, но не мисля, че това е фатално. Разсейва се, когато и се натрупат няколко нови неща", "tlComment": ""}, "w8": {"days": [{"note": "", "language_proficiency": "", "engagement": "", "technical_knowledge": "", "productivity": "", "behavior": ""}, {"note": "", "language_proficiency": "", "engagement": "", "technical_knowledge": "", "productivity": "", "behavior": ""}, {"note": "", "language_proficiency": "", "engagement": "", "technical_knowledge": "", "productivity": "", "behavior": ""}, {"note": "", "language_proficiency": "", "engagement": "", "technical_knowledge": "", "productivity": "", "behavior": ""}, {"note": "", "language_proficiency": "", "engagement": "", "technical_knowledge": "", "productivity": "", "behavior": ""}], "weeklyComment": "", "tlComment": ""}}},

, "technical_knowledge": "no_concern", "productivity": "no_concern", "behavior": "no_concern"}], "weeklyComment": "Първия ден получи нов проект - продуктов тест с ротационен план. Говорихме си за ротирани и деротирани данни. Забелязах, че е малко объркана, според мен, разбира нещата, които и обяснявам, но се притеснява. Трудно и е да естимира дати за дъми данни, тест линк. Трябва да се проведе среща с нея за писане на мейли. Третия ден и показах как се сетват BCs, Audio recordings и iScreenOut, обясних и за какво и как се използват. Изпрати тест линк на време - цялоатно се справя добе, има няколко малки технически пропуска, които и показах и след върат фийдбек си оправи всички грешки. След предаден тестови проект сама попита какво да прави - търси си задачи. Четвърдия ден минахме през DummyData, DMQuery, NWB и Multicountry проекти. Забелязва пропуски във въпросниците и връща адекватни коментари. В четвъртък получи и нов тестови проект (multicountry с 2 държави + sec module). Последния ден от тази седмица говорихме за тракери и пазене на дейта лейаут (получи лайв проект).", "tlComment": ""}, "w6": {"days": [{"note": "", "language_proficiency": "no_concern", "engagement": "no_concern", "technical_knowledge": "no_concern", "productivity": "no_concern", "behavior": "no_concern"}, {"note": "", "language_proficiency": "no_concern", "engagement": "no_concern", "technical_knowledge": "no_concern", "productivity": "no_concern", "behavior": "no_concern"}, {"note": "", "language_proficiency": "no_concern", "engagement": "no_concern", "technical_knowledge": "no_concern", "productivity": "no_concern", "behavior": "no_concern"}, {"note": "", "language_proficiency": "no_concern", "engagement": "no_concern", "technical_knowledge": "no_concern", "productivity": "no_concern", "behavior": "no_concern"}, {"note": "", "language_proficiency": "no_concern", "engagement": "no_concern", "technical_knowledge": "no_concern", "productivity": "no_concern", "behavior": "no_concern"}], "weeklyComment": "Забелязвам, че и е трудно да прецени колко време ще и е нужно, за да свърши дадена работа. Забелязва нередности във въпросника и праща адекватни коментари на РЕ, флагва всичко, което не е окей по материалите. Спазва си таймингите за дъми данни и тест линк. Показах и как да дебъгва, когато пуска дъми данни, но със сигурност ще трябва да се поработи над това. Проактивна е, когато остане без задачи, си търси занимание свързано с работата. Справила се е добре с работата по тракер проекта, запазила е лейаута. Повечето мейли си ги пише сама и се налага да преправям много малко. Това, което ме притеснява е, че въпреки записите, задава въпроси, без да се сети да ги погледне, но ще го изговоря с нея. Ще изговоря и да опитва първо да помисли за решение сама и след това да търси отговор от мен.", "tlComment": ""}, "w7": {"days": [{"note": "", "language_proficiency": "no_concern", "engagement": "no_concern", "technical_knowledge": "no_concern", "productivity": "no_concern", "behavior": "no_concern"}, {"note": "", "language_proficiency": "no_concern", "engagement": "no_concern", "technical_knowledge": "no_concern", "productivity": "no_concern", "behavior": "no_concern"}, {"note": "", "language_proficiency": "no_concern", "engagement": "no_concern", "technical_knowledge": "no_concern", "productivity": "no_concern", "behavior": "no_concern"}, {"note": "", "language_proficiency": "not_applicable", "engagement": "not_applicable", "technical_knowledge": "not_applicable", "productivity": "not_applicable", "behavior": "not_applicable"}, {"note": "", "language_proficiency": "not_applicable", "engagement": "not_applicable", "technical_knowledge": "not_applicable", "productivity": "not_applicable", "behavior": "not_applicable"}], "weeklyComment": "Вече работи активно по проекти. Минахме през експортване и импортване на преводи. Споменах и какви казуси могат да излязат с MRT-тата. Успява да се справя и без моя помощ.", "tlComment": ""}, "w8": {"days": [{"note": "", "language_profic function emptyState() {
  const t = newTrainee();
  return { trainees:[t], activeId:t.id, activeWeek:'w1', archived: DEFAULT_ARCHIVED };
}

let S = window.FORM_DATA
  || (() => { try { return JSON.parse(localStorage.getItem('tt3_state')||'null'); } catch(e){ return null; } })()
  || emptyState();

// Migrations
if (!S.trainees) { S = emptyState(); }
if (!S.activeId && S.trainees.length) S.activeId = S.trainees[0].id;
if (!S.activeWeek || S.activeWeek === 'w0') S.activeWeek = 'w1';
if (!S.archived) S.archived = DEFAULT_ARCHIVED;
// Drop legacy onboarding (w0) data — it's no longer part of the tool
S.trainees.forEach(t => { if (t.weeks && t.weeks.w0) delete t.weeks.w0; });
S.archived.forEach(t => { if (t.weeks && t.weeks.w0) delete t.weeks.w0; });
S.trainees.forEach(t => { WD.forEach(def => { if (!t.weeks[def.id]) t.weeks[def.id] = emptyWeeks()[def.id]; }); });

function active() { return S.trainees.find(t => t.id === S.activeId) || S.trainees[0]; }

/* ══════════════════════════════════════════════════════
   SCORE HELPERS
══════════════════════════════════════════════════════ */
function weekAvg(t, wid) {
  const def = WD.find(d=>d.id===wid);
  const wd  = t.weeks[wid];
  let sum=0, n=0;
  wd.days.forEach(d => {
    def.crit.forEach(c => { if (d[c] && SCORE[d[c]]!==undefined) { sum+=SCORE[d[c]]; n++; } });
    if (def.test && d.test!==''&&d.test!=null) {
      const v = parseFloat(d.test);
      if (!isNaN(v)) { sum+=v; n++; }
    }
  });
  return n>0 ? sum/n : null;
}
function phaseAvg(t, phase) {
  const avgs = WD.filter(d=>d.phase===phase).map(d=>weekAvg(t,d.id)).filter(v=>v!==null);
  return avgs.length ? avgs.reduce((a,b)=>a+b,0)/avgs.length : null;
}
function overallAvg(t) {
  const avgs = WD.map(d=>weekAvg(t,d.id)).filter(v=>v!==null);
  return avgs.length ? avgs.reduce((a,b)=>a+b,0)/avgs.length : null;
}
function sc(v)  { if(v===null)return'none'; const r=Math.round(v); if(r>=95)return'good'; if(r>=75)return'ok'; if(r>=55)return'watch'; return'bad'; }
function slbl(v){ if(v===null)return'—'; if(v>=95)return'Exceptional'; if(v>=75)return'No Concern'; if(v>=55)return'Attention'; return'Cause for Concern'; }
function testCls(v) { const p=parseFloat(v); if(isNaN(p))return''; if(p>=95)return'rc-exceptional'; if(p>=75)return'rc-no_concern'; if(p>=50)return'rc-attention'; return'rc-cause_concern'; }

function selOpts(val) { return RATINGS.map(r=>`<option value="${r.v}"${r.v===val?' selected':''}>${r.l}</option>`).join(''); }

const RATING_COLOR = {
  '':              'var(--muted2)',
  exceptional:     'var(--green)',
  no_concern:      'var(--teal-deep)',
  attention:       'var(--amber)',
  cause_concern:   'var(--red)',
  not_applicable:  '#9aaac8',
  paid_leave:      '#3b82f6',
  sick_leave:      '#3b82f6',
  holidays:        '#3b82f6',
};

function ratingLbl(v) {
  if (!v) return 'Select…';
  return (RATINGS.find(r => r.v === v) || {}).l || v;
}

function buildRdrop(tid, wid, di, crit, val) {
  const id = `rd_${tid}_${wid}_${di}_${crit}`;
  return `<div class="sel-wrap rdrop" id="${id}">
    <button type="button" class="rdrop-btn rc-${val||'x'}" id="${id}-btn"
      onclick="toggleRdrop(event, '${id}', '${tid}', '${wid}', ${di}, '${crit}')">
      <span class="rdrop-dot" style="background:${RATING_COLOR[val||'']}"></span>
      <span class="rdrop-lbl">${ratingLbl(val)}</span>
    </button>
    <span class="rdrop-caret">▾</span>
  </div>`;
}

let _openRdrop = null;
function closeRdrop() {
  if (!_openRdrop) return;
  const wrap = document.getElementById(_openRdrop);
  if (wrap) {
    wrap.querySelector('.rdrop-menu')?.remove();
    wrap.querySelector('.rdrop-btn')?.classList.remove('open');
  }
  _openRdrop = null;
  document.removeEventListener('click', onDocClickRdrop, true);
}

function onDocClickRdrop(e) {
  if (!_openRdrop) return;
  const wrap = document.getElementById(_openRdrop);
  if (wrap && !wrap.contains(e.target)) closeRdrop();
}

function toggleRdrop(e, id, tid, wid, di, crit) {
  e.stopPropagation();
  if (!editUnlocked) { return promptEditUnlock(); }
  if (_openRdrop === id) { closeRdrop(); return; }
  closeRdrop();
  const wrap = document.getElementById(id);
  if (!wrap) return;
  const t = S.trainees.find(x => x.id === tid);
  const cur = t ? t.weeks[wid].days[di][crit] : '';
  const opts = RATINGS.map((r, idx) => {
    if (!r.v) return ''; // skip the empty placeholder
    const isLeave = r.v === 'paid_leave' || r.v === 'sick_leave' || r.v === 'holidays';
    const prevWasLeave = idx > 1 && (RATINGS[idx-1].v === 'paid_leave' || RATINGS[idx-1].v === 'sick_leave' || RATINGS[idx-1].v === 'holidays');
    const sep = (r.v === 'not_applicable' || (isLeave && !prevWasLeave)) ? '<div class="rdrop-divider"></div>' : '';
    return `${sep}<button type="button" class="rdrop-opt${cur===r.v?' selected':''}"
      onclick="pickRating('${id}','${tid}','${wid}',${di},'${crit}','${r.v}')">
      <span class="rdrop-opt-dot" style="background:${RATING_COLOR[r.v]}"></span>
      <span class="rdrop-opt-lbl">${r.l}</span>
      <span class="rdrop-opt-check">✓</span>
    </button>`;
  }).join('');
  // Add a "Clear" option at the top if a value is currently set
  const clearOpt = cur ? `<button type="button" class="rdrop-opt"
    onclick="pickRating('${id}','${tid}','${wid}',${di},'${crit}','')">
    <span class="rdrop-opt-dot" style="background:var(--muted2);opacity:.5"></span>
    <span class="rdrop-opt-lbl" style="color:var(--muted)">Clear selection</span>
    <span class="rdrop-opt-check"></span>
  </button><div class="rdrop-divider"></div>` : '';
  const menu = document.createElement('div');
  menu.className = 'rdrop-menu';
  menu.innerHTML = clearOpt + opts;
  wrap.appendChild(menu);
  wrap.querySelector('.rdrop-btn').classList.add('open');
  _openRdrop = id;
  setTimeout(() => document.addEventListener('click', onDocClickRdrop, true), 0);
}

function pickRating(id, tid, wid, di, crit, val) {
  if (!editUnlocked) { closeRdrop(); return promptEditUnlock(); }
  const t = S.trainees.find(x => x.id === tid);
  if (!t) return;
  t.weeks[wid].days[di][crit] = val;
  // Update the button display
  const wrap = document.getElementById(id);
  if (wrap) {
    const btn = wrap.querySelector('.rdrop-btn');
    btn.className = `rdrop-btn rc-${val||'x'}`;
    btn.querySelector('.rdrop-dot').style.background = RATING_COLOR[val||''];
    btn.querySelector('.rdrop-lbl').textContent = ratingLbl(val);
  }
  closeRdrop();
  dirty(); refreshScore(tid, wid); refreshDot(t, wid);
}

function buildWeekPanel(def, t, isFirst) {
  const wd = t.weeks[def.id];
  const g  = gc(def);
  const phaseLbl = {training:'Training Phase · Weeks 1–4',mentoring:'Mentoring Phase · Weeks 5–8'}[def.phase];
  const titleHTML = `${def.lbl.replace('Week ','Week <em>')}</em>`;
  const avg = weekAvg(t, def.id);

  const legendHTML = def.test ? `<div class="legend">
    <span class="legend-lbl">Test Legend:</span>
    <span class="legend-item"><span class="ldot" style="background:var(--red)"></span>&lt;50% Concern</span>
    <span class="legend-item"><span class="ldot" style="background:var(--amber)"></span>50–74% Attention</span>
    <span class="legend-item"><span class="ldot" style="background:var(--teal-deep)"></span>75–94% No Concern</span>
    <span class="legend-item"><span class="ldot" style="background:var(--green)"></span>95–100% Exceptional</span>
  </div>` : '';

  const colHds = `<div class="col-hd left">Day</div>${def.critLbls.map(l=>`<div class="col-hd">${l}</div>`).join('')}${def.test?`<div class="col-hd">Test %</div>`:''}<div></div>`;

  const prefix = `${t.id}_${def.id}`;

  const daysHTML = wd.days.map((d,i) => {
    const crits = def.crit.map(c => buildRdrop(t.id, def.id, i, c, d[c])).join('');
    const testH = def.test ? `<div class="test-wrap"><input type="number" class="test-input ${testCls(d.test)}" id="${prefix}_d${i}_test" min="0" max="100" placeholder="—" value="${d.test||''}" autocomplete="off" autocorrect="off" autocapitalize="off" spellcheck="false" inputmode="numeric" oninput="onTest('${t.id}','${def.id}',${i},this)"></div>` : '';
    const hasNote = !!d.note;
    return `<div class="day-card">
      <div class="day-row" style="grid-template-columns:${g}">
        <div class="day-lbl"><div class="day-num-badge">${i+1}</div>Day ${i+1}</div>
        ${crits}${testH}
        <button class="note-btn" onclick="toggleNote('${prefix}',${i},this)">${hasNote?'💬 Note':'+ Note'}</button>
      </div>
      <div class="note-wrap${hasNote?' open':''}" id="${prefix}_d${i}_nw">
        <textarea class="note-ta" id="${prefix}_d${i}_note" placeholder="Day ${i+1} notes…" oninput="onNote('${t.id}','${def.id}',${i},this.value)">${d.note||''}</textarea>
      </div>
    </div>`;
  }).join('');

  return `<div class="panel${isFirst?' active':''}" id="panel-${def.id}">
    <div class="week-hd">
      <div><div class="week-phase-lbl">${phaseLbl}</div><div class="week-title">${titleHTML}</div></div>
      <div class="week-score-box">
        <div class="week-score-lbl">Week Score</div>
        <div class="week-score-num sc-${sc(avg)}" id="ws-${def.id}">${avg!==null?Math.round(avg):'—'}</div>
      </div>
    </div>
    ${legendHTML}
    <div style="display:grid;grid-template-columns:${g};gap:7px;padding:0 15px;margin-bottom:4px">${colHds}</div>
    ${daysHTML}
    <div class="divider"><span>Weekly Summary</span></div>
    <div class="comm-card">
      <div class="comm-hd"><div class="comm-icon ci-t">📝</div><div><div class="comm-meta-lbl">${def.staffLbl} Notes</div><div class="comm-meta-title">${def.lbl} — Overall Comments</div></div></div>
      <textarea class="comm-ta" id="${prefix}_wc" placeholder="Weekly summary, observations…" oninput="onWC('${t.id}','${def.id}','weeklyComment',this.value)">${wd.weeklyComment||''}</textarea>
    </div>
    <div class="comm-card tl-card">
      <div class="comm-hd"><div class="comm-icon ci-tl">👤</div><div><div class="comm-meta-lbl">Team Leader</div><div class="comm-meta-title">TL Comments &amp; Action Points</div></div></div>
      <textarea class="comm-ta tl-ta" id="${prefix}_tlc" placeholder="TL observations, action points…" oninput="onWC('${t.id}','${def.id}','tlComment',this.value)">${wd.tlComment||''}</textarea>
    </div>
  </div>`;
}

function buildArchivePanel() {
  return `<div class="panel" id="panel-arch">
    <div id="arch-inner"></div>
  </div>`;
}

function buildOverviewPanel() {
  return `<div class="panel" id="panel-ov">
    <div class="week-hd"><div><div class="week-phase-lbl">All Trainees</div><div class="week-title">Group <em>Overview</em></div></div></div>
    <div id="ov-inner"></div>
  </div>`;
}

/* ══════════════════════════════════════════════════════
   RENDER
══════════════════════════════════════════════════════ */
function renderTraineeBar() {
  const bar = document.getElementById('trainee-bar');
  const pills = S.trainees.map(t => {
    const avg = overallAvg(t);
    const isActive = t.id === S.activeId;
    const name = t.name || 'New Trainee';
    return `<button class="trainee-pill${isActive?' active':''}" onclick="switchTrainee('${t.id}')">
      <span class="pill-name">${name}</span>
      ${avg!==null ? `<span class="pill-score">${Math.round(avg)}</span>` : ''}
      ${S.trainees.length>1 ? `<span class="pill-remove" onclick="removeTrainee(event,'${t.id}')" title="Delete trainee">✕</span>` : ''}
    </button>`;
  }).join('');
  bar.innerHTML = pills +
    `<button class="add-pill" onclick="addTrainee()">+ Add Trainee</button>` +
    `<span class="trainee-count">${S.trainees.length} trainee${S.trainees.length!==1?'s':''}</span>`;
}

function renderMain() {
  const t = active();
  const main = document.getElementById('main');
  const validWeek = WD.find(d=>d.id===S.activeWeek) || S.activeWeek==='ov' || S.activeWeek==='arch';
  if (!validWeek) S.activeWeek = 'w1';
  const panels = WD.map((def, i) => buildWeekPanel(def, t, S.activeWeek===def.id || (i===0 && !WD.find(d=>d.id===S.activeWeek) && S.activeWeek!=='ov' && S.activeWeek!=='arch'))).join('') + buildOverviewPanel() + buildArchivePanel();
  main.innerHTML = panels;
  // Restore active week tab state
  document.querySelectorAll('.week-btn').forEach(b => b.classList.toggle('active', b.dataset.tab === S.activeWeek));
  if (document.getElementById('panel-'+S.activeWeek)) {
    document.querySelectorAll('.panel').forEach(p=>p.classList.remove('active'));
    document.getElementById('panel-'+S.activeWeek).classList.add('active');
  }
  // Refresh all week dots
  WD.forEach(def => refreshDot(t, def.id));
  // Lazy render for special tabs
  if (S.activeWeek === 'ov')   renderOverview();
  if (S.activeWeek === 'arch') renderArchive();
}

function renderSetup() {
  const t = active();
  document.getElementById('f-name').value    = t.name    || '';
  document.getElementById('f-date').value    = t.date    || '';
  document.getElementById('f-trainer').value = t.trainer || '';
  document.getElementById('f-mentor').value  = t.mentor  || '';
}

function renderAll() {
  renderTraineeBar();
  renderSetup();
  renderMain();
  // re-apply readonly attributes since DOM was rebuilt
  if (typeof applyEditLockUI === 'function') applyEditLockUI();
}

/* ══════════════════════════════════════════════════════
   OVERVIEW RENDER
══════════════════════════════════════════════════════ */
function renderOverview() {
  const el = document.getElementById('ov-inner');
  if (!el) return;

  const cards = S.trainees.map(t => {
    const oavg = overallAvg(t);
    const tavg = phaseAvg(t,'training');
    const mavg = phaseAvg(t,'mentoring');
    return `<div class="ov-trainee-card" onclick="switchTrainee('${t.id}')">
      <div class="ov-tc-name">${t.name||'Unnamed Trainee'}</div>
      <div class="ov-tc-meta">${t.trainer?'Trainer: '+t.trainer:''} ${t.mentor?'· Mentor: '+t.mentor:''}</div>
      <div class="ov-tc-scores">
        <div class="ov-tc-score-cell"><div class="ov-tc-score-val sc-${sc(oavg)}">${oavg!==null?Math.round(oavg):'—'}</div><div class="ov-tc-score-lbl">Overall</div></div>
        <div class="ov-tc-score-cell"><div class="ov-tc-score-val sc-${sc(tavg)}">${tavg!==null?Math.round(tavg):'—'}</div><div class="ov-tc-score-lbl">Training</div></div>
        <div class="ov-tc-score-cell"><div class="ov-tc-score-val sc-${sc(mavg)}">${mavg!==null?Math.round(mavg):'—'}</div><div class="ov-tc-score-lbl">Mentoring</div></div>
      </div>
    </div>`;
  }).join('');

  const rows = S.trainees.map(t => {
    const oavg = overallAvg(t);
    return WD.map(def => {
      const avg = weekAvg(t, def.id);
      const tl  = t.weeks[def.id].tlComment;
      return `<tr>
        <td style="white-space:nowrap"><strong>${t.name||'Unnamed'}</strong></td>
        <td style="color:var(--muted)">${def.lbl}</td>
        <td><strong class="sc-${sc(avg)}">${avg!==null?Math.round(avg):'—'}</strong></td>
        <td><span class="ov-pill op-${sc(avg)}">${slbl(avg)}</span></td>
        <td style="color:var(--muted);max-width:200px;${tl?'':'font-style:italic'}">${tl?(tl.length>80?tl.slice(0,80)+'…':tl):'No TL notes'}</td>
      </tr>`;
    }).join('');
  }).join('');

  el.innerHTML = `
    <div class="ov-trainee-grid">${cards}</div>
    <div class="ov-detail-title">Per-week <em>breakdown</em></div>
    <div class="ov-table-wrap"><table class="ov-table">
      <thead><tr><th>Trainee</th><th>Period</th><th>Score</th><th>Status</th><th>TL Notes Preview</th></tr></thead>
      <tbody>${rows}</tbody>
    </table></div>`;
}

/* ══════════════════════════════════════════════════════
   TRAINEE MANAGEMENT
══════════════════════════════════════════════════════ */
function addTrainee() {
  if (!requireEdit()) return promptEditUnlock();
  const t = newTrainee();
  S.trainees.push(t);
  S.activeId = t.id;
  S.activeWeek = 'w1';
  dirty(); renderAll();
}

function switchTrainee(id) {
  S.activeId = id;
  // If we're on archive tab, switching to an active trainee should leave the archive view
  if (S.activeWeek === 'arch') S.activeWeek = 'w1';
  renderTraineeBar();
  renderSetup();
  renderMain();
  dirty();
}

async function removeTrainee(e, id) {
  e.stopPropagation();
  if (!requireEdit()) return promptEditUnlock();
  const t = S.trainees.find(x=>x.id===id);
  const name = t?.name || 'this trainee';
  const ok = await confirmModal(
    `Remove <strong>${name}</strong> and all their data? This action cannot be undone.`,
    { title:'Delete trainee?', confirmLabel:'Delete', confirmClass:'btn-danger' }
  );
  if (!ok) return;
  S.trainees = S.trainees.filter(x=>x.id!==id);
  if (S.trainees.length === 0) { const nt=newTrainee(); S.trainees=[nt]; S.activeId=nt.id; }
  else if (S.activeId === id) S.activeId = S.trainees[0].id;
  dirty(); renderAll();
}

/* ══════════════════════════════════════════════════════
   EVENT HANDLERS
══════════════════════════════════════════════════════ */
function syncSetup(field, val) {
  if (!editUnlocked) { renderSetup(); return promptEditUnlock(); }
  const t = active();
  t[field] = val;
  // Update pill name live
  document.querySelectorAll('.trainee-pill').forEach(p => {
    if (p.getAttribute('onclick')?.includes(t.id)) {
      const nameEl = p.querySelector('.pill-name');
      if (nameEl && field === 'name') nameEl.textContent = val || 'New Trainee';
    }
  });
  // Update trainee count
  const cnt = document.querySelector('.trainee-count');
  if (cnt) cnt.textContent = `${S.trainees.length} trainee${S.trainees.length!==1?'s':''}`;
  dirty();
}

function onRating(tid, wid, di, crit, el) {
  const t = S.trainees.find(x=>x.id===tid);
  t.weeks[wid].days[di][crit] = el.value;
  el.className = `rating-sel rc-${el.value||'x'}`;
  dirty(); refreshScore(tid, wid); refreshDot(t, wid);
}

function onTest(tid, wid, di, el) {
  if (!editUnlocked) { el.value = active().weeks[wid].days[di].test || ''; return promptEditUnlock(); }
  // Sanitize: keep only digits, clamp to 0-100
  let raw = String(el.value || '').replace(/[^\d]/g, '');
  if (raw !== '') {
    let n = parseInt(raw, 10);
    if (isNaN(n)) raw = '';
    else if (n > 100) raw = '100';
    else raw = String(n);
  }
  if (el.value !== raw) el.value = raw;
  const t = S.trainees.find(x=>x.id===tid);
  t.weeks[wid].days[di].test = raw;
  el.className = `test-input ${testCls(raw)}`;
  dirty(); refreshScore(tid, wid);
}

function onNote(tid, wid, di, val) {
  if (!editUnlocked) { renderMain(); return promptEditUnlock(); }
  S.trainees.find(x=>x.id===tid).weeks[wid].days[di].note = val;
  dirty();
}

function onWC(tid, wid, field, val) {
  if (!editUnlocked) { renderMain(); return promptEditUnlock(); }
  S.trainees.find(x=>x.id===tid).weeks[wid][field] = val;
  dirty();
}

function toggleNote(prefix, di, btn) {
  const nw = document.getElementById(`${prefix}_d${di}_nw`);
  const open = nw.classList.toggle('open');
  btn.textContent = open ? '💬 Note' : '+ Note';
  if (open) document.getElementById(`${prefix}_d${di}_note`)?.focus();
}

/* ══════════════════════════════════════════════════════
   SCORE + DOT REFRESH
══════════════════════════════════════════════════════ */
function refreshScore(tid, wid) {
  const t = S.trainees.find(x=>x.id===tid);
  const avg = weekAvg(t, wid);
  const el = document.getElementById(`ws-${wid}`);
  if (el) { el.textContent = avg!==null?Math.round(avg):'—'; el.className=`week-score-num sc-${sc(avg)}`; }
  // Update pill score
  renderTraineeBar();
  if (S.activeWeek==='ov') renderOverview();
}

function refreshDot(t, wid) {
  const def = WD.find(d=>d.id===wid);
  const wd  = t.weeks[wid];
  const dot = document.getElementById(`wd-${wid}`);
  if (!dot) return;
  let filled=0, concern=false;
  wd.days.forEach(d => { def.crit.forEach(c => { if(d[c]){filled++; if(d[c]==='cause_concern')concern=true;} }); });
  const total = 5*def.crit.length;
  dot.className = 'w-dot'+(concern?' concern':filled>=total?' filled':filled>0?' partial':'');
}

/* ══════════════════════════════════════════════════════
   WEEK TAB SWITCHING
══════════════════════════════════════════════════════ */
function goWeek(id) {
  S.activeWeek = id;
  document.querySelectorAll('.panel').forEach(p=>p.classList.remove('active'));
  document.querySelectorAll('.week-btn').forEach(b=>b.classList.remove('active'));
  document.getElementById(`panel-${id}`)?.classList.add('active');
  document.querySelector(`[data-tab="${id}"]`)?.classList.add('active');
  if (id==='ov') renderOverview();
  if (id==='arch') renderArchive();
}

let _st=null;
function dirty() {
  const dot=document.getElementById('as-dot'), txt=document.getElementById('as-txt');

  clearTimeout(_st);
  _st=setTimeout(()=>{
